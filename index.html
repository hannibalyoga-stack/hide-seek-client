            var(--interact-button-size) + var(--hud-gap)
        );
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      /*
       * Hinweis (Merge-Doktrin `vollmerge`, Audio = ours-Implementierung): der `tweak-konsole`-
       * Zweig kannte an dieser Stelle noch einen ÄLTEREN, seither ersetzten Kompass-/Stumm-
       * Hinweis-Stand (`#compass-overlay`/`.compass-indicator--*`/`#mute-hint`, gebunden an die
       * inzwischen verworfene Audio-API `SoundEventQuantized`/`SoundDampingStage`/
       * `SoundDistanceStage`, siehe `hud/compass.ts`) — bewusst NICHT übernommen, ERSETZT durch
       * den bereits vorhandenen, aktuellen Stand oben im Dokument (`#sound-compass`/
       * `.sound-compass-indicator--*`, `#reveal-markers`, `#audio-unlock-hint`), der auf der
       * kanonischen `packages/shared/src/sound.ts`-API (`DAMPENING_STAGE_*`, `DISTANCE_STAGE_*`)
       * aufsetzt. Kein UI-Element geht dadurch verloren — dieselbe Funktion (Kompass-Indikatoren,
       * „Tippen für Ton"-Hinweis) existiert bereits unter dem aktuellen Namen.
       */

      #hidden-hint.visible {
        opacity: 1;
      }

      /*
       * Rumpel-HUD-Balken (Versteck-Rumpeln, Anti-Camper §5, ursprünglich Client-/Sound-Scheibe
       * R1c, Felix-Feel-Vorgabe „1:1 aus dem MVP"). **Mobile-Redesign „der Balken ist selbst das
       * Tap-Ziel" (Übergabe-Auftrag `2026-07-16-rumpel-balken-tap-redesign.md`):** dediziertes
       * Bildschirm-HUD für die EIGENE Balken-Challenge — NICHT über dem Kopf (das wäre ein
       * Welt-/Sprite-Element wie die Channel-Fortschrittsbalken, `CHANNEL_PROGRESS_BAR_*`),
       * sondern ein fixes DOM-HUD (Muster `#debug-overlay`: harter `display`-Toggle statt
       * Opacity-Fade — die Challenge ist ein Reflex-Test, eine Übergangsphase würde die exakte
       * Marker-Position beim Erscheinen verfälscht wirken lassen). Nur sichtbar, solange die
       * eigene Figur `rumbleActive` ist (`scenes/MatchScene.ts`s `updateRumbleHud()`, PRO FRAME,
       * Muster `updateChannelProgressBar()`/`updateMinimapHud()` — SELF-Werte). Über BEIDEN
       * Button-Reihen UND dem `#hidden-hint`-Text verankert (Muster `#hidden-hint`s eigenem
       * Offset über beiden Button-Reihen) — die `bottom`-Formel selbst bleibt unverändert
       * (Redesign-Spezifikation §4: „Position unverändert"); da der Balken jetzt DEUTLICH höher
       * ist (60 px statt vormals 16 px) und nach OBEN wächst, vergrößert sich der Abstand zu
       * `#hidden-hint` dadurch nur zusätzlich (geprüft: keine Überlappung bei irgendeiner
       * Viewport-Breite, kein Offset-Nachzug an `#hidden-hint` nötig).
       *
       * **Zwei-Ebenen-Struktur (E1 — der Balken IST das Tap-Ziel, keine Positionsauswertung):**
       * `#rumble-bar-hit` ist der ÄUSSERE, unsichtbare Wrapper — `position: fixed`, trägt die
       * `bottom`-Formel + Zentrierung, seine Größe (`--rumble-bar-width`/`-height` PLUS je
       * `2 × --rumble-bar-hit-halo`) ist die tatsächliche Pointer-Trefferfläche
       * (`pointer-events: auto` NUR während `.visible`, Pointer-Wiring in
       * `setupRumbleTapControls()`, `MatchScene.ts`). `#rumble-bar` ist der INNERE, SICHTBARE
       * Balken (Hintergrund/Rahmen/Radius) — `position: absolute` innerhalb des Wrappers, um
       * exakt `--rumble-bar-hit-halo` von dessen Rand eingerückt (die unsichtbare Halo liegt
       * dadurch symmetrisch außen herum). Marker/Zone bleiben ausschließlich Kinder von
       * `#rumble-bar` und referenzieren dadurch weiterhin exakt die SICHTBARE Balkenfläche, exakt
       * wie vor dem Redesign — die Halo verändert ihre Prozent-Formel an keiner Stelle. Beide
       * Ebenen werden synchron von `updateRumbleHud()` auf `.visible` geschaltet (dieselbe
       * Bedingung `rumbleActive || Ausgang-Feedback-Blitz aktiv`, siehe unten).
       *
       * **Scale-Pop beim Erscheinen** (`@keyframes rumble-bar-appear-pop`, Dauer
       * `RUMBLE_BAR_APPEAR_POP_DURATION_MS` aus `src/config.ts`, bewusste Duplikation dort
       * dokumentiert): läuft NUR auf `#rumble-bar` (dem sichtbaren Container) — eine reine
       * Skalierung um dessen eigenes Zentrum, verfälscht die relative Marker-/Zonen-Position
       * dadurch an keiner Stelle (beide bleiben Prozentwerte relativ zur unskalierten Layout-Box
       * des Containers, die CSS-`transform: scale()` rein visuell mitskaliert). Läuft
       * automatisch bei jeder false→true-Flanke von `.visible` erneut an (kein JS-Trigger nötig
       * — dieselbe Selektor-Neu-Zuordnung wie beim bestehenden `display: none → block`-Toggle).
       *
       * Marker/Zone werden per Inline-`style` PRO FRAME neu gesetzt (`updateRumbleHud()`):
       * `#rumble-bar-zone`s `width` = `rumbleGreenZoneFraction` (live tunbar), zentriert per
       * `left: 50%` + `transform: translateX(-50%)`; `#rumble-bar-marker`s `left` = Marker-
       * Fraktion `[0,1]` als Prozent, ebenfalls per `translateX(-50%)` auf den Fraktionspunkt
       * zentriert (Muster `.sound-compass-indicator`s `translate(-50%, -50%)`-Zentrierungstrick)
       * — der Marker darf dadurch an den Rändern (Fraktion 0/1) leicht über den Balkenrand
       * hinausragen (halbe Marker-Breite), exakt wie im MVP-Vorbild.
       */
      #rumble-bar-hit {
        display: none;
        position: fixed;
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + 3 * (var(--move-mode-button-size) + var(--hud-gap))
        );
        left: 50%;
        transform: translateX(-50%);
        width: calc(var(--rumble-bar-width) + 2 * var(--rumble-bar-hit-halo));
        height: calc(var(--rumble-bar-height) + 2 * var(--rumble-bar-hit-halo));
        pointer-events: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #rumble-bar-hit.visible {
        display: block;
        pointer-events: auto;
      }

      @keyframes rumble-bar-appear-pop {
        0% {
          transform: scale(var(--rumble-bar-appear-pop-scale-start));
        }
        100% {
          transform: scale(1);
        }
      }

      #rumble-bar {
        display: none;
        position: absolute;
        top: var(--rumble-bar-hit-halo);
        left: var(--rumble-bar-hit-halo);
        width: var(--rumble-bar-width);
        height: var(--rumble-bar-height);
        background: rgba(0, 0, 0, 0.7);
        border-radius: var(--rumble-bar-radius);
        border: var(--rumble-bar-border-width) solid var(--rumble-bar-border-color);
        box-sizing: border-box;
        overflow: hidden;
        pointer-events: none;
      }

      #rumble-bar.visible {
        display: block;
        animation: rumble-bar-appear-pop 130ms ease-out;
      }

      #rumble-bar-zone {
        position: absolute;
        top: 0;
        left: 50%;
        height: 100%;
        background: var(--rumble-zone-color);
        transform: translateX(-50%);
      }

      #rumble-bar-marker {
        position: absolute;
        top: 0;
        left: 0%;
        width: var(--rumble-bar-marker-width);
        height: 100%;
        background: var(--rumble-marker-color);
        transform: translateX(-50%);
      }

      #rumble-bar-marker.in-zone {
        background: var(--rumble-marker-color-hit);
      }

      /*
       * Hinweistext „Tipp, wenn der Marker im Grün ist" (Mobile-Redesign, Übergabe-Auftrag
       * `2026-07-16-rumpel-balken-tap-redesign.md`, Felix-Entscheid 3): direkt ÜBER dem Balken
       * verankert (`bottom`-Formel = dieselbe wie `#rumble-bar-hit` PLUS dessen volle Höhe PLUS
       * einen `--hud-gap`-Abstand), Stil-Muster `#hidden-hint` (Opacity-Fade über `.visible`,
       * `pointer-events: none`, Text-Shadow). Sichtbarkeit wird AUSSCHLIESSLICH von
       * `updateRumbleHud()` über die reine `hud/rumbleHintVisibility.ts`s
       * `computeRumbleHintVisibility()` gesteuert (erste `RUMBLE_HINT_MAX_WAVES` Wellen der
       * Session, s. dort) — dieses CSS-Element selbst kennt keine Wellen-Zählung.
       */
      #rumble-hint {
        position: fixed;
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + 3 * (var(--move-mode-button-size) + var(--hud-gap)) +
            var(--rumble-bar-height) + 2 * var(--rumble-bar-hit-halo) + var(--hud-gap)
        );
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #rumble-hint.visible {
        opacity: 1;
      }

      /*
       * Ausgang-Feedback-Blitz (`scenes/MatchScene.ts`s `updateRumbleHud()`/`handleRumbleResult()`):
       * sobald ein `"rumbleResult"`-Ereignis eintrifft, bleibt `#rumble-bar` für
       * `RUMBLE_RESULT_FLASH_DURATION_MS` (`src/config.ts`) SICHTBAR und übermalt sich komplett
       * grün/rot, statt sofort bei `rumbleActive → false` zu verschwinden — Marker/Zone werden für
       * die Blitz-Dauer ausgeblendet (`display: none`), das Balken-`background` selbst trägt die
       * Blitz-Farbe. Erfolg (`.result-hit`) nutzt dieselbe Farbe wie die Trefferzone
       * (`--rumble-zone-color`, EIN Grün, kein zweiter Ton); Fehlschlag (`.result-miss`) nutzt das
       * eigene Warnrot (`--rumble-result-miss-color` oben). Zusätzliches Audio-Feedback (dezenter
       * Erfolgs-Ton / eigener Verrats-Ton bei Fehlschlag) läuft rein clientseitig über
       * `SoundPlayer`, unabhängig von diesem DOM-Blitz hier. Das „!"-Weltsymbol bei Fehlschlag
       * (Feature B, `triggerWorldBetraySighted()`) hängt seit dem Umbau (Aufgabe 0) NICHT MEHR an
       * diesem self-only `"rumbleResult"`-Ereignis, sondern am eigenständigen, server-gegateten
       * `"rumbleBetraySighted"`-Ereignis (siehe `net/connection.ts`).
       *
       * **Deutlicherer Blitz (Feel-Optimierung, Felix-Auftrag 2026-07-16: „250 ms wurde beim
       * Playtest übersehen"):** `RUMBLE_RESULT_FLASH_DURATION_MS` auf `550` ms verlängert (siehe
       * dortige Dokumentation) UND ein kurzer Glow-Puls (`@keyframes rumble-result-pulse`,
       * `box-shadow` in derselben Blitz-Farbe via `currentColor`) ergänzt — dezent (keine
       * Skalierung, kein Layout-Sprung, reine Leuchtkraft-Betonung um den ohnehin fest
       * positionierten Balken). `animation-duration` dupliziert bewusst denselben Millisekunden-
       * Wert wie `RUMBLE_RESULT_FLASH_DURATION_MS` (Muster `--rumble-result-miss-color`/
       * `RUMBLE_RESULT_MISS_COLOR`: kein CSS-Import aus TypeScript möglich, beide Stellen MÜSSEN
       * bei einer künftigen Änderung von Hand synchron gehalten werden). Überschreibt die
       * `animation`-Kurzschrift bewusst den `rumble-bar-appear-pop`-Wert der `.visible`-Regel
       * (höhere Deklarationsreihenfolge/Spezifität) — Konflikt praktisch ausgeschlossen, da der
       * Pop längst (130 ms) abgeschlossen ist, bevor ein Ergebnis-Ereignis eintreffen kann (die
       * kürzeste Welle dauert ein Vielfaches davon).
       */
      @keyframes rumble-result-pulse {
        0% {
          box-shadow: 0 0 0 0 currentColor;
        }
        35% {
          box-shadow: 0 0 12px 3px currentColor;
        }
        100% {
          box-shadow: 0 0 0 0 currentColor;
        }
      }

      #rumble-bar.result-hit,
      #rumble-bar.result-miss {
        animation: rumble-result-pulse 550ms ease-out;
      }

      #rumble-bar.result-hit {
        background: var(--rumble-zone-color);
        color: var(--rumble-zone-color);
      }

      #rumble-bar.result-miss {
        background: var(--rumble-result-miss-color);
        color: var(--rumble-result-miss-color);
      }

      #rumble-bar.result-hit #rumble-bar-zone,
      #rumble-bar.result-hit #rumble-bar-marker,
      #rumble-bar.result-miss #rumble-bar-zone,
      #rumble-bar.result-miss #rumble-bar-marker {
        display: none;
      }

      /*
       * Tweak-Konsole & Parameter-Registry, Bündel 3/Scheibe 5 (Dev-Overlay, `vault/20-
       * Architektur/tweak-konsole-konzept.md` §5): `#tweak-console` ist NUR der statische
       * Container — die gesamte Aufbau-/Interaktionslogik (Gruppen/Suche/Filter/Zeilen/Export)
       * lebt in `src/tweak/tweakConsole.ts` und wird NUR im Dev-Build montiert (`import.meta.env
       * .DEV`-Gate + dynamischer `import()` in `scenes/MatchScene.ts`, siehe dort). Dieser CSS-
       * Block selbst ist KEIN Cheat-Vektor (nur Layout, kein Simulationszugriff) und bleibt
       * deshalb bewusst unbedingt im Markup — analog zu jedem anderen HUD-Container hier.
       *
       * Default `display: none` (nicht nur `pointer-events: none`): ein geschlossenes Panel
       * nimmt dadurch StrukturELL keinen Klickbereich ein, das Spiel bleibt uneingeschränkt
       * bedienbar (Mobile-Tag-1-Regel 1). Erst `.tweak-console--open` schaltet es sichtbar +
       * interaktiv.
       *
       * Layout: relativ zu den Safe-Area-Insets verankert (Regel 3/5), Breite `min(92vw, 26rem)`
       * (kein fester Pixelwert, läuft auf 375px nicht über den Rand), eigener scrollbarer
       * Body (`overflow-y: auto; overflow-x: hidden` — kein horizontaler Überlauf). Alle
       * interaktiven Kindelemente bekommen ihre 48px-Mindestgröße über die jeweiligen
       * `.tweak-*`-Klassen unten (Regel 4).
       */
      #tweak-console {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        width: min(92vw, 26rem);
        max-width: 100vw;
        box-sizing: border-box;
        display: none;
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: rgba(10, 10, 16, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--hud-text-color);
        font: 0.85rem / 1.3 sans-serif;
        z-index: 1000;
        pointer-events: none;
      }

      #tweak-console.tweak-console--open {
        display: flex;
        pointer-events: auto;
      }

      .tweak-console__header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
      }

      .tweak-console__search {
        flex: 1 1 8rem;
        min-width: 0;
        min-height: 48px;
        box-sizing: border-box;
      }

      .tweak-console__only-changed {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        min-height: 48px;
      }

      .tweak-console__export {
        min-height: 48px;
        min-width: 48px;
      }

      .tweak-console__export-feedback {
        font-size: 0.75rem;
        opacity: 0.8;
      }

      .tweak-console__body {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .tweak-group__header {
        width: 100%;
        min-height: 48px;
        text-align: left;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: inherit;
        font: inherit;
        font-weight: 600;
        padding: 0.4rem 0.6rem;
        border-radius: 0.3rem;
      }

      .tweak-group__body {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        padding-left: 0.25rem;
      }

      .tweak-group__body--collapsed,
      .tweak-group[hidden],
      .tweak-row[hidden] {
        display: none;
      }

      .tweak-row {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        padding: 0.4rem 0.5rem;
        border-radius: 0.3rem;
        background: rgba(255, 255, 255, 0.04);
      }

      .tweak-row__labels {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
      }

      .tweak-row__key {
        font-family: monospace;
        font-size: 0.7rem;
        opacity: 0.6;
      }

      .tweak-row__scope-badge {
        font-size: 0.7rem;
        padding: 0.1rem 0.4rem;
        border-radius: 0.6rem;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Scope-Farben (Konzept §4): rein informativ, keine neue Kategoriefarbe (Art-Style bleibt unberührt — dieses Panel ist ein Dev-Werkzeug, kein In-Game-Asset). */
      .tweak-row__scope-badge--server-sim {
        color: #38bdf8;
      }

      .tweak-row__scope-badge--client-render {
        color: #4ade80;
      }

      .tweak-row__scope-badge--gesperrt {
        color: rgba(255, 255, 255, 0.4);
      }

      /* Constraint-Warnindikator (Konzept §6): dieselbe Warnfarbe wie die Low-Time-HUD-Warnung (`--hud-low-time-color`) — konsistente Warn-Sprache statt einer neuen, unbegründeten Farbe. */
      .tweak-row__warning {
        font-size: 0.7rem;
        color: var(--hud-low-time-color);
        border: 1px solid var(--hud-low-time-color);
        border-radius: 0.6rem;
        padding: 0.1rem 0.4rem;
      }

      .tweak-row__controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
      }

      .tweak-row__slider {
        flex: 1 1 8rem;
        min-height: 48px;
      }

      .tweak-row__number {
        width: 5rem;
        min-height: 48px;
        box-sizing: border-box;
      }

      .tweak-row__unit {
        font-size: 0.75rem;
        opacity: 0.7;
        min-width: 2.5rem;
      }

      .tweak-row__default {
        font-size: 0.7rem;
        opacity: 0.6;
      }

      .tweak-row__reset {
        min-height: 48px;
        min-width: 48px;
      }

      /* =====================================================================
       * Mobile-Clean-HUD (Felix-Auftrag 2026-07-17 abends)
       * =====================================================================
       * Auf Touch-Geräten (`html.touch-ui`, gesetzt in `src/index.ts` über dieselbe
       * `isTouchLikely()`-Heuristik wie der Kamera-Zoom, `?forceTouch` = Desktop-Escape)
       * verschwinden die Entwickler-Knöpfe (Debug-Toggle oben rechts, Tweak-Toggle oben
       * Mitte — Konsole bleibt Desktop-per-Tastatur ^/F2 erreichbar), und Timer/Wins rücken
       * in die frei gewordene Ecke ganz nach oben — weniger HUD-Etagen, mehr sichtbares
       * Spielfeld. Der NetLog-Export-Button bleibt bewusst AUCH auf Touch sichtbar (nur mit
       * explizitem `?netlog`-Opt-in überhaupt vorhanden — Felix' Handy-Messwerkzeug).
       * Reine Darstellungs-Weiche per CSS-Klasse, KEIN zweiter Eingabepfad (Regel 1).
       */
      html.touch-ui #debug-toggle-button,
      html.touch-ui #tweak-console-toggle {
        display: none;
      }

      html.touch-ui #match-timer {
        top: calc(var(--hud-safe-top) + var(--hud-gap));
      }

      html.touch-ui #wins-counter {
        top: calc(var(--hud-safe-top) + var(--hud-gap) + 2em);
      }

      /* NetLog-Export rückt in die vom Debug-Toggle geräumte Ecke (Formel = dessen alte Position). */
      html.touch-ui #netlog-export-button {
        right: calc(var(--hud-safe-right) + var(--hud-gap));
      }

      /* Randfall `?netlog` AUF Touch: der Export-Button belegt dann doch die Ecke — Timer/Wins
         weichen für diesen Messmodus auf ihre bisherigen Etagen darunter aus
         (Geschwister-Selektor: `#netlog-export-button` steht im Markup VOR beiden). */
      html.touch-ui #netlog-export-button.visible ~ #match-timer {
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap));
      }

      html.touch-ui #netlog-export-button.visible ~ #wins-counter {
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap) + 2em);
      }

      /* =====================================================================
       * Controller-Steuerung (Felix-Auftrag „Controller-Steuerung für PS5 einbauen und
       * deployen")
       * =====================================================================
       * Sobald ein Gamepad aktiv ist (`html.gamepad-active`, gesetzt in `scenes/MatchScene.ts`s
       * `updateGamepadActiveClass()` über `input/gamepadInput.ts`s `hasActiveGamepad()`-Polling)
       * blenden die REINEN Touch-Affordanzen aus: die drei `.mobile-move-mode-button`
       * (Schleichen/Interagieren/Besen) UND der floating Joystick-Visual
       * (`#joystick-base`/`#joystick-knob`) — der Controller bedient dieselben Aktionen über
       * Buttons/Stick, die Touch-Knöpfe wären nur noch visuelles Rauschen. Item-Bar (Cooldown-/
       * Zauber-Info), Minimap und Timer bleiben SICHTBAR (Info-Displays, mit Controller weiter
       * nützlich) — dieselbe Darstellungs-Weiche wie `html.touch-ui` oben, KEIN zweiter
       * Eingabepfad (Mobile-Tag-1-Regel 1 unberührt).
       */
      html.gamepad-active .mobile-move-mode-button,
      html.gamepad-active #joystick-base,
      html.gamepad-active #joystick-knob {
        display: none;
      }

      /* =====================================================================
       * Wild-Rift-Aktionscluster (Felix-Auftrag `2026-07-22-mobile-hud-wildrift-umsetzung.md`)
       * =====================================================================
       * Löst auf TOUCH-Geräten die Item-Bar UND die runden Schleichen-/Interaktions-Buttons
       * VOLLSTÄNDIG ab (Desktop bleibt bei jenen Elementen unverändert — reine Anzeige-Weiche,
       * KEIN zweiter Eingabepfad, Mobile-Tag-1-Regel 1). `#wr-cluster` ist ein reiner
       * Struktur-Wrapper (`position: static`) — `display: none` auf ihm blendet trotz
       * `position: fixed` auf den Kindern strukturell ALLE Kinder mit aus (Standard-CSS-
       * Verhalten), ein einziges Gate reicht damit für den kompletten Cluster.
       */
      #wr-cluster {
        display: none;
      }

      html.touch-ui #wr-cluster {
        display: block;
      }

      html.touch-ui #item-bar,
      html.touch-ui #mobile-sneak-button,
      html.touch-ui #mobile-interact-button,
      html.touch-ui #mobile-broom-button {
        display: none;
      }

      /*
       * Alle kleinen Cluster-Buttons (Slots · Dash · Schleichen) EXAKT gleich groß und
       * kreisrund (Felix-Direktive „keiner unterschiedlich groß") — nur der Interaktionsknopf
       * ist größer (Wild-Rift-Angriffsknopf-Proportion, eigene Regel unten). Bewusst
       * `pointer-events: auto` (sie SIND die Eingabe, Mobile-Tag-1-Regel 1) + `touch-action: none`
       * + `-webkit-tap-highlight-color: transparent` (unterdrückt Browser-Standardgesten, Muster
       * `.action-slot-button` andernorts) — eigene DOM-Geschwister außerhalb des Phaser-Canvas,
       * ein Tap erreicht Phasers Whole-Canvas-Joystick-Listener dadurch strukturell nie.
       */
      .wr-button {
        position: fixed;
        width: var(--wr-slot-diameter);
        height: var(--wr-slot-diameter);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--wr-panel-bg);
        box-shadow: inset 0 0 0 2px var(--wr-slot-accent);
        color: var(--wr-slot-accent);
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      .wr-button__icon {
        width: var(--wr-slot-icon-size);
        height: var(--wr-slot-icon-size);
        display: block;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
        pointer-events: none;
      }

      /*
       * Emoji-Icon EINES belegten Slots (Zauber/Item, Muster `.item-slot__icon--emoji`) —
       * standardmäßig leer/unsichtbar (kein Textinhalt), `renderWrActionSlots()`
       * (`scenes/MatchScene.ts`) setzt `textContent` NUR für `data-kind="spell"`/`"item"`.
       * `data-kind="empty"` zeigt stattdessen den gestrichelten SVG-Platzhalter
       * (`.wr-slot__icon-empty`) — beide Icon-Träger sind IMMER im DOM (Muster fester
       * Element-Pool, kein Neuaufbau pro Frame), nur `display` wechselt.
       */
      .wr-slot__icon-emoji {
        display: none;
        font-size: var(--wr-slot-icon-size);
        line-height: 1;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
      }

      /*
       * Pixel-Icon EINES belegten Slots (`<img>`, Icon-Batch 2026-07-23) — standardmäßig
       * versteckt; `applySlotIcon()` (`scenes/MatchScene.ts`) schaltet auf `display: block`, sobald
       * für den Zauber/das Item ein Icon-Derivat vorliegt, und blendet dann den Emoji-Träger aus.
       * Etwas größer als das Emoji, damit das Pixel-Icon den runden Slot gut füllt.
       */
      .wr-slot__icon-image {
        display: none;
        width: calc(var(--wr-slot-icon-size) * 1.4);
        height: calc(var(--wr-slot-icon-size) * 1.4);
        object-fit: contain;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
        pointer-events: none;
      }

      .wr-slot[data-kind="spell"] .wr-slot__icon-emoji,
      .wr-slot[data-kind="item"] .wr-slot__icon-emoji {
        display: block;
      }

      .wr-slot[data-kind="spell"] .wr-slot__icon-empty,
      .wr-slot[data-kind="item"] .wr-slot__icon-empty {
        display: none;
      }

      /* Ladungs-Pips EINES Item-Slots (Muster `.item-slot__item-pips`, z. B. Besen "●●○") — leer für Zauber/leere Slots. */
      .wr-slot__pips {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 2px;
        text-align: center;
        font: 0.6rem/1 monospace;
        color: inherit;
        text-shadow: 0 0 3px #000;
        pointer-events: none;
      }

      #wr-sneak-button {
        right: calc(var(--hud-safe-right) + var(--wr-sneak-right));

       *

      html.hud-layout-classic {

      html.hud-layout-classic #wr-slot-3 {

        Bodennachrichten (Client)"): NUR als Geist sichtbar (`.visible` via
        `updateGhostMessageButtonVisibility()`, Muster `#mobile-broom-button`). Feder-Icon
        (Quill) — Tap öffnet den Phrasen-Picker (`#ghost-message-picker`, s. u.). Verdrahtung
        `setupGhostMessageControls()` (`scenes/MatchScene.ts`); Desktop-Taste G löst denselben
        Umschalter aus.
      -->
      <div id="mobile-ghost-message-button" class="mobile-move-mode-button" aria-label="Geisternachricht schreiben">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 3c-5 0-11 4-13 12l-1 4 4-1C17 16 21 10 21 5c0-1-1-2-2-2z" />
          <path d="M9 15L4 20" />
        </svg>
      </div>
      <!--
        Fang-Sog-Tap-Button (Felix-Entscheid 2026-07-18, „Tapp-Sog" — vault/30-Systeme/
        fang-sog.md): NUR für die Fänger-Rolle sichtbar (`.visible` via
        `updateCatchTapButtonVisibility()`, Muster `#mobile-broom-button`). Icon = 3/4-Ring +
        Funke — dieselbe Bogen-Sprache wie der Ladebogen am Ziel (Wiedererkennung statt
        neuem Symbol-Vokabular). Verdrahtung `setupCatchTapControls()` (`scenes/MatchScene.ts`).
      -->
      <div id="mobile-catch-tap-button" class="mobile-move-mode-button" aria-label="Fangen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3a9 9 0 1 1-9 9" />
          <path d="M12 7.5l1.2 3.3L16.5 12l-3.3 1.2L12 16.5l-1.2-3.3L7.5 12l3.3-1.2z" fill="currentColor" stroke="none" />
        </svg>
      </div>

      <!--
        Item-Bar (Felix-Auftrag 2026-07-17, Übernahme der MVP-Aktionsleiste; Licht-Zauber-Trio,
        `vault/20-Architektur/auftraege/2026-07-17-licht-zauber.md`, Schritt 17): unten in der
        rechten Daumenzone. Gruppe 1 = Dash (statisch, ersetzt den früheren Eck-Button,
        zusätzlich Boost-Halte-Ziel im Besen-Flug, siehe `setupItemBar()`). Gruppe 2
        (`#item-bar-spell-group`) = DYNAMISCHE Zauber-Slots, EIN Slot je Eintrag aus
        `getSpellsForRole(ownRole)` (Fänger 2/Verstecker 3) — zur Ladezeit LEER, erst befüllt,
        sobald die eigene Rolle bekannt ist (`renderSpellSlots()`, `scenes/MatchScene.ts`). Die
        vormals 3 statischen, nie befüllten Item-Platzhalter-Slots sind gemäß Mobile-Slot-Budget-
        Empfehlung des Auftrags ERSATZLOS entfernt (375-px-Breite, kein generisches
        Mehr-Item-Inventar vorhanden — Coding-Agent-Entscheidung innerhalb der Auftragsgrenzen).
        Der Besen-eigene `#mobile-broom-button` oben bleibt bewusst EIGENSTÄNDIG NEBEN der
        Item-Bar. Styles im <style>-Block oben, Verdrahtung `scenes/MatchScene.ts`s
        `setupItemBar()`/`renderSpellSlots()`. Jeder Slot: Panel < Cooldown-Wipe < Steinrahmen,
        Icon im Panel (Schichtung 1:1 MVP `hudShared.ts`).
      -->
      <div id="item-bar">
        <div class="item-bar__group">
          <div class="item-slot item-slot--dash is-actionable" id="item-slot-dash">
            <div class="item-slot__panel"></div>
            <div class="item-slot__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M4 5l7 7-7 7M13 5l7 7-7 7" />
              </svg>
            </div>
            <div class="item-slot__cooldown"></div>
            <div class="item-slot__frame"></div>
          </div>
        </div>
        <div class="item-bar__group" id="item-bar-spell-group"></div>
        <!--
          Gruppe 3 (ursprünglich Umsetzungsauftrag „Truhen-Öffnen-Sound + 3 Item-Slots + Tempo-
          Schub als gehaltenes Item", 2026-07-18, Teil B — **Phase 4 „Client-Konsum des 4-Slot-
          Inventars", Felix-Entscheid 2026-07-22: POOL statt Fix-Zuordnung**): GENAU 3 statische
          DOM-Plätze (Felix: „drei Item Slots haben wir"), aber jetzt ALLE DREI Tap-Ziele — jeder
          Platz zeigt den item-Slot mit dem entsprechenden RANG unter den aktuell BELEGTEN
          Item-Slots des eigenen 4-Slot-Inventars (`renderItemBarItemSlots()`), nicht mehr fest
          Slot 1 = das ehemalige `heldItemType`. Ein eventueller 4. gleichzeitiger Item-Slot bleibt
          auf diesem DESKTOP-Pfad unsichtbar (der WR-Touch-Cluster zeigt alle 4 generischen Slots).
          Verdrahtung `scenes/MatchScene.ts`s `setupItemBar()`/`renderItemBarItemSlots()`.
        -->
        <div class="item-bar__group" id="item-bar-item-group">
          <div class="item-slot item-slot--item" id="item-slot-item-1">
            <div class="item-slot__panel"></div>
            <div class="item-slot__icon item-slot__icon--emoji" id="item-slot-item-1-icon"></div>
            <img class="item-slot__icon item-slot__icon--image" id="item-slot-item-1-image" alt="" draggable="false" style="display: none" />
            <div class="item-slot__item-pips" id="item-slot-item-1-pips"></div>
            <div class="item-slot__frame"></div>
          </div>
          <div class="item-slot item-slot--item" id="item-slot-item-2">
            <div class="item-slot__panel"></div>
            <div class="item-slot__icon item-slot__icon--emoji" id="item-slot-item-2-icon"></div>
            <img class="item-slot__icon item-slot__icon--image" id="item-slot-item-2-image" alt="" draggable="false" style="display: none" />
            <div class="item-slot__item-pips" id="item-slot-item-2-pips"></div>
            <div class="item-slot__frame"></div>
          </div>
          <div class="item-slot item-slot--item" id="item-slot-item-3">
            <div class="item-slot__panel"></div>
            <div class="item-slot__icon item-slot__icon--emoji" id="item-slot-item-3-icon"></div>
            <img class="item-slot__icon item-slot__icon--image" id="item-slot-item-3-image" alt="" draggable="false" style="display: none" />
            <div class="item-slot__item-pips" id="item-slot-item-3-pips"></div>
            <div class="item-slot__frame"></div>
          </div>
        </div>
      </div>
      <!--
        Wild-Rift-Aktionscluster (Felix-Auftrag `2026-07-22-mobile-hud-wildrift-umsetzung.md`):
        EIN dynamischer Interaktionsknopf + Dash + Schleichen + 4 generische Zauber-/Item-Slots
        (harte Kappe, `hud/actionSlots.ts`). NUR auf Touch sichtbar (`html.touch-ui`, CSS oben) —
        Desktop bleibt bei `#item-bar`/`#mobile-sneak-button`/`#mobile-interact-button` (Gate s.
        dort). `#wr-action-icons` ist ein unsichtbares SVG-Symbol-Sheet — jeder Button referenziert
        sein Icon per `<use href="#i-…">`, `scenes/MatchScene.ts` tauscht nur das `href`-Attribut.
        Verdrahtung: `setupWrActionCluster()`/`renderWrActionSlots()`/`updateWrInteractButton()`.
      -->
      <div id="wr-cluster">
        <svg id="wr-action-icons" style="display: none" aria-hidden="true">
          <defs>
            <!-- Dash — unverändert aus der Item-Bar übernommen. -->
            <symbol id="wr-i-dash" viewBox="0 0 24 24">
              <path
                d="M4 5l7 7-7 7M13 5l7 7-7 7"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </symbol>
            <!-- Schleichen — unverändert aus `#mobile-sneak-button` übernommen. -->
            <symbol id="wr-i-sneak" viewBox="0 0 24 24">
              <path
                d="M2.5 12s3.5-5.5 9.5-5.5S21.5 12 21.5 12s-3.5 5.5-9.5 5.5S2.5 12 2.5 12z"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <circle cx="12" cy="12" r="2.4" fill="none" stroke="currentColor" stroke-width="2" />
              <path d="M4.5 19.5l15-15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </symbol>
            <!-- Interaktionsknopf: neutral (nichts in Reichweite). -->
            <symbol id="wr-i-interact-none" viewBox="0 0 24 24">
              <path d="M12 3.5 18.5 12 12 20.5 5.5 12Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
            </symbol>
            <!-- Interaktionsknopf: Tür (Öffnen UND Schließen — der Türzustand selbst ist in der Spielwelt sichtbar). -->
            <symbol id="wr-i-interact-door" viewBox="0 0 24 24">
              <path d="M6.5 20.5V10a5.5 5.5 0 0 1 11 0v10.5" fill="none" stroke="currentColor" stroke-width="1.8" />
              <path d="M4 20.5h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <circle cx="14.6" cy="13" r="1.1" fill="currentColor" />
            </symbol>
            <!-- Interaktionsknopf: Truhe öffnen. -->
            <symbol id="wr-i-interact-chest" viewBox="0 0 24 24">
              <rect x="4" y="10.5" width="16" height="8.5" rx="1.4" fill="none" stroke="currentColor" stroke-width="1.8" />
              <path d="M4 10.5V9a3.4 3.4 0 0 1 3.4-3.4h9.2A3.4 3.4 0 0 1 20 9v1.5" fill="none" stroke="currentColor" stroke-width="1.8" />
              <rect x="10.8" y="12.4" width="2.4" height="3.6" rx="0.8" fill="currentColor" />
            </symbol>
            <!-- Interaktionsknopf: Verstecken (Enter). -->
            <symbol id="wr-i-interact-hide-enter" viewBox="0 0 24 24">
              <path
                d="M3.5 12C6.2 7.8 17.8 7.8 20.5 12 17.8 16.2 6.2 16.2 3.5 12Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <circle cx="12" cy="12" r="2.1" fill="none" stroke="currentColor" stroke-width="1.8" />
              <path d="M5.5 18.5 18.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </symbol>
            <!-- Interaktionsknopf: Verstecken verlassen (Exit). -->
            <symbol id="wr-i-interact-hide-exit" viewBox="0 0 24 24">
              <path
                d="M13.5 4.5H6.5v15h7"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M10.5 12h10M17 8.5 20.5 12 17 15.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </symbol>
            <!-- Interaktionsknopf: Durchsuchen (Fänger). -->
            <symbol id="wr-i-interact-search" viewBox="0 0 24 24">
              <circle cx="10.5" cy="10.5" r="5.6" fill="none" stroke="currentColor" stroke-width="1.8" />
              <path d="M14.8 14.8 20 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
            </symbol>
            <!--
              Interaktionsknopf: Portal-Flucht (Felix-Entscheid 2026-07-22, Nachtrag — eigener
              Zustand statt "kein Icon"). Portal-Wirbel: drei konzentrische Ellipsen-Ringe,
              Muster der bestehenden Portal-Ring-Weltgrafik (`PORTAL_COLOR`-Violett übernimmt
              der `tone-hider`-Ton, keine eigene Farbe hier nötig).
            -->
            <symbol id="wr-i-interact-portal" viewBox="0 0 24 24">
              <ellipse cx="12" cy="12" rx="9" ry="4.2" fill="none" stroke="currentColor" stroke-width="1.6" />
              <ellipse cx="12" cy="12" rx="5.6" ry="2.6" fill="none" stroke="currentColor" stroke-width="1.4" />
              <ellipse cx="12" cy="12" rx="2.4" ry="1.1" fill="currentColor" stroke="none" />
            </symbol>
            <!-- Generischer Leerplatz-Umriss (leerer Slot). -->
            <symbol id="wr-i-slot-empty" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-dasharray="2.4 2.8" />
            </symbol>
          </defs>
        </svg>

        <div id="wr-sneak-button" class="wr-button" aria-hidden="true">
          <svg class="wr-button__icon"><use href="#wr-i-sneak"></use></svg>
        </div>

        <div id="wr-dash-button" class="wr-button" aria-hidden="true">
          <svg class="wr-button__icon"><use href="#wr-i-dash"></use></svg>
          <div class="wr-button__cooldown"></div>
          <b class="wr-button__time" aria-live="polite"></b>
        </div>

        <div id="wr-slot-0" class="wr-button wr-slot" data-kind="empty" aria-hidden="true">
          <svg class="wr-button__icon wr-slot__icon-empty"><use href="#wr-i-slot-empty"></use></svg>
          <span class="wr-slot__icon-emoji"></span>
          <img class="wr-slot__icon-image" alt="" draggable="false" />
          <span class="wr-slot__pips"></span>
          <div class="wr-button__cooldown"></div>
          <b class="wr-button__time" aria-live="polite"></b>
        </div>
        <div id="wr-slot-1" class="wr-button wr-slot" data-kind="empty" aria-hidden="true">
          <svg class="wr-button__icon wr-slot__icon-empty"><use href="#wr-i-slot-empty"></use></svg>
          <span class="wr-slot__icon-emoji"></span>
          <img class="wr-slot__icon-image" alt="" draggable="false" />
          <span class="wr-slot__pips"></span>
          <div class="wr-button__cooldown"></div>
          <b class="wr-button__time" aria-live="polite"></b>
        </div>
        <div id="wr-slot-2" class="wr-button wr-slot" data-kind="empty" aria-hidden="true">
          <svg class="wr-button__icon wr-slot__icon-empty"><use href="#wr-i-slot-empty"></use></svg>
          <span class="wr-slot__icon-emoji"></span>
          <img class="wr-slot__icon-image" alt="" draggable="false" />
          <span class="wr-slot__pips"></span>
          <div class="wr-button__cooldown"></div>
          <b class="wr-button__time" aria-live="polite"></b>
        </div>
        <div id="wr-slot-3" class="wr-button wr-slot" data-kind="empty" aria-hidden="true">
          <svg class="wr-button__icon wr-slot__icon-empty"><use href="#wr-i-slot-empty"></use></svg>
          <span class="wr-slot__icon-emoji"></span>
          <img class="wr-slot__icon-image" alt="" draggable="false" />
          <span class="wr-slot__pips"></span>
          <div class="wr-button__cooldown"></div>
          <b class="wr-button__time" aria-live="polite"></b>
        </div>

        <div id="wr-interact-button" class="is-disabled" aria-hidden="true">
          <svg id="wr-interact-button__icon"><use href="#wr-i-interact-none"></use></svg>
        </div>

        <div id="wr-detail-card">
          <span id="wr-detail-card__kind">Zauber</span>
          <span id="wr-detail-card__name"></span>
          <span id="wr-detail-card__meta"></span>
          <div id="wr-detail-card__drop">Fallenlassen</div>
        </div>
      </div>

      <div id="tweak-console"></div>

      <!--
        Geister-Bodennachrichten-Phrasen-Picker (Kanon §10, Umsetzungsauftrag „Geister-
        Bodennachrichten (Client)"): NUR öffenbar als Geist (`openGhostMessagePicker()`-Gate,
        `scenes/MatchScene.ts`), Default versteckt (`#ghost-message-picker` ohne `.open`).
        `#ghost-message-picker-body` wird EINMALIG aus dem festen `GHOST_MESSAGE_PHRASES`-Katalog
        (`@hide-seek/shared`) befüllt (`renderGhostMessagePickerPhrases()`) — kein zweiter,
        handgepflegter Phrasen-Text hier im Markup.
      -->
      <div id="ghost-message-picker">
        <div id="ghost-message-picker__title">Leave a message</div>
        <div id="ghost-message-picker-body"></div>
        <div id="ghost-message-picker-cancel">Cancel</div>
      </div>
    </div>
  </body>
</html>
