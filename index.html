<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Hide Seek — Client (Dev)</title>
    <style>
      /*
       * UI-Theme „Dark Souls trifft Harry Potter" (Übernahme-Manifest §4, Posten R3-1,
       * Felix-Freigabe 2026-07-12) — Titel-Schriftart Cinzel, LOKAL geladen (Mobile-Tag-1-
       * Regel 9: kein CDN-Zwang). Derivat `assets/fonts/cinzel-latin.woff2` (woff2,
       * Latin/Latin-1/Latin-Extended-A/allgemeine-Interpunktion-Subset, Variable-Font-Achse
       * `wght` 400–900 erhalten) — Master bleibt `assets-src/fonts/cinzel/Cinzel.ttf`
       * (Asset-Budget-Disziplin Regel 8, Provenienz + Lizenz in `apps/client/public/assets/
       * HERKUNFT.md`/`.meta.json`-Sidecar, SIL OFL 1.1). **Abnahme des Font-Assets durch
       * Felix steht noch aus** (Mensch-Gate Regel 8) — Einsatz unten gilt bis zur Sichtung
       * als Werkstattstand.
       *
       * Reines `@font-face` statt einer FontFace-API-Helferfunktion: das gesamte HUD ist
       * DOM/CSS (kein Phaser-`Text`-Objekt existiert im Client, siehe `config.ts`s
       * `THEME_FONT_FAMILY_TITLE`-Kommentar) — der Browser lädt/anwendet die Schrift dafür
       * bereits vollständig über CSS, `font-display: swap` deckt den Ladezustand ab. Ein
       * JS-Helfer (Muster MVP `uiFont.ts`, „refresh bereits gezeichneter Phaser-Text-Objekte
       * nach Spätladen") wäre spekulativer Code ohne heutigen Aufrufer (Karpathy-Prinzip 2) —
       * Upgrade-Pfad, sobald ein erstes Phaser-`Text`-Objekt Cinzel nutzt (Canvas-Text
       * rendert sonst ggf. mit dem Fallback-Font, falls die Schrift zu diesem Zeitpunkt noch
       * lädt).
       */
      @font-face {
        font-family: "Cinzel";
        src: url("assets/fonts/cinzel-latin.woff2") format("woff2");
        font-weight: 400 900;
        font-style: normal;
        font-display: swap;
      }

      /*
       * Mobile-Tag-1-Regeln (CLAUDE.md, Übergabe-Aufträge T4a/T4c):
       * - UI-Layout relativ (%, vw/vh), keine festen Pixelkoordinaten (Regel 3).
       * - Safe-Area-Insets ab Tag 1 (Regel 5): ALLE VIER env(safe-area-inset-*) mit
       *   Fallback, nicht nur die oberen drei — das Debug-HUD sitzt oben (top/left/right),
       *   die neue Statuszeile unten (bottom/left/right), zusammen decken beide Elemente
       *   alle vier Seiten ab.
       * - Debug-Overlay-/Statuszeilen-Text ist explizit von der "Schrift >= 18pt"-Regel
       *   ausgenommen (siehe .claude/skills/mobile-first-review/SKILL.md) — beides ist
       *   reiner Diagnose-/Debug-Text, keine Spieler-UI.
       * - Beide HUD-Elemente sind `pointer-events: none` (Regel 1: der Whole-Canvas-
       *   Joystick bleibt der EINZIGE Eingabepfad, kein Overlay darf ihn stoeren).
       *
       * CSS-Custom-Properties statt wiederholter Literale (T4c): Abstand, Schriftgröße und
       * Textfarbe sind hier EINMAL benannt, beide HUD-Elemente referenzieren dieselben
       * Variablen statt eigener Zahlen.
       */
      :root {
        --hud-safe-top: env(safe-area-inset-top, 0px);
        --hud-safe-right: env(safe-area-inset-right, 0px);
        --hud-safe-bottom: env(safe-area-inset-bottom, 0px);
        --hud-safe-left: env(safe-area-inset-left, 0px);
        --hud-gap: 0.5rem;
        --hud-font-size: 1rem;
        --hud-text-color: #fff;
        /*
         * UI-Theme „Dark Souls trifft Harry Potter" (Übernahme-Manifest §4, Posten R3-1,
         * Felix-Freigabe 2026-07-12) — DOM-Gegenstück zu `apps/client/src/config.ts`s
         * `THEME_*`-Konstanten (bewusst dupliziert, kein gemeinsamer Import zwischen
         * Phaser-Canvas und DOM/CSS, siehe Kommentar dort). Palette aus `vault/10-Kanon/
         * art-style.md`. `--theme-font-title` (Cinzel, `@font-face` oben) NUR für
         * Überschriften/Labels (hier: `#connection-status`) — NIE für Fließtext, Timer oder
         * Zahlwerte (bei 375 px unleserlich, Leitplanke des Übergabe-Auftrags), dafür
         * `--theme-font-body`. `--theme-letter-spacing-title` gibt Cinzels gravierten
         * Versalien/Petite-Caps zusätzlichen Zeichenabstand (typografische Standardpraxis für
         * diese Schriftfamilie), NUR zusammen mit `--theme-font-title` gesetzt.
         */
        --theme-font-title: "Cinzel", Georgia, "Times New Roman", serif;
        --theme-font-body: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
        --theme-letter-spacing-title: 0.04em;
        --theme-color-charcoal: #1c1a17;
        --theme-color-brass: #b08d57;
        --theme-color-gold: #d4af37;
        --theme-color-text-title: var(--theme-color-gold);
        --theme-color-text-body: #e8e1d3;
        /*
         * Low-Time-Warnfarbe (Übergabe-Auftrag P3c-2, Ziel 6, Critic-Auflage 6): warmes Amber
         * statt Kampf-/Verletzungs-Rot (K1, design-neutral) — reine Darstellung, kein Sound.
         */
        --hud-low-time-color: #ffb300;
        /*
         * Endgame-Countdown-Farbe (Übergabe-Auftrag P3c-3 „Portal-Endgame-Mechanik (editor-
         * unabhängig)"): dasselbe Violett wie die Portal-Ringe (`PORTAL_COLOR`,
         * `apps/client/src/config.ts`) — visuell klar unterscheidbar vom Haupttimer/der
         * Low-Time-Warnung, reine Darstellung, kein Sound.
         */
        --hud-endgame-color: #a78bfa;
        /*
         * Rot-Zonen-Randmarker-Farbe (Übergabe-Auftrag P3g „Shrink-Endgame", Entwurfs-
         * Entscheidung i): dasselbe Rot wie das Map-Shrink-Overlay (`REVEAL_MARKER_COLOR`/
         * `SHRINK_ROT_FILL_COLOR`, `apps/client/src/config.ts`) — visueller Zusammenhang
         * zwischen Fläche und Randmarker, kein Kampf-/Schadens-Rot (K1 verbietet Kampf-
         * Vokabular, nicht die bereits kanonische Gelb/Rot-Sperrzonen-Sprache, spielkonzept.md §7).
         */
        --reveal-marker-color: #dc2626;
        /* Randmarker-Kantenlänge in Pixeln (`REVEAL_MARKER_SIZE_PX`, `apps/client/src/config.ts`). */
        --reveal-marker-size: 20px;
        /*
         * Mobile Bewegungsmodus-Buttons (P3d, Übergabe-Auftrag „Bewegungsmodi (Schleichen/
         * Gehen/Dash)"): 3,5rem ≈ 56px bei Standard-Root-Schriftgröße — komfortabel über der
         * Mobile-Tag-1-Mindestgröße von 48px (Regel 4), relativ zur Root-Schriftgröße (nicht
         * hart auf einen Bildschirm-Pixelwert verdrahtet, skaliert mit Nutzer-/Browser-
         * Textgrößeneinstellungen) statt eines zweiten, potenziell abweichenden Literalwerts.
         */
        --move-mode-button-size: 3.5rem;
        /*
         * Debug-HUD-Toggle-Button (Playtest-Fix, Felix 2026-07-11): 3,25rem = 52px bei
         * Standard-Root-Schriftgröße — über der Mobile-Tag-1-Mindestgröße von 48px (Regel 4),
         * `min-width`/`min-height: 48px` unten als harte Untergrenze zusätzlich (Muster
         * `--move-mode-button-size`).
         */
        --debug-toggle-button-size: 3.25rem;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #game-container {
        position: relative;
        width: 100vw;
        /* dvh: boden-verankerte Buttons liegen nie hinter der ein-/ausklappenden Mobile-
           Browserleiste; 100vh als Fallback für ältere Browser (Felix-Playtest 2026-07-13). */
        height: 100vh;
        height: 100dvh;
      }

      /*
       * Debug-HUD (Playtest-Fix, Felix 2026-07-11: „das große Debug-Overlay stört sehr im
       * normalen Spiel"): startet AUSGEBLENDET (`display: none` Default), `#debug-toggle-
       * button` schaltet die `.visible`-Klasse um (`scenes/MatchScene.ts`s `setupDebugToggle()`).
       * `top` verschoben (Muster `#wins-counter` unter `#match-timer`), damit die IMMER
       * sichtbare `#players-count`-Zeile darüber Platz hat, ohne zu überlappen.
       */
      #debug-overlay {
        display: none;
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + 2em);
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        white-space: pre-line;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      #debug-overlay.visible {
        display: block;
      }

      /*
       * Spielerzahl-HUD (Playtest-Fix, Felix 2026-07-11): dauerhaft sichtbar, NICHT Teil des
       * togglebaren Debug-Overlays („muss immer existieren"). Oben links verankert (Safe-Area,
       * Regel 3/5) — derselbe Eckenbereich wie `#debug-overlay`, aber IMMER sichtbar.
       */
      #players-count {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      /*
       * Debug-HUD-Toggle-Button (Playtest-Fix, Felix 2026-07-11): oben rechts verankert, ÜBER
       * `#match-timer`/`#wins-counter` (die beide entsprechend nach unten verschoben sind).
       * Muster `.mobile-move-mode-button` (Größe ≥ 48px, Safe-Area, `pointer-events: auto` — DAS
       * ist die Eingabe, kein Whole-Canvas-Joystick-Konflikt dank `stopPropagation()` im
       * Handler). Funktioniert identisch per Maus (Desktop) UND Touch (Mobile-Tag-1-Regel 1:
       * EIN Pointer-Eingabepfad).
       */
      #debug-toggle-button {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 0.75rem / 1.2 sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      /* Aktiv-Zustand (Debug-Overlay gerade eingeblendet) — reine Darstellung, Muster `#mobile-sneak-button.active`. */
      #debug-toggle-button.active {
        background: rgba(255, 255, 255, 0.35);
      }

      /*
       * NetLog-Export-Button (Netcode-Messstand, Auftrag `vault/20-Architektur/auftraege/
       * 2026-07-15-netcode-messstand.md`, Baustein A): startet AUSGEBLENDET (`display: none`
       * Default, Muster `#debug-overlay`) — `scenes/MatchScene.ts`s `setupNetLog()` schaltet die
       * `.visible`-Klasse NUR bei aktivem `?netlog`-URL-Parameter frei (kein Button, kein
       * `pointer-events`-Ziel im Normalbetrieb). Direkt links neben `#debug-toggle-button`
       * verankert (derselbe Größen-/Safe-Area-/Pointer-Only-Rahmen, Mobile-Tag-1-Regeln 1/3/4/5).
       */
      #netlog-export-button {
        display: none;
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap));
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 0.65rem / 1.2 sans-serif;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #netlog-export-button.visible {
        display: flex;
      }

      /*
       * Statuszeile (Übergabe-Auftrag T4c, Felix-Default E-T4c-4): eigenständiges,
       * nicht-interaktives Element für den dreiwertigen Verbindungsstatus ("verbunden" /
       * "reconnecte…" / "Verbindung verloren") — bewusst getrennt vom technischen
       * Debug-HUD oben, damit der reine Verbindungszustand auf einen Blick sichtbar bleibt.
       * Unten verankert (safe-area-inset-bottom), damit zusammen mit #debug-overlay oben
       * alle vier Insets tatsächlich genutzt werden.
       *
       * UI-Theme (R3-1): Cinzel-Titelschrift — die drei möglichen Texte sind kurze
       * Status-LABELS (keine Sätze/Zahlwerte, Leitplanke des Übergabe-Auftrags), damit ein
       * legitimer Cinzel-Anwendungsfall (vormals `monospace`).
       */
      #connection-status {
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--theme-color-text-title);
        font: var(--hud-font-size) / 1.4 var(--theme-font-title);
        letter-spacing: var(--theme-letter-spacing-title);
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      /*
       * Fang-Moment-Einblendung (Übergabe-Auftrag P3c-1, Ziel 5, Critic-Auflage 2): kurze,
       * zentrierte HUD-Meldung ("<Rolle> wurde zum Geist"), unabhängig vom technischen
       * Debug-HUD — relatives Layout (Regel 3), pointer-events: none (Regel 1). Ein-/
       * Ausblenden per CSS-Transition über die `.visible`-Klasse, die
       * `scenes/MatchScene.ts` zeitgesteuert (`CATCH_ANNOUNCEMENT_DURATION_MS`) setzt/entfernt.
       *
       * UI-Theme (R3-1): Georgia-Fließschrift (die Meldungstexte sind volle Sätze, z. B. „Ein
       * Verstecker wurde zum Geist" — Leitplanke des Übergabe-Auftrags verbietet Cinzel für
       * Fließtext), aber mit der Titel-Akzentfarbe (Gold) statt neutralem Weiß — hebt die
       * Ansage als „großen Moment" hervor, ohne die Lesbarkeit von Cinzels Versalien zu riskieren.
       */
      #catch-announcement {
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(90vw, 32rem);
        color: var(--theme-color-text-title);
        font: calc(var(--hud-font-size) * 1.3) / 1.4 var(--theme-font-body);
        text-align: center;
        text-shadow: 0 0 6px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #catch-announcement.visible {
        opacity: 1;
      }

      /*
       * Timer-HUD (Übergabe-Auftrag P3c-2 „Formales Matchende + Sieg", Ziel 6): dauerhaft
       * sichtbare MM:SS-Zeile, eigenständiges DOM-Element (NICHT Teil des `#debug-overlay`-
       * Textblocks, siehe `scenes/MatchScene.ts`s `updateMatchTimerHud()`-Dokumentation) — oben
       * rechts verankert, damit sie sich nicht mit dem linksbündigen `#debug-overlay`-Text
       * überlappt. Relatives Layout (Regel 3), `pointer-events: none` (Regel 1).
       */
      /*
       * Playtest-Fix (Felix, 2026-07-11): `top` um `--debug-toggle-button-size` + Gap nach unten
       * verschoben — Platz für den neuen `#debug-toggle-button` oben rechts (Muster: derselbe
       * additive Offset wie `#wins-counter` unter `#match-timer`, nur eine Ebene höher).
       *
       * UI-Theme (R3-1): Georgia-Fließschrift statt Cinzel (Leitplanke des Übergabe-Auftrags:
       * Cinzel NIE für Timer/Zahlwerte — bei 375 px unleserlich), `tabular-nums` hält die
       * Ziffernbreite beim Sekundenwechsel stabil (kein Zittern der MM:SS-Zeile). Die
       * `.low-time`-/`.endgame`-Zustandsfarben unten bleiben unverändert (eigene, bereits
       * K1-geprüfte Warnfarben, kein Teil dieses Themes).
       */
      #match-timer {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--theme-color-text-body);
        font: calc(var(--hud-font-size) * 1.4) / 1.4 var(--theme-font-body);
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      /*
       * Low-Time-Warnung (Critic-Auflage 6): Farbwechsel + Puls in den letzten
       * `MATCH_LOW_TIME_WARNING_TICKS` (siehe `hud/matchTimer.ts`s `isMatchLowTime`) — reine
       * Darstellung, kein Sound.
       */
      #match-timer.low-time {
        color: var(--hud-low-time-color);
        animation: match-timer-pulse 800ms ease-in-out infinite;
      }

      @keyframes match-timer-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /*
       * Endgame-Countdown (Übergabe-Auftrag P3c-3, Entscheidung i): schaltet dieselbe
       * Timer-Zeile auf eine eigene Farbe um, sobald `scenes/MatchScene.ts`s
       * `updateMatchTimerHud()` per `isEndgamePhase(...)` in die Endgame-Phase wechselt — bewusst
       * OHNE Puls (reine Farbunterscheidung genügt, kein zweiter Dauer-Puls neben `low-time`).
       * Schließt sich mit `.low-time` gegenseitig aus (`updateMatchTimerHud()` entfernt jeweils
       * die andere Klasse).
       */
      #match-timer.endgame {
        color: var(--hud-endgame-color);
      }

      /*
       * Wins-HUD (Übergabe-Auftrag „Matchflow: Rollen-Rotation + Rematch", Entwurfs-Entscheidung
       * d/AK-10, Kanon §7: Spieltexte Englisch): dauerhafte EIGENANZEIGE „Wins: n" — direkt UNTER
       * `#match-timer` verankert (safe-area + Gap + eine Zeilenhöhe, relatives Layout, Regel 3),
       * reine Text-Ausgabe, kein neues Touch-Target (Regel 4 nicht einschlägig).
       */
      #wins-counter {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap) + 2em);
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        transition:
          transform 200ms ease,
          color 200ms ease;
      }

      /* Blitz-Nit (Game-Design-Critic-Review): kurzer Aufblitz-Zustand bei Sieg-Inkrement — reine CSS-Transition, `scenes/MatchScene.ts`s `updateWinsHud()` schaltet die Klasse zeitgesteuert. */
      #wins-counter.pulse {
        color: var(--hud-endgame-color);
        transform: scale(1.3);
      }

      /*
       * Ergebnis-Overlay (Übergabe-Auftrag P3c-2, Entwurfs-Entscheidung g): eigenständiges
       * DOM-Element — NICHT `#catch-announcement` wiederverwendet (das blendet nach
       * `CATCH_ANNOUNCEMENT_DURATION_MS` aus; das Ergebnis muss die vollen
       * `MATCH_END_DELAY_TICKS` sichtbar stehen). Mehrzeiliger Text (`white-space: pre-line`,
       * siehe `scenes/MatchScene.ts`s `renderMatchResultText()`), zentriert, relatives Layout
       * (Regel 3), `pointer-events: none` (Regel 1).
       *
       * UI-Theme (R3-1): Georgia-Fließschrift (der Text enthält Zahlwerte — „3/5" etc.,
       * Leitplanke des Übergabe-Auftrags verbietet Cinzel dafür), Titel-Akzentfarbe (Gold,
       * Muster `#catch-announcement`) — zweite Hälfte der „Ansagen"-Familie.
       */
      #match-result {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(90vw, 32rem);
        color: var(--theme-color-text-title);
        font: calc(var(--hud-font-size) * 1.3) / 1.5 var(--theme-font-body);
        text-align: center;
        text-shadow: 0 0 6px #000;
        white-space: pre-line;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #match-result.visible {
        opacity: 1;
      }

      /*
       * Minimap „Marauder's Map" (Übernahme-Manifest §4, Posten R3-2, Felix-Freigabe
       * 2026-07-12, K2-Referenz `realMiniMap.ts` im read-only MVP-Ordner): Pergament-Panel mit
       * statischer Wand-/Raum-Geometrie + eigenem Fußspuren-Trail (`hud/minimap.ts`,
       * `scenes/MatchScene.ts`s `setupMinimapDom()`/`updateMinimapHud()`). Reines DOM-
       * `<canvas>`-Overlay (Muster `#sound-compass`/`#reveal-markers`), Safe-Area-bereinigt
       * (Mobile-Regel 5). `pointer-events: none` (Regel 1) — reine Anzeige, stört den
       * Whole-Canvas-Joystick nie. **Bewusst als ERSTES Kind von `#game-container` platziert**
       * (siehe Markup unten): alle anderen `position: fixed`-HUD-Elemente (Timer, Wins-Zähler,
       * Debug-Toggle-Button …) stapeln sich per Default-DOM-Reihenfolge sichtbar DARÜBER —
       * „eigene Ebene über der Welt, unter dem DOM-HUD" ist damit strukturell erfüllt, kein
       * `z-index` nötig. Zeichenfläche in FESTER Pixelgröße (kein Zoom-Bezug, anders als die
       * Phaser-Kamera — DOM-Layout ist zoom-unabhängig), berechnet über `hud/minimap.ts`s
       * `computeMinimapLayout()` (siehe `setupMinimapDom()`).
       *
       * **ESP-Leitplanke (Kanon §7/Interest-Management, load-bearing):** zeigt AUSSCHLIESSLICH
       * die EIGENE Position (Trail) + statische Geometrie — NIEMALS fremde Spieler, NIEMALS den
       * Live-Türzustand (siehe `updateMinimapHud()`-Dokumentation in `MatchScene.ts`).
       *
       * **Position oben LINKS (R3-Nachzug, Felix-Freigabe 2026-07-12, vormals oben rechts):**
       * `left` statt `right` verankert (Safe-Area-Inset links, Mobile-Regel 5). `top` um `2em`
       * zusätzlich verschoben — GENAU dasselbe Muster wie `#debug-overlay`s Offset weiter unten
       * (Kommentar dort: „damit die IMMER sichtbare `#players-count`-Zeile darüber Platz hat,
       * ohne zu überlappen") —, denn `#players-count` sitzt in DERSELBEN oben-links-Ecke und
       * bleibt IMMER sichtbar (siehe dort). Ohne diesen Offset würde das ~150×150px-Panel
       * (`MINIMAP_PANEL_MAX_WIDTH_PX`/`_HEIGHT_PX`, `config.ts`) die „Players: N"-Zeile
       * überdecken.
       */
      #minimap-panel {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + 2em);
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        pointer-events: none;
      }

      #minimap-canvas {
        display: block;
        border-radius: 2px;
      }

      /*
       * Sound-Kompass (Übergabe-Auftrag „Spatial Audio Stufe 1", Scheibe B, E10): Container
       * füllt die Fläche INNERHALB der Safe-Area-Insets (Mobile-Regel 5 — Randindikatoren sind
       * der klassische Notch-Konflikt) — `scenes/MatchScene.ts`s `computeEdgePositionPercent`
       * rechnet in Prozent RELATIV zu genau dieser Fläche (`container.clientWidth/Height`,
       * Mobile-Regel 3: relatives Layout, keine festen Pixelkoordinaten). `pointer-events: none`
       * (Regel 1): der Kompass darf den Whole-Canvas-Joystick nie stören. Fester Element-Pool
       * (`KOMPASS_MAX_INDIKATOREN` Stück, in `setupSoundCompassDom()` einmalig angelegt) —
       * `.visible` schaltet Sichtbarkeit, Position/Größe/Farbe/Form kommen als Inline-Styles pro
       * Frame (`updateSoundCompassHud()`).
       */
      #sound-compass {
        position: fixed;
        top: var(--hud-safe-top);
        right: var(--hud-safe-right);
        bottom: var(--hud-safe-bottom);
        left: var(--hud-safe-left);
        pointer-events: none;
      }

      .sound-compass-indicator {
        position: absolute;
        transform: translate(-50%, -50%);
        display: none;
      }

      .sound-compass-indicator.visible {
        display: block;
      }

      /* Typ+Rolle → Form (E10/F7, Greybox): Kreis (Verstecker) ist der `border-radius: 50%`-Default der Klasse, Dreieck (Fänger) überschreibt per Clip-Path. */
      .sound-compass-indicator--shape-circle {
        border-radius: 50%;
      }

      .sound-compass-indicator--shape-triangle {
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      }

      /*
       * Fänger-Randmarker (Übergabe-Auftrag P3g „Shrink-Endgame", Entwurfs-Entscheidung i):
       * Container füllt dieselbe Safe-Area-bereinigte Fläche wie `#sound-compass` (Mobile-Regel
       * 5), fester Element-Pool (`REVEAL_MARKER_MAX_COUNT`, in `setupRevealMarkerDom()` einmalig
       * angelegt). `pointer-events: none` (Regel 1): darf den Whole-Canvas-Joystick nie stören.
       * `scenes/MatchScene.ts`s `updateRevealMarkersHud()` setzt Position/Drehung PRO FRAME als
       * EINEN kombinierten Inline-`transform` (Translate + Rotate) — deshalb bewusst KEIN
       * `transform` in dieser Regel selbst (würde sonst überschrieben/kollidieren).
       */
      #reveal-markers {
        position: fixed;
        top: var(--hud-safe-top);
        right: var(--hud-safe-right);
        bottom: var(--hud-safe-bottom);
        left: var(--hud-safe-left);
        pointer-events: none;
      }

      .reveal-marker {
        position: absolute;
        width: var(--reveal-marker-size);
        height: var(--reveal-marker-size);
        background: var(--reveal-marker-color);
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        display: none;
      }

      .reveal-marker.visible {
        display: block;
      }

      /*
       * Audio-Unlock-Hinweis (E9, Mobile-Tag-1-Regel 8): dezent, verschwindet nach der ersten
       * Pointer-Geste (Phasers eingebautes Unlock, siehe `scenes/MatchScene.ts`s
       * `setupAudioUnlock()`). Unten zentriert, oberhalb der mobilen Bewegungsmodus-Buttons.
       */
      #audio-unlock-hint {
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap) + var(--move-mode-button-size) + var(--hud-gap));
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #audio-unlock-hint.visible {
        opacity: 1;
      }

      /*
       * Mobile Bewegungsmodus-Buttons (P3d, Übergabe-Auftrag „Bewegungsmodi (Schleichen/Gehen/
       * Dash)"): zwei runde DOM-Buttons — Schleichen-TOGGLE (bleibt aktiv bis zum nächsten Tap)
       * + Dash-TAP (einmaliger Wunsch pro Tap, Verdrahtung in `scenes/MatchScene.ts`s
       * `setupMoveModeControls()`, Zustand in `net/moveModeInput.ts`s `MobileMoveModeState`).
       *
       * ANDERS als die reinen HUD-Anzeige-Elemente oben (`pointer-events: none`) sind diese
       * beiden Elemente bewusst `pointer-events: auto` — sie SIND die Eingabe (Mobile-Tag-1-
       * Regel 1: Pointer-only, kein separater Touch-Sonderpfad). `touch-action: none` +
       * `-webkit-tap-highlight-color: transparent` unterdrücken Browser-Standardgesten
       * (Doppel-Tap-Zoom, Tipp-Hervorhebung), die sonst mit dem Whole-Canvas-Joystick
       * kollidieren könnten.
       *
       * Größe ≥ 48 px (Regel 4, `--move-mode-button-size` oben, `min-width`/`min-height` als
       * harte Untergrenze zusätzlich zur Basisgröße). Position relativ zu den Safe-Area-Insets
       * + `--hud-gap` verankert (Regel 3/5), NICHT auf einen festen Bildschirm-Pixelwert.
       *
       * Eigene DOM-Geschwister außerhalb des Phaser-Canvas (nicht dessen Kind): ein Tap auf
       * einen dieser Buttons erreicht Phasers Whole-Canvas-Joystick-`pointerdown`-Listener
       * (`net/pointerJoystick.ts`) dadurch STRUKTURELL nie — kein Joystick-Ursprung wird
       * gesetzt. `stopPropagation()`/`preventDefault()` im jeweiligen Handler
       * (`scenes/MatchScene.ts`) sind zusätzliche, defensive Absicherung, kein Ersatz für diese
       * strukturelle Trennung.
       */
      .mobile-move-mode-button {
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        width: var(--move-mode-button-size);
        height: var(--move-mode-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 0.9rem / 1.2 sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #mobile-sneak-button {
        left: calc(var(--hud-safe-left) + var(--hud-gap));
      }

      /* Aktiv-Zustand des Schleichen-Toggles (`scenes/MatchScene.ts`) — reine Darstellung. */
      #mobile-sneak-button.active {
        background: rgba(255, 255, 255, 0.35);
      }

      #mobile-dash-button {
        right: calc(var(--hud-safe-right) + var(--hud-gap));
      }

      /*
       * Mobile Interaktions-Button (P3e, Übergabe-Auftrag „Verstecken in Objekten (§5), Stufe
       * 1", Entscheidung a): EIN Tap-Button (kein Halten), Verdrahtung in `scenes/MatchScene.ts`s
       * `setupInteractControls()`, Zustand in `net/interactInput.ts`s `MobileInteractState`.
       * Teilt sich die Basis-Optik mit den Bewegungsmodus-Buttons (`.mobile-move-mode-button`,
       * Größe/Form/Touch-Verhalten identisch, Mobile-Tag-1-Regel 4) — bekommt hier NUR eine
       * eigene Position (s. u.).
       */
      #mobile-interact-button {
        /* Haupt-Aktion (Tür/Verstecken) in die gut erreichbare rechte Daumenzone, gestapelt
           ÜBER dem Dash-Button — raus aus der untersten Bildschirm-Mitte, laut Touch-UX-Research
           der am schlechtesten erreichbare Bereich (Felix-Playtest 2026-07-13). */
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap) + var(--move-mode-button-size) + var(--hud-gap));
      }

      /*
       * Sichtbarer floating Joystick (Felix-Playtest 2026-07-13 „Mobile-UI deutlich
       * nutzerfreundlicher" + Touch-UX-Best-Practice „dynamic/floating stick"): rein visuelles
       * DOM-Overlay (`pointer-events: none` — der Whole-Canvas-Joystick UNTER dem Canvas fängt die
       * Eingabe, `scenes/MatchScene.ts`s `setupPointerInput()`). Erscheint am Aufsetzpunkt: Basis-
       * Ring (Durchmesser = 2 × `JOYSTICK_MAX_RADIUS_PX` = 128px), Knauf folgt der Auslenkung
       * (`showJoystickVisual()`). Zentrierung per negativem Margin, damit `left`/`top` den
       * MITTELPUNKT setzen. DOM-früh platziert → die Aktions-Buttons stapeln sichtbar darüber.
       * Graublau/hell, halbtransparent (HUD-Stil, Muster MVP-Joystick).
       */
      #joystick-base,
      #joystick-knob {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        display: none;
      }
      #joystick-base.visible,
      #joystick-knob.visible {
        display: block;
      }
      #joystick-base {
        width: 128px;
        height: 128px;
        margin-left: -64px;
        margin-top: -64px;
        border: 2px solid rgba(138, 147, 166, 0.7);
        background: rgba(17, 20, 28, 0.3);
      }
      #joystick-knob {
        width: 52px;
        height: 52px;
        margin-left: -26px;
        margin-top: -26px;
        background: rgba(232, 238, 247, 0.85);
      }

      /*
       * Versteckt-Hinweis (P3e, Entscheidung m): dauerhafter Hinweis „Du bist versteckt — E zum
       * Verlassen", solange die eigene Figur `isHidden` ist — ANDERS als `#catch-announcement`
       * KEIN Zeit-Ausblenden (Muster `#audio-unlock-hint`), `scenes/MatchScene.ts`s
       * `updateHiddenVisual()`/`initializeHiddenVisual()` schalten ausschließlich die
       * `.visible`-Klasse. Oberhalb der mobilen Buttons verankert (Muster `#audio-unlock-hint`).
       */
      #hidden-hint {
        position: fixed;
        /* über BEIDEN Button-Reihen verankert (Interact sitzt jetzt über Dash rechts). */
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap) + 2 * (var(--move-mode-button-size) + var(--hud-gap)));
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      /*
       * Hinweis (Merge-Doktrin `vollmerge`, Audio = ours-Implementierung): der `tweak-konsole`-
       * Zweig kannte an dieser Stelle noch einen ÄLTEREN, seither ersetzten Kompass-/Stumm-
       * Hinweis-Stand (`#compass-overlay`/`.compass-indicator--*`/`#mute-hint`, gebunden an die
       * inzwischen verworfene Audio-API `SoundEventQuantized`/`SoundDampingStage`/
       * `SoundDistanceStage`, siehe `hud/compass.ts`) — bewusst NICHT übernommen, ERSETZT durch
       * den bereits vorhandenen, aktuellen Stand oben im Dokument (`#sound-compass`/
       * `.sound-compass-indicator--*`, `#reveal-markers`, `#audio-unlock-hint`), der auf der
       * kanonischen `packages/shared/src/sound.ts`-API (`DAMPENING_STAGE_*`, `DISTANCE_STAGE_*`)
       * aufsetzt. Kein UI-Element geht dadurch verloren — dieselbe Funktion (Kompass-Indikatoren,
       * „Tippen für Ton"-Hinweis) existiert bereits unter dem aktuellen Namen.
       */

      #hidden-hint.visible {
        opacity: 1;
      }

      /*
       * Tweak-Konsole & Parameter-Registry, Bündel 3/Scheibe 5 (Dev-Overlay, `vault/20-
       * Architektur/tweak-konsole-konzept.md` §5): `#tweak-console` ist NUR der statische
       * Container — die gesamte Aufbau-/Interaktionslogik (Gruppen/Suche/Filter/Zeilen/Export)
       * lebt in `src/tweak/tweakConsole.ts` und wird NUR im Dev-Build montiert (`import.meta.env
       * .DEV`-Gate + dynamischer `import()` in `scenes/MatchScene.ts`, siehe dort). Dieser CSS-
       * Block selbst ist KEIN Cheat-Vektor (nur Layout, kein Simulationszugriff) und bleibt
       * deshalb bewusst unbedingt im Markup — analog zu jedem anderen HUD-Container hier.
       *
       * Default `display: none` (nicht nur `pointer-events: none`): ein geschlossenes Panel
       * nimmt dadurch StrukturELL keinen Klickbereich ein, das Spiel bleibt uneingeschränkt
       * bedienbar (Mobile-Tag-1-Regel 1). Erst `.tweak-console--open` schaltet es sichtbar +
       * interaktiv.
       *
       * Layout: relativ zu den Safe-Area-Insets verankert (Regel 3/5), Breite `min(92vw, 26rem)`
       * (kein fester Pixelwert, läuft auf 375px nicht über den Rand), eigener scrollbarer
       * Body (`overflow-y: auto; overflow-x: hidden` — kein horizontaler Überlauf). Alle
       * interaktiven Kindelemente bekommen ihre 48px-Mindestgröße über die jeweiligen
       * `.tweak-*`-Klassen unten (Regel 4).
       */
      #tweak-console {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        width: min(92vw, 26rem);
        max-width: 100vw;
        box-sizing: border-box;
        display: none;
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: rgba(10, 10, 16, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--hud-text-color);
        font: 0.85rem / 1.3 sans-serif;
        z-index: 1000;
        pointer-events: none;
      }

      #tweak-console.tweak-console--open {
        display: flex;
        pointer-events: auto;
      }

      .tweak-console__header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
      }

      .tweak-console__search {
        flex: 1 1 8rem;
        min-width: 0;
        min-height: 48px;
        box-sizing: border-box;
      }

      .tweak-console__only-changed {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        min-height: 48px;
      }

      .tweak-console__export {
        min-height: 48px;
        min-width: 48px;
      }

      .tweak-console__export-feedback {
        font-size: 0.75rem;
        opacity: 0.8;
      }

      .tweak-console__body {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .tweak-group__header {
        width: 100%;
        min-height: 48px;
        text-align: left;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: inherit;
        font: inherit;
        font-weight: 600;
        padding: 0.4rem 0.6rem;
        border-radius: 0.3rem;
      }

      .tweak-group__body {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        padding-left: 0.25rem;
      }

      .tweak-group__body--collapsed,
      .tweak-group[hidden],
      .tweak-row[hidden] {
        display: none;
      }

      .tweak-row {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        padding: 0.4rem 0.5rem;
        border-radius: 0.3rem;
        background: rgba(255, 255, 255, 0.04);
      }

      .tweak-row__labels {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
      }

      .tweak-row__key {
        font-family: monospace;
        font-size: 0.7rem;
        opacity: 0.6;
      }

      .tweak-row__scope-badge {
        font-size: 0.7rem;
        padding: 0.1rem 0.4rem;
        border-radius: 0.6rem;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Scope-Farben (Konzept §4): rein informativ, keine neue Kategoriefarbe (Art-Style bleibt unberührt — dieses Panel ist ein Dev-Werkzeug, kein In-Game-Asset). */
      .tweak-row__scope-badge--server-sim {
        color: #38bdf8;
      }

      .tweak-row__scope-badge--client-render {
        color: #4ade80;
      }

      .tweak-row__scope-badge--gesperrt {
        color: rgba(255, 255, 255, 0.4);
      }

      /* Constraint-Warnindikator (Konzept §6): dieselbe Warnfarbe wie die Low-Time-HUD-Warnung (`--hud-low-time-color`) — konsistente Warn-Sprache statt einer neuen, unbegründeten Farbe. */
      .tweak-row__warning {
        font-size: 0.7rem;
        color: var(--hud-low-time-color);
        border: 1px solid var(--hud-low-time-color);
        border-radius: 0.6rem;
        padding: 0.1rem 0.4rem;
      }

      .tweak-row__controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
      }

      .tweak-row__slider {
        flex: 1 1 8rem;
        min-height: 48px;
      }

      .tweak-row__number {
        width: 5rem;
        min-height: 48px;
        box-sizing: border-box;
      }

      .tweak-row__unit {
        font-size: 0.75rem;
        opacity: 0.7;
        min-width: 2.5rem;
      }

      .tweak-row__default {
        font-size: 0.7rem;
        opacity: 0.6;
      }

      .tweak-row__reset {
        min-height: 48px;
        min-width: 48px;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CxgyCIHA.js"></script>
  </head>

    <div id="game-container">
      <div id="minimap-panel"><canvas id="minimap-canvas"></canvas></div>
      <div id="debug-overlay"></div>
      <div id="players-count">Players: 0</div>
      <div id="debug-toggle-button">DBG</div>
      <div id="netlog-export-button">LOG</div>
      <div id="connection-status"></div>
      <div id="catch-announcement"></div>
      <div id="match-timer"></div>
      <div id="wins-counter">Wins: 0</div>
      <div id="match-result"></div>
      <div id="sound-compass"></div>
      <div id="reveal-markers"></div>
      <div id="joystick-base"></div>
      <div id="joystick-knob"></div>

      <div id="hidden-hint">Du bist versteckt — E zum Verlassen</div>
      <div id="mobile-sneak-button" class="mobile-move-mode-button">Schleichen</div>
