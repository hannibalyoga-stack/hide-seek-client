<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!--
      maximum-scale=1 + user-scalable=no (Rotations-Fix, Felix-Befund 2026-07-16): iOS Safari
      zoomt Seiten bei Geräte-Rotation gelegentlich selbstständig (Auto-Zoom-Quirk) — der
      sichtbare Seitenausschnitt „klebt" dann falsch und zieht nicht mit. Für ein
      Vollbild-Canvas-Spiel mit eigenem Kamera-Zoom ist das Abschalten des Seiten-Zooms
      Standardpraxis (der Pinch-Zoom der SEITE ist hier nie gewollt; Spiel-Zoom regelt
      `applyWorldZoom()` in `src/scenes/MatchScene.ts`).
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Hide Seek — Client (Dev)</title>
    <style>
      /*
       * UI-Theme „Dark Souls trifft Harry Potter" (Übernahme-Manifest §4, Posten R3-1,
       * Felix-Freigabe 2026-07-12) — Titel-Schriftart Cinzel, LOKAL geladen (Mobile-Tag-1-
       * Regel 9: kein CDN-Zwang). Derivat `assets/fonts/cinzel-latin.woff2` (woff2,
       * Latin/Latin-1/Latin-Extended-A/allgemeine-Interpunktion-Subset, Variable-Font-Achse
       * `wght` 400–900 erhalten) — Master bleibt `assets-src/fonts/cinzel/Cinzel.ttf`
       * (Asset-Budget-Disziplin Regel 8, Provenienz + Lizenz in `apps/client/public/assets/
       * HERKUNFT.md`/`.meta.json`-Sidecar, SIL OFL 1.1). **Abnahme des Font-Assets durch
       * Felix steht noch aus** (Mensch-Gate Regel 8) — Einsatz unten gilt bis zur Sichtung
       * als Werkstattstand.
       *
       * Reines `@font-face` statt einer FontFace-API-Helferfunktion: das gesamte HUD ist
       * DOM/CSS (kein Phaser-`Text`-Objekt existiert im Client, siehe `config.ts`s
       * `THEME_FONT_FAMILY_TITLE`-Kommentar) — der Browser lädt/anwendet die Schrift dafür
       * bereits vollständig über CSS, `font-display: swap` deckt den Ladezustand ab. Ein
       * JS-Helfer (Muster MVP `uiFont.ts`, „refresh bereits gezeichneter Phaser-Text-Objekte
       * nach Spätladen") wäre spekulativer Code ohne heutigen Aufrufer (Karpathy-Prinzip 2) —
       * Upgrade-Pfad, sobald ein erstes Phaser-`Text`-Objekt Cinzel nutzt (Canvas-Text
       * rendert sonst ggf. mit dem Fallback-Font, falls die Schrift zu diesem Zeitpunkt noch
       * lädt).
       */
      @font-face {
        font-family: "Cinzel";
        src: url("assets/fonts/cinzel-latin.woff2") format("woff2");
        font-weight: 400 900;
        font-style: normal;
        font-display: swap;
      }

      /*
       * Mobile-Tag-1-Regeln (CLAUDE.md, Übergabe-Aufträge T4a/T4c):
       * - UI-Layout relativ (%, vw/vh), keine festen Pixelkoordinaten (Regel 3).
       * - Safe-Area-Insets ab Tag 1 (Regel 5): ALLE VIER env(safe-area-inset-*) mit
       *   Fallback, nicht nur die oberen drei — das Debug-HUD sitzt oben (top/left/right),
       *   die neue Statuszeile unten (bottom/left/right), zusammen decken beide Elemente
       *   alle vier Seiten ab.
       * - Debug-Overlay-/Statuszeilen-Text ist explizit von der "Schrift >= 18pt"-Regel
       *   ausgenommen (siehe .claude/skills/mobile-first-review/SKILL.md) — beides ist
       *   reiner Diagnose-/Debug-Text, keine Spieler-UI.
       * - Beide HUD-Elemente sind `pointer-events: none` (Regel 1: der Whole-Canvas-
       *   Joystick bleibt der EINZIGE Eingabepfad, kein Overlay darf ihn stoeren).
       *
       * CSS-Custom-Properties statt wiederholter Literale (T4c): Abstand, Schriftgröße und
       * Textfarbe sind hier EINMAL benannt, beide HUD-Elemente referenzieren dieselben
       * Variablen statt eigener Zahlen.
       */
      :root {
        --hud-safe-top: env(safe-area-inset-top, 0px);
        --hud-safe-right: env(safe-area-inset-right, 0px);
        --hud-safe-bottom: env(safe-area-inset-bottom, 0px);
        --hud-safe-left: env(safe-area-inset-left, 0px);
        --hud-gap: 0.5rem;
        --hud-font-size: 1rem;
        --hud-text-color: #fff;
        /*
         * UI-Theme „Dark Souls trifft Harry Potter" (Übernahme-Manifest §4, Posten R3-1,
         * Felix-Freigabe 2026-07-12) — DOM-Gegenstück zu `apps/client/src/config.ts`s
         * `THEME_*`-Konstanten (bewusst dupliziert, kein gemeinsamer Import zwischen
         * Phaser-Canvas und DOM/CSS, siehe Kommentar dort). Palette aus `vault/10-Kanon/
         * art-style.md`. `--theme-font-title` (Cinzel, `@font-face` oben) NUR für
         * Überschriften/Labels (hier: `#connection-status`) — NIE für Fließtext, Timer oder
         * Zahlwerte (bei 375 px unleserlich, Leitplanke des Übergabe-Auftrags), dafür
         * `--theme-font-body`. `--theme-letter-spacing-title` gibt Cinzels gravierten
         * Versalien/Petite-Caps zusätzlichen Zeichenabstand (typografische Standardpraxis für
         * diese Schriftfamilie), NUR zusammen mit `--theme-font-title` gesetzt.
         */
        --theme-font-title: "Cinzel", Georgia, "Times New Roman", serif;
        --theme-font-body: Georgia, "Iowan Old Style", "Palatino Linotype", "Times New Roman", serif;
        --theme-letter-spacing-title: 0.04em;
        --theme-color-charcoal: #1c1a17;
        --theme-color-brass: #b08d57;
        --theme-color-gold: #d4af37;
        --theme-color-text-title: var(--theme-color-gold);
        --theme-color-text-body: #e8e1d3;
        /*
         * Low-Time-Warnfarbe (Übergabe-Auftrag P3c-2, Ziel 6, Critic-Auflage 6): warmes Amber
         * statt Kampf-/Verletzungs-Rot (K1, design-neutral) — reine Darstellung, kein Sound.
         */
        --hud-low-time-color: #ffb300;
        /*
         * Endgame-Countdown-Farbe (Übergabe-Auftrag P3c-3 „Portal-Endgame-Mechanik (editor-
         * unabhängig)"): dasselbe Violett wie die Portal-Ringe (`PORTAL_COLOR`,
         * `apps/client/src/config.ts`) — visuell klar unterscheidbar vom Haupttimer/der
         * Low-Time-Warnung, reine Darstellung, kein Sound.
         */
        --hud-endgame-color: #a78bfa;
        /*
         * Randmarker-Pfeilfarbe (Übergabe-Auftrag P3g „Shrink-Endgame", Entwurfs-Entscheidung i;
         * Kompass-Pfeil-Vereinheitlichung, Felix-Auftrag 2026-07-17, Konzept Q3): Violett
         * (`REVEAL_MARKER_COLOR`, `apps/client/src/config.ts`) statt des vormaligen Shrink-
         * Zonen-Rots — ein Reveal-Marker zeigt die EXAKTE Position eines aufgedeckten
         * Verstecker, das ist ein anderes Präzisionsniveau als ein grober 16-Sektor-Sound-Cue
         * (Präzisions-Ehrlichkeit) und darf deshalb nicht wie dieser aussehen. Die Rot-Zonen-
         * FLÄCHE (`SHRINK_ROT_FILL_COLOR`) bleibt unverändert rot — nur der Pfeil wird violett.
         */
        --reveal-marker-color: #a78bfa;
        /* Randmarker-Kantenlänge in Pixeln (`REVEAL_MARKER_SIZE_PX`, `apps/client/src/config.ts`). */
        --reveal-marker-size: 20px;
        /*
         * Mobile-Einzug für Kompass-/Reveal-Marker-Pfeile (Felix-Anweisung 2026-07-18,
         * verbindlich, nach Sichtung): auf einem kleinen Touch-Bildschirm sitzen die Pfeile an
         * der reinen Safe-Area-Kante zu nah am physischen Rand (Daumen/Gehäuse verdecken sie
         * leicht) — auf Desktop ist „von oben kommen" dagegen erwünscht und bleibt unverändert.
         * Wirkt NUR unter `@media (pointer: coarse)` (s. `#sound-compass`/`#reveal-markers`
         * unten) — auf `0px` gesetzt bedeutet: kein zusätzlicher Einzug (Desktop-Default).
         */
        --kompass-rand-einzug-touch: 24px;
        /*
         * Rumpel-HUD-Balken (Versteck-Rumpeln, Anti-Camper §5, ursprünglich Client-/Sound-
         * Scheibe R1c, Felix-Feel-Vorgabe „1:1 aus dem MVP"). **Mobile-Redesign „der Balken ist
         * selbst das Tap-Ziel" (Übergabe-Auftrag `2026-07-16-rumpel-balken-tap-redesign.md`,
         * Felix-Konzeptrunde 2026-07-16):** löst den separaten „JETZT!"-Button ab (Split-
         * Attention-Problem — Auge folgt dem Marker, Daumen musste einen räumlich getrennten
         * Button treffen). Breite jetzt `min(72vw, 420px)` (Mobile-Regel 3: relativ zur
         * Bildschirmbreite, nicht fest, mit fester Obergrenze für große Bildschirme), Höhe
         * **60 px** (Felix-Entscheid 1) statt vormals 16 px — der Balken selbst ist jetzt groß
         * genug, um ein komfortables Tap-Ziel zu sein, ZUSÄTZLICH umschlossen von der
         * unsichtbaren `--rumble-bar-hit-halo`-Polsterung des `#rumble-bar-hit`-Wrappers unten
         * (E1). Grüne Trefferzone (`#37d67a`) + Marker (Weiß `#ffffff`, im Grün Gold `#ffd166`)
         * unverändert exakt nach ursprünglicher Auftragsvorgabe — Marker-Breite `6px → 10px`
         * (Mobile-Redesign, sichtbar breiter auf der größeren Fläche).
         */
        --rumble-bar-width: min(72vw, 420px);
        --rumble-bar-height: 60px;
        --rumble-bar-marker-width: 10px;
        --rumble-zone-color: #37d67a;
        --rumble-marker-color: #ffffff;
        --rumble-marker-color-hit: #ffd166;
        /*
         * Mobile-Redesign (s. o.): sichtbarer Rahmen + abgerundete Ecken als Affordance „das ist
         * ein Bedienelement" (der Balken war vorher `pointer-events: none`, reine Anzeige — jetzt
         * ist er selbst das Tap-Ziel, s. `#rumble-bar-hit` unten). `--rumble-bar-hit-halo` ist die
         * UNSICHTBARE Polsterung des Wrapper-Elements `#rumble-bar-hit` (E1: Trefferfläche größer
         * als die sichtbare Balkenfläche, ohne die Marker-/Zonen-Prozent-Formel zu berühren) —
         * effektive Trefferhöhe damit `60px + 2 × 12px = 84px`, weit über der Mobile-Tag-1-
         * Mindestgröße von 48 px (Regel 4). `--rumble-bar-appear-pop-scale-start` ist der
         * Start-Skalierungsfaktor des Erscheinen-Pops (`@keyframes rumble-bar-appear-pop` unten,
         * Dauer `RUMBLE_BAR_APPEAR_POP_DURATION_MS` aus `src/config.ts`, bewusste Duplikation,
         * kein CSS-Import aus TypeScript möglich, Muster `--rumble-result-miss-color`).
         */
        --rumble-bar-radius: 14px;
        --rumble-bar-border-width: 1.5px;
        --rumble-bar-border-color: rgba(255, 255, 255, 0.45);
        --rumble-bar-hit-halo: 12px;
        --rumble-bar-appear-pop-scale-start: 0.92;
        /*
         * Ausgang-Feedback-Blitz (`#rumble-bar.result-hit`/`.result-miss` unten): Erfolgs-Blitz
         * nutzt `--rumble-zone-color` direkt wieder (dieselbe Trefferzonen-Farbe, kein zweites
         * Grün). `--rumble-result-miss-color` dupliziert bewusst den Wert von
         * `apps/client/src/config.ts`s `RUMBLE_RESULT_MISS_COLOR` (Muster `--hud-endgame-color`/
         * `PORTAL_COLOR`: kein CSS-Import aus TypeScript möglich, beide Stellen MÜSSEN bei einer
         * Änderung von Hand synchron gehalten werden) — `RUMBLE_RESULT_MISS_COLOR` färbt seit der
         * Feel-Optimierung (Felix-Auftrag 2026-07-16) zusätzlich die Füllung des „!"-Weltsymbols
         * (`scenes/MatchScene.ts`s `triggerWorldBetraySighted()`, Feature B, Umbau Aufgabe 0 — EIN
         * Warnrot statt eines zweiten).
         */
        --rumble-result-miss-color: #ef4444;
        /*
         * Mobile Bewegungsmodus-Buttons (P3d, Übergabe-Auftrag „Bewegungsmodi (Schleichen/
         * Gehen/Dash)"): 3,5rem ≈ 56px bei Standard-Root-Schriftgröße — komfortabel über der
         * Mobile-Tag-1-Mindestgröße von 48px (Regel 4), relativ zur Root-Schriftgröße (nicht
         * hart auf einen Bildschirm-Pixelwert verdrahtet, skaliert mit Nutzer-/Browser-
         * Textgrößeneinstellungen) statt eines zweiten, potenziell abweichenden Literalwerts.
         */
        --move-mode-button-size: 3.5rem;
        /*
         * Haupt-Aktionsbutton Interagieren (Felix-Auftrag 2026-07-17, Mobile-Layout-Umbau
         * Richtung Wild-Rift-Muster: die PRIMÄRE Aktion sitzt als GRÖSSTER Button in der
         * rechten unteren Ecke, sekundäre Aktionen kleiner daneben — MVP-Vorbild identisch:
         * Aktions-Button R=46 > Sneak R=40): 4,5rem = 72px bei Standard-Root, deutlich über
         * der Mindestgröße (Regel 4), relativ zur Root-Schriftgröße (Muster
         * `--move-mode-button-size`).
         */
        --interact-button-size: 4.5rem;
        /*
         * Debug-HUD-Toggle-Button (Playtest-Fix, Felix 2026-07-11): 3,25rem = 52px bei
         * Standard-Root-Schriftgröße — über der Mobile-Tag-1-Mindestgröße von 48px (Regel 4),
         * `min-width`/`min-height: 48px` unten als harte Untergrenze zusätzlich (Muster
         * `--move-mode-button-size`).
         */
        --debug-toggle-button-size: 3.25rem;
        /*
         * Item-Bar (Felix-Auftrag 2026-07-17, Übernahme der MVP-Aktionsleiste „Verstecken
         * Spiel"): unten in der rechten Daumenzone, Reihenfolge Dash · Zauber — Abstand — 3
         * Items. Werte 1:1 aus dem MVP portiert (dort `balance.ts` SLOT_SIZE/SLOT_GAP/…), nur
         * px→rem umgesetzt (Regel 3: relativ zur Root-Schriftgröße, skaliert mit
         * Nutzer-Textgröße, nicht auf einen festen Bildschirm-Pixelwert verdrahtet).
         *
         * `--item-slot-size: 3.375rem` = 54px bei Standard-Root — exakt der MVP-Wert, komfortabel
         * über der Mobile-Tag-1-Mindestgröße von 48px (Regel 4), `min-*: 48px` unten als harte
         * Untergrenze zusätzlich. Farb-/Cooldown-Werte spiegeln die MVP-Zeichenkonstanten
         * (`hudShared.ts`: Panel 0x12141c@0.72, Cooldown-Wipe 0x000000@0.55, leerer Slot 0x555a66,
         * Dash-Akzent 0x8fd0ff). Zauber-Akzent = Portal/Endgame-Violett (`--hud-endgame-color`),
         * bewusst wiederverwendet für den „immer vorhandenen" Zauber (Platzhalter bis das
         * Zauber-System gemergt ist).
         */
        --item-slot-size: 3.375rem;
        --item-slot-icon-size: 1.875rem;
        --item-slot-radius: 10px;
        --item-slot-inner-inset: 5px;
        --item-slot-gap: 0.4rem;
        --item-bar-group-gap: 1.25rem;
        --item-bar-height: var(--item-slot-size);
        --item-slot-panel-bg: rgba(18, 20, 28, 0.72);
        --item-slot-accent-empty: #555a66;
        --item-slot-accent-dash: #8fd0ff;
        --item-slot-accent-spell: var(--hud-endgame-color);
        /*
         * Licht-Zauber-Trio (`vault/20-Architektur/auftraege/2026-07-17-licht-zauber.md`,
         * Schritt 17): dynamische Zauber-Slots bekommen eine DISTINKTE Akzentfarbe je Wirkungs-
         * Kategorie (kosmetisch, `spell.category`) statt der einen bisherigen Violett-Farbe —
         * Tür-Zauber bleiben violett (`--item-slot-accent-spell`, unverändert), Licht-Zauber
         * bekommen ein warmes Bernstein/Gold (thematisch „Licht").
         */
        --item-slot-accent-spell-door: var(--hud-endgame-color);
        --item-slot-accent-spell-light: #f5c451;
        /*
         * Runen-Falle (`vault/20-Architektur/auftraege/2026-07-17-runen-falle.md`, Schritt 12):
         * vierter Zauber, eigene Kategorie „rune" — Smaragd/Grün, abgegrenzt von Tür-Violett und
         * Licht-Gelb (kosmetisch, `scenes/MatchScene.ts`s `renderSpellSlots()`).
         */
        --item-slot-accent-spell-rune: #2ecc71;
        --item-slot-cooldown-color: rgba(0, 0, 0, 0.55);
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #game-container {
        position: relative;
        width: 100vw;
        /* dvh: boden-verankerte Buttons liegen nie hinter der ein-/ausklappenden Mobile-
           Browserleiste; 100vh als Fallback für ältere Browser (Felix-Playtest 2026-07-13). */
        height: 100vh;
        height: 100dvh;
      }

      /*
       * Debug-HUD (Playtest-Fix, Felix 2026-07-11: „das große Debug-Overlay stört sehr im
       * normalen Spiel"): startet AUSGEBLENDET (`display: none` Default), `#debug-toggle-
       * button` schaltet die `.visible`-Klasse um (`scenes/MatchScene.ts`s `setupDebugToggle()`).
       * `top` verschoben (Muster `#wins-counter` unter `#match-timer`), damit die IMMER
       * sichtbare `#players-count`-Zeile darüber Platz hat, ohne zu überlappen.
       */
      #debug-overlay {
        display: none;
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + 2em);
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        white-space: pre-line;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      #debug-overlay.visible {
        display: block;
      }

      /*
       * Spielerzahl-HUD (Playtest-Fix, Felix 2026-07-11): dauerhaft sichtbar, NICHT Teil des
       * togglebaren Debug-Overlays („muss immer existieren"). Oben links verankert (Safe-Area,
       * Regel 3/5) — derselbe Eckenbereich wie `#debug-overlay`, aber IMMER sichtbar.
       */
      #players-count {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      /*
       * Debug-HUD-Toggle-Button (Playtest-Fix, Felix 2026-07-11): oben rechts verankert, ÜBER
       * `#match-timer`/`#wins-counter` (die beide entsprechend nach unten verschoben sind).
       * Muster `.mobile-move-mode-button` (Größe ≥ 48px, Safe-Area, `pointer-events: auto` — DAS
       * ist die Eingabe, kein Whole-Canvas-Joystick-Konflikt dank `stopPropagation()` im
       * Handler). Funktioniert identisch per Maus (Desktop) UND Touch (Mobile-Tag-1-Regel 1:
       * EIN Pointer-Eingabepfad).
       */
      #debug-toggle-button {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 0.75rem / 1.2 sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      /* Aktiv-Zustand (Debug-Overlay gerade eingeblendet) — reine Darstellung, Muster `#mobile-sneak-button.active`. */
      #debug-toggle-button.active {
        background: rgba(255, 255, 255, 0.35);
      }

      /*
       * NetLog-Export-Button (Netcode-Messstand, Auftrag `vault/20-Architektur/auftraege/
       * 2026-07-15-netcode-messstand.md`, Baustein A): startet AUSGEBLENDET (`display: none`
       * Default, Muster `#debug-overlay`) — `scenes/MatchScene.ts`s `setupNetLog()` schaltet die
       * `.visible`-Klasse NUR bei aktivem `?netlog`-URL-Parameter frei (kein Button, kein
       * `pointer-events`-Ziel im Normalbetrieb). Direkt links neben `#debug-toggle-button`
       * verankert (derselbe Größen-/Safe-Area-/Pointer-Only-Rahmen, Mobile-Tag-1-Regeln 1/3/4/5).
       */
      #netlog-export-button {
        display: none;
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap));
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 0.65rem / 1.2 sans-serif;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #netlog-export-button.visible {
        display: flex;
      }

      /*
       * Dev-Reset-Werkzeug (`vault/30-Systeme/dev-reset-werkzeug.md`, Felix-Auftrag „Raum leeren
       * & neu starten"): startet AUSGEBLENDET (`display: none` Default, Muster
       * `#netlog-export-button`) — `scenes/MatchScene.ts`s `setupDevResetButton()` schaltet die
       * `.visible`-Klasse NUR frei, wenn dasselbe Dev-Gate wie die Tweak-Konsole aktiv ist
       * (`tweak/devGate.ts`s `isDevGateActive()`). Bewusst NICHT in der `html.touch-ui`-Ausblend-
       * Liste weiter unten (anders als `#debug-toggle-button`/`#tweak-console-toggle`) — dieser
       * Button muss AUCH auf Touch erreichbar bleiben, die Tweak-Konsole ist dort sonst gar nicht
       * mehr auslösbar. Unten LINKS verankert (Safe-Area, Regel 3/5) — der komplett freie
       * Gegenpol zum rechten Daumen-Cluster (Item-Leiste/Interact/Move-Mode-Buttons) UND zur
       * oberen Ecken-Belegung (Minimap links, Debug/NetLog rechts), damit ein Fehl-Tap im
       * hitzigen Spielgeschehen unwahrscheinlich bleibt.
       */
      #dev-reset-button {
        display: none;
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 1.3rem / 1.2 sans-serif;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #dev-reset-button.visible {
        display: flex;
      }

      /*
       * Statuszeile (Übergabe-Auftrag T4c, Felix-Default E-T4c-4): eigenständiges,
       * nicht-interaktives Element für den dreiwertigen Verbindungsstatus ("verbunden" /
       * "reconnecte…" / "Verbindung verloren") — bewusst getrennt vom technischen
       * Debug-HUD oben, damit der reine Verbindungszustand auf einen Blick sichtbar bleibt.
       * Unten verankert (safe-area-inset-bottom), damit zusammen mit #debug-overlay oben
       * alle vier Insets tatsächlich genutzt werden.
       *
       * UI-Theme (R3-1): Cinzel-Titelschrift — die drei möglichen Texte sind kurze
       * Status-LABELS (keine Sätze/Zahlwerte, Leitplanke des Übergabe-Auftrags), damit ein
       * legitimer Cinzel-Anwendungsfall (vormals `monospace`).
       */
      #connection-status {
        position: fixed;
        /* Über den KOMPLETTEN rechten Daumen-Cluster gehoben (Wild-Rift-Umbau 2026-07-17):
           auf der Button-Etage kollidierte die zentrierte Statuszeile bei 375px mit dem
           dorthin gezogenen Schleichen-Toggle. Formel = `#hidden-hint`-Anker + eine Zeile
           Abstand (1.8em), damit sich beide zentrierten Texte auch gleichzeitig nie
           überlappen (der Versteckt-Hinweis steht direkt darunter). */
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap) +
            var(--interact-button-size) + var(--hud-gap) + 1.8em
        );
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--theme-color-text-title);
        font: var(--hud-font-size) / 1.4 var(--theme-font-title);
        letter-spacing: var(--theme-letter-spacing-title);
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      /*
       * Fang-Moment-Einblendung (Übergabe-Auftrag P3c-1, Ziel 5, Critic-Auflage 2): kurze,
       * zentrierte HUD-Meldung ("<Rolle> wurde zum Geist"), unabhängig vom technischen
       * Debug-HUD — relatives Layout (Regel 3), pointer-events: none (Regel 1). Ein-/
       * Ausblenden per CSS-Transition über die `.visible`-Klasse, die
       * `scenes/MatchScene.ts` zeitgesteuert (`CATCH_ANNOUNCEMENT_DURATION_MS`) setzt/entfernt.
       *
       * UI-Theme (R3-1): Georgia-Fließschrift (die Meldungstexte sind volle Sätze, z. B. „Ein
       * Verstecker wurde zum Geist" — Leitplanke des Übergabe-Auftrags verbietet Cinzel für
       * Fließtext), aber mit der Titel-Akzentfarbe (Gold) statt neutralem Weiß — hebt die
       * Ansage als „großen Moment" hervor, ohne die Lesbarkeit von Cinzels Versalien zu riskieren.
       */
      #catch-announcement {
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(90vw, 32rem);
        color: var(--theme-color-text-title);
        font: calc(var(--hud-font-size) * 1.3) / 1.4 var(--theme-font-body);
        text-align: center;
        text-shadow: 0 0 6px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #catch-announcement.visible {
        opacity: 1;
      }

      /*
       * Timer-HUD (Übergabe-Auftrag P3c-2 „Formales Matchende + Sieg", Ziel 6): dauerhaft
       * sichtbare MM:SS-Zeile, eigenständiges DOM-Element (NICHT Teil des `#debug-overlay`-
       * Textblocks, siehe `scenes/MatchScene.ts`s `updateMatchTimerHud()`-Dokumentation) — oben
       * rechts verankert, damit sie sich nicht mit dem linksbündigen `#debug-overlay`-Text
       * überlappt. Relatives Layout (Regel 3), `pointer-events: none` (Regel 1).
       */
      /*
       * Playtest-Fix (Felix, 2026-07-11): `top` um `--debug-toggle-button-size` + Gap nach unten
       * verschoben — Platz für den neuen `#debug-toggle-button` oben rechts (Muster: derselbe
       * additive Offset wie `#wins-counter` unter `#match-timer`, nur eine Ebene höher).
       *
       * UI-Theme (R3-1): Georgia-Fließschrift statt Cinzel (Leitplanke des Übergabe-Auftrags:
       * Cinzel NIE für Timer/Zahlwerte — bei 375 px unleserlich), `tabular-nums` hält die
       * Ziffernbreite beim Sekundenwechsel stabil (kein Zittern der MM:SS-Zeile). Die
       * `.low-time`-/`.endgame`-Zustandsfarben unten bleiben unverändert (eigene, bereits
       * K1-geprüfte Warnfarben, kein Teil dieses Themes).
       */
      #match-timer {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--theme-color-text-body);
        font: calc(var(--hud-font-size) * 1.4) / 1.4 var(--theme-font-body);
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      /*
       * Low-Time-Warnung (Critic-Auflage 6): Farbwechsel + Puls in den letzten
       * `MATCH_LOW_TIME_WARNING_TICKS` (siehe `hud/matchTimer.ts`s `isMatchLowTime`) — reine
       * Darstellung, kein Sound.
       */
      #match-timer.low-time {
        color: var(--hud-low-time-color);
        animation: match-timer-pulse 800ms ease-in-out infinite;
      }

      @keyframes match-timer-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /*
       * Endgame-Countdown (Übergabe-Auftrag P3c-3, Entscheidung i): schaltet dieselbe
       * Timer-Zeile auf eine eigene Farbe um, sobald `scenes/MatchScene.ts`s
       * `updateMatchTimerHud()` per `isEndgamePhase(...)` in die Endgame-Phase wechselt — bewusst
       * OHNE Puls (reine Farbunterscheidung genügt, kein zweiter Dauer-Puls neben `low-time`).
       * Schließt sich mit `.low-time` gegenseitig aus (`updateMatchTimerHud()` entfernt jeweils
       * die andere Klasse).
       */
      #match-timer.endgame {
        color: var(--hud-endgame-color);
      }

      /*
       * Wins-HUD (Übergabe-Auftrag „Matchflow: Rollen-Rotation + Rematch", Entwurfs-Entscheidung
       * d/AK-10, Kanon §7: Spieltexte Englisch): dauerhafte EIGENANZEIGE „Wins: n" — direkt UNTER
       * `#match-timer` verankert (safe-area + Gap + eine Zeilenhöhe, relatives Layout, Regel 3),
       * reine Text-Ausgabe, kein neues Touch-Target (Regel 4 nicht einschlägig).
       */
      #wins-counter {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap) + 2em);
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        transition:
          transform 200ms ease,
          color 200ms ease;
      }

      /* Blitz-Nit (Game-Design-Critic-Review): kurzer Aufblitz-Zustand bei Sieg-Inkrement — reine CSS-Transition, `scenes/MatchScene.ts`s `updateWinsHud()` schaltet die Klasse zeitgesteuert. */
      #wins-counter.pulse {
        color: var(--hud-endgame-color);
        transform: scale(1.3);
      }

      /*
       * Item-Ladungs-Pips (Auftrag „Besen als erstes Item + minimales Item-Nutzungs-Fundament
       * (Runde 1)"): eigene, self-only Zeile UNTER `#wins-counter` (Muster dortiger Positionierung,
       * `2em` weiterer Zeilenabstand) — `●`/`○`-Zeichen als einfache, lesbare Pips (AK-7), gefüllt
       * durch `scenes/MatchScene.ts`s `updateItemHud()`. `display: none` Default (nur sichtbar,
       * solange ein Item im Slot liegt), `.visible` schaltet frame-genau um (Muster
       * `#netlog-export-button`).
       */
      #item-charges-hud {
        display: none;
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap) + 4em);
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      #item-charges-hud.visible {
        display: block;
      }

      /*
       * Ergebnis-Overlay (Übergabe-Auftrag P3c-2, Entwurfs-Entscheidung g): eigenständiges
       * DOM-Element — NICHT `#catch-announcement` wiederverwendet (das blendet nach
       * `CATCH_ANNOUNCEMENT_DURATION_MS` aus; das Ergebnis muss die vollen
       * `MATCH_END_DELAY_TICKS` sichtbar stehen). Mehrzeiliger Text (`white-space: pre-line`,
       * siehe `scenes/MatchScene.ts`s `renderMatchResultText()`), zentriert, relatives Layout
       * (Regel 3), `pointer-events: none` (Regel 1).
       *
       * UI-Theme (R3-1): Georgia-Fließschrift (der Text enthält Zahlwerte — „3/5" etc.,
       * Leitplanke des Übergabe-Auftrags verbietet Cinzel dafür), Titel-Akzentfarbe (Gold,
       * Muster `#catch-announcement`) — zweite Hälfte der „Ansagen"-Familie.
       */
      #match-result {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(90vw, 32rem);
        color: var(--theme-color-text-title);
        font: calc(var(--hud-font-size) * 1.3) / 1.5 var(--theme-font-body);
        text-align: center;
        text-shadow: 0 0 6px #000;
        white-space: pre-line;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #match-result.visible {
        opacity: 1;
      }

      /*
       * Minimap „Marauder's Map" (Übernahme-Manifest §4, Posten R3-2, Felix-Freigabe
       * 2026-07-12, K2-Referenz `realMiniMap.ts` im read-only MVP-Ordner): Pergament-Panel mit
       * statischer Wand-/Raum-Geometrie + eigenem Fußspuren-Trail (`hud/minimap.ts`,
       * `scenes/MatchScene.ts`s `setupMinimapDom()`/`updateMinimapHud()`). Reines DOM-
       * `<canvas>`-Overlay (Muster `#sound-compass`/`#reveal-markers`), Safe-Area-bereinigt
       * (Mobile-Regel 5). `pointer-events: none` (Regel 1) — reine Anzeige, stört den
       * Whole-Canvas-Joystick nie. **Bewusst als ERSTES Kind von `#game-container` platziert**
       * (siehe Markup unten): alle anderen `position: fixed`-HUD-Elemente (Timer, Wins-Zähler,
       * Debug-Toggle-Button …) stapeln sich per Default-DOM-Reihenfolge sichtbar DARÜBER —
       * „eigene Ebene über der Welt, unter dem DOM-HUD" ist damit strukturell erfüllt, kein
       * `z-index` nötig. Zeichenfläche in FESTER Pixelgröße (kein Zoom-Bezug, anders als die
       * Phaser-Kamera — DOM-Layout ist zoom-unabhängig), berechnet über `hud/minimap.ts`s
       * `computeMinimapLayout()` (siehe `setupMinimapDom()`).
       *
       * **ESP-Leitplanke (Kanon §7/Interest-Management, load-bearing):** zeigt AUSSCHLIESSLICH
       * die EIGENE Position (Trail) + statische Geometrie — NIEMALS fremde Spieler, NIEMALS den
       * Live-Türzustand (siehe `updateMinimapHud()`-Dokumentation in `MatchScene.ts`).
       *
       * **Position oben LINKS (R3-Nachzug, Felix-Freigabe 2026-07-12, vormals oben rechts):**
       * `left` statt `right` verankert (Safe-Area-Inset links, Mobile-Regel 5). `top` um `2em`
       * zusätzlich verschoben — GENAU dasselbe Muster wie `#debug-overlay`s Offset weiter unten
       * (Kommentar dort: „damit die IMMER sichtbare `#players-count`-Zeile darüber Platz hat,
       * ohne zu überlappen") —, denn `#players-count` sitzt in DERSELBEN oben-links-Ecke und
       * bleibt IMMER sichtbar (siehe dort). Ohne diesen Offset würde das ~150×150px-Panel
       * (`MINIMAP_PANEL_MAX_WIDTH_PX`/`_HEIGHT_PX`, `config.ts`) die „Players: N"-Zeile
       * überdecken.
       */
      #minimap-panel {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + 2em);
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        /*
         * Tap-Toggle (Felix-Auftrag 2026-07-17, Mobile-Layout-Umbau): das Panel ist seither
         * SELBST ein Tap-/Klick-Ziel (ein Tap klappt die Karte auf den kleinen Karten-Knopf
         * `#minimap-restore-button` zusammen, ein weiterer klappt sie wieder auf) — deshalb
         * `pointer-events: auto` statt des früheren `none`. Dasselbe Pointer-only-Muster wie
         * `.mobile-move-mode-button` (EIN Eingabepfad für Maus UND Touch, `touch-action: none`
         * gegen Doppel-Tap-Zoom, `stopPropagation()` im Handler in `scenes/MatchScene.ts`s
         * `setupMinimapDom()` — strukturell erreicht ein Panel-Tap den Whole-Canvas-Joystick
         * ohnehin nie, das Panel ist DOM-Geschwister des Phaser-Canvas). Das aufgeklappte Panel
         * (~150×110px, `MINIMAP_PANEL_MAX_*_PX`) und der zusammengeklappte Knopf (≥48px, s. u.)
         * liegen beide über der Mobile-Tag-1-Mindestgröße (Regel 4).
         */
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        cursor: pointer;
      }

      #minimap-canvas {
        display: block;
        border-radius: 2px;
      }

      /*
       * Zusammengeklappter Minimap-Zustand (`.minimap-panel--minimized`, geschaltet in
       * `scenes/MatchScene.ts`s `setupMinimapDom()`-Tap-Handler): Canvas weg, stattdessen ein
       * kleiner runder Karten-Knopf an derselben Stelle (Optik-Muster `#debug-toggle-button`,
       * Größe ≥48px, Regel 4) — die Karte verschwindet nie „spurlos", der Weg zurück bleibt
       * sichtbar an Ort und Stelle.
       */
      #minimap-restore-button {
        display: none;
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        align-items: center;
        justify-content: center;
      }

      #minimap-restore-button svg {
        width: 1.6rem;
        height: 1.6rem;
        display: block;
      }

      #minimap-panel.minimap-panel--minimized #minimap-canvas {
        display: none;
      }

      #minimap-panel.minimap-panel--minimized #minimap-restore-button {
        display: flex;
      }

      /*
       * Kompass-Pfeil-Vereinheitlichung (Felix-Auftrag 2026-07-17, `vault/20-Architektur/
       * kompass-pfeil-vereinheitlichung-konzept.md`): EINE gemeinsame Pfeil-GEOMETRIE für den
       * Sound-Kompass UND die Reveal-Marker (weiter unten) — Q3/Architektur-Auflage: nur die
       * OPTIK ist gemeinsam, Zustands-Logik/DOM-Pool bleiben vollständig getrennt (zwei eigene
       * `#sound-compass`/`#reveal-markers`-Container, zwei eigene Element-Pools). Spitze zeigt
       * in der CSS-Neutralstellung nach OBEN (Norden) — ein echter Pfeil mit Schaft-Andeutung
       * (Kopf + schmaler Steg), nicht bloß ein Dreieck. Rotation kommt IMMER als Inline-
       * `transform: rotate(angleRad + PI/2)` von `scenes/MatchScene.ts` (`updateSoundCompassHud`/
       * `updateRevealMarkersHud`), deshalb bewusst KEIN `transform` in dieser Klasse selbst.
       * Form kommt aus dem von Felix abgenommenen Pfeil-Asset (Variante C „Runen-Chevron",
       * Abnahme 2026-07-18; Master `assets-src/ui/kompass-pfeil/kompass-pfeil-c.png`,
       * Derivat 64×56 px) als Alpha-MASKE: EIN Asset, Färbung bleibt wie bisher pro Element
       * über `background-color`. Relativer Pfad, damit Dev (`/`) UND GitHub-Pages-Deploy
       * (`--base=./`) funktionieren (Mobile-Regel 9: lokal bündelbar, kein CDN).
       */
      .kompass-pfeil {
        -webkit-mask: url("assets/ui/kompass-pfeil.png") center / contain no-repeat;
        mask: url("assets/ui/kompass-pfeil.png") center / contain no-repeat;
      }

      /*
       * Sound-Kompass (Übergabe-Auftrag „Spatial Audio Stufe 1", Scheibe B, E10): Container
       * füllt die Fläche INNERHALB der Safe-Area-Insets (Mobile-Regel 5 — Randindikatoren sind
       * der klassische Notch-Konflikt) — `scenes/MatchScene.ts`s `computeEdgePositionPercent`
       * rechnet in Prozent RELATIV zu genau dieser Fläche (`container.clientWidth/Height`,
       * Mobile-Regel 3: relatives Layout, keine festen Pixelkoordinaten). `pointer-events: none`
       * (Regel 1): der Kompass darf den Whole-Canvas-Joystick nie stören. Fester Element-Pool
       * (`KOMPASS_MAX_INDIKATOREN` Stück, in `setupSoundCompassDom()` einmalig angelegt) —
       * `.visible` schaltet Sichtbarkeit, Position/Größe/Farbe/Rotation kommen als Inline-Styles
       * pro Frame (`updateSoundCompassHud()`); die Form kommt von `.kompass-pfeil` (immer Pfeil,
       * keine Formunterscheidung mehr nach Rolle — Kompass-Pfeil-Vereinheitlichung).
       */
      #sound-compass {
        position: fixed;
        top: var(--hud-safe-top);
        right: var(--hud-safe-right);
        bottom: var(--hud-safe-bottom);
        left: var(--hud-safe-left);
        pointer-events: none;
      }

      /*
       * `.sound-compass-indicator` trägt selbst KEIN `transform` mehr (Kompass-Pfeil-
       * Vereinheitlichung, Felix-Auftrag 2026-07-17): `scenes/MatchScene.ts`s
       * `updateSoundCompassHud()` setzt Translate+Rotate pro Frame als EINEN kombinierten
       * Inline-`transform` (Muster `.reveal-marker`, s. u.), sonst würden sich eine statische
       * CSS-Regel und der Inline-Rotate gegenseitig überschreiben.
       */
      .sound-compass-indicator {
        position: absolute;
        display: none;
      }

      .sound-compass-indicator.visible {
        display: block;
      }

      /*
       * Fänger-Randmarker (Übergabe-Auftrag P3g „Shrink-Endgame", Entwurfs-Entscheidung i;
       * Farbe/Form aktualisiert Kompass-Pfeil-Vereinheitlichung, Felix-Auftrag 2026-07-17):
       * Container füllt dieselbe Safe-Area-bereinigte Fläche wie `#sound-compass` (Mobile-Regel
       * 5), fester Element-Pool (`REVEAL_MARKER_MAX_COUNT`, in `setupRevealMarkerDom()` einmalig
       * angelegt). `pointer-events: none` (Regel 1): darf den Whole-Canvas-Joystick nie stören.
       * `scenes/MatchScene.ts`s `updateRevealMarkersHud()` setzt Position/Drehung PRO FRAME als
       * EINEN kombinierten Inline-`transform` (Translate + Rotate) — deshalb bewusst KEIN
       * `transform` in dieser Regel selbst (würde sonst überschrieben/kollidieren). Die
       * Pfeil-Form kommt von der gemeinsamen `.kompass-pfeil`-Klasse (s. o.) — nur die Farbe
       * (`--reveal-marker-color`, Violett, Konzept Q3: Präzisions-Ehrlichkeit gegenüber dem
       * groben Sound-Kompass) bleibt eigenständig.
       */
      #reveal-markers {
        position: fixed;
        top: var(--hud-safe-top);
        right: var(--hud-safe-right);
        bottom: var(--hud-safe-bottom);
        left: var(--hud-safe-left);
        pointer-events: none;
      }

      .reveal-marker {
        position: absolute;
        width: var(--reveal-marker-size);
        height: var(--reveal-marker-size);
        background: var(--reveal-marker-color);
        display: none;
      }

      .reveal-marker.visible {
        display: block;
      }

      /*
       * Mobile-Einzug für Kompass-/Reveal-Marker-Pfeile (Felix-Anweisung 2026-07-18, verbindlich:
       * „müssen klar in den Spielausschnitt hineinragen"). `(pointer: coarse)` triff NUR auf
       * Touch-Eingabegeräte zu (Standard-Feature-Query fürs Grob-Zeigegerät, kein UA-Sniffing) —
       * Desktop (Maus, `pointer: fine`) bleibt UNVERÄNDERT am reinen Safe-Area-Rand („von oben
       * kommen" passt dort). `calc(var(--hud-safe-*) + var(--kompass-rand-einzug-touch))`
       * ADDIERT den Einzug auf die bestehenden Safe-Area-Insets (statt sie zu ersetzen) — ein
       * Gerät mit echtem Notch bekommt weiterhin BEIDE Abstände.
       *
       * Bewusst über die `top/right/bottom/left`-Insets der FIXEN Container (`#sound-compass`/
       * `#reveal-markers`) gelöst, NICHT über `padding`: `scenes/MatchScene.ts`s
       * `updateSoundCompassHud()`/`updateRevealMarkersHud()` positionieren die Pfeile über
       * `left`/`top` in PROZENT relativ zur TATSÄCHLICHEN Containerfläche
       * (`container.clientWidth`/`clientHeight`, `computeEdgePositionPercent`/
       * `computeEdgePositionPercentForAngle`) — absolut positionierte Kinder ignorieren das
       * Padding eines Elternelements bei der Prozent-Berechnung (die Basisfläche für
       * `left: X%` bleibt trotz Padding die volle `content-box + padding`-Breite/-Höhe). Ein
       * größerer Inset auf `top/right/bottom/left` SCHRUMPFT die Containerfläche dagegen
       * tatsächlich (`fixed`-Positionierung spannt die Fläche zwischen den vier Insets auf) —
       * dieselbe Prozentrechnung landet dadurch automatisch weiter innen, ohne dass
       * `soundCompass.ts`/`shrinkZoneHud.ts` etwas von „Touch" wissen müssten.
       */
      @media (pointer: coarse) {
        #sound-compass,
        #reveal-markers {
          top: calc(var(--hud-safe-top) + var(--kompass-rand-einzug-touch));
          right: calc(var(--hud-safe-right) + var(--kompass-rand-einzug-touch));
          bottom: calc(var(--hud-safe-bottom) + var(--kompass-rand-einzug-touch));
          left: calc(var(--hud-safe-left) + var(--kompass-rand-einzug-touch));
        }
      }

      /*
       * Audio-Unlock-Hinweis (E9, Mobile-Tag-1-Regel 8): dezent, verschwindet nach der ersten
       * Pointer-Geste (Phasers eingebautes Unlock, siehe `scenes/MatchScene.ts`s
       * `setupAudioUnlock()`). Unten zentriert, oberhalb der mobilen Bewegungsmodus-Buttons.
       */
      #audio-unlock-hint {
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap) + var(--move-mode-button-size) + var(--hud-gap));
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #audio-unlock-hint.visible {
        opacity: 1;
      }

      /*
       * Mobile Bewegungsmodus-Buttons (P3d, Übergabe-Auftrag „Bewegungsmodi (Schleichen/Gehen/
       * Dash)"): zwei runde DOM-Buttons — Schleichen-TOGGLE (bleibt aktiv bis zum nächsten Tap)
       * + Dash-TAP (einmaliger Wunsch pro Tap, Verdrahtung in `scenes/MatchScene.ts`s
       * `setupMoveModeControls()`, Zustand in `net/moveModeInput.ts`s `MobileMoveModeState`).
       *
       * ANDERS als die reinen HUD-Anzeige-Elemente oben (`pointer-events: none`) sind diese
       * beiden Elemente bewusst `pointer-events: auto` — sie SIND die Eingabe (Mobile-Tag-1-
       * Regel 1: Pointer-only, kein separater Touch-Sonderpfad). `touch-action: none` +
       * `-webkit-tap-highlight-color: transparent` unterdrücken Browser-Standardgesten
       * (Doppel-Tap-Zoom, Tipp-Hervorhebung), die sonst mit dem Whole-Canvas-Joystick
       * kollidieren könnten.
       *
       * Größe ≥ 48 px (Regel 4, `--move-mode-button-size` oben, `min-width`/`min-height` als
       * harte Untergrenze zusätzlich zur Basisgröße). Position relativ zu den Safe-Area-Insets
       * + `--hud-gap` verankert (Regel 3/5), NICHT auf einen festen Bildschirm-Pixelwert.
       *
       * Eigene DOM-Geschwister außerhalb des Phaser-Canvas (nicht dessen Kind): ein Tap auf
       * einen dieser Buttons erreicht Phasers Whole-Canvas-Joystick-`pointerdown`-Listener
       * (`net/pointerJoystick.ts`) dadurch STRUKTURELL nie — kein Joystick-Ursprung wird
       * gesetzt. `stopPropagation()`/`preventDefault()` im jeweiligen Handler
       * (`scenes/MatchScene.ts`) sind zusätzliche, defensive Absicherung, kein Ersatz für diese
       * strukturelle Trennung.
       */
      .mobile-move-mode-button {
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        width: var(--move-mode-button-size);
        height: var(--move-mode-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 0.9rem / 1.2 sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      /*
       * Schleichen-Toggle: seit dem Mobile-Layout-Umbau (Felix-Auftrag 2026-07-17,
       * Wild-Rift-Muster) RECHTS im Daumen-Cluster, direkt links neben dem großen
       * `#mobile-interact-button` — vormals links unten, wo er mitten in der Zone des
       * floating Joysticks stand (Felix-Playtest-Befund: „steht voll im Weg"). Die linke
       * Bildschirmhälfte gehört jetzt wieder KOMPLETT dem Joystick (exakt das MVP-Vorbild:
       * Sneak-Button „LEISE" saß dort bei X=728 rechts neben dem Aktions-Button, die
       * Joystick-Zone war die linke Bildhälfte). Gleiche Etage wie Interagieren (über der
       * Item-Bar), `right`-Verankerung = Safe-Area + Interact-Breite + Gap (Regel 3/5).
       * `bottom` zusätzlich um die halbe Größendifferenz zum großen Interact-Button angehoben,
       * damit beide Kreise auf einer MITTELLINIE liegen (Wild-Rift-Cluster-Optik).
       */
      #mobile-sneak-button {
        right: calc(var(--hud-safe-right) + var(--hud-gap) + var(--interact-button-size) + var(--hud-gap));
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap) +
            (var(--interact-button-size) - var(--move-mode-button-size)) / 2
        );
      }

      /* Aktiv-Zustand des Schleichen-Toggles (`scenes/MatchScene.ts`) — reine Darstellung. */
      #mobile-sneak-button.active {
        background: rgba(255, 255, 255, 0.35);
      }

      /*
       * Der frühere `#mobile-dash-button` (Dash-Tap unten rechts) ist mit Einführung der
       * Item-Bar ENTFALLEN — der Dash lebt jetzt als erster Slot der Item-Bar
       * (`#item-slot-dash`, Verdrahtung `setupItemBar()`), kein separater Eck-Button mehr.
       */

      /*
       * Mobile Interaktions-Button (P3e, Übergabe-Auftrag „Verstecken in Objekten (§5), Stufe
       * 1", Entscheidung a): EIN Tap-Button (kein Halten), Verdrahtung in `scenes/MatchScene.ts`s
       * `setupInteractControls()`, Zustand in `net/interactInput.ts`s `MobileInteractState`.
       * Teilt sich die Basis-Optik mit den Bewegungsmodus-Buttons (`.mobile-move-mode-button`,
       * Größe/Form/Touch-Verhalten identisch, Mobile-Tag-1-Regel 4) — bekommt hier NUR eine
       * eigene Position (s. u.).
       */
      #mobile-interact-button {
        /* Haupt-Aktion (Tür/Verstecken) in die gut erreichbare rechte Daumenzone, gestapelt
           ÜBER der Item-Bar (vormals über dem Dash-Button — der Dash ist jetzt ein Bar-Slot).
           Höhe an `--item-bar-height` gekoppelt. Seit dem Wild-Rift-Umbau (Felix-Auftrag
           2026-07-17) der GRÖSSTE Button des Clusters (`--interact-button-size`, s. Kommentar
           an der Variable) — der Schleichen-Toggle sitzt kleiner links daneben. */
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap));
        width: var(--interact-button-size);
        height: var(--interact-button-size);
      }

      /*
       * Button-Icons (Wild-Rift-Umbau, Felix-Auftrag 2026-07-17): Piktogramme statt der
       * vormaligen Wort-Labels „Schleichen"/„Interagieren" (10+ Zeichen Fließtext in einem
       * 56px-Kreis — bei 375px praktisch unlesbar, Mobile-Unfreundlichkeit aus dem
       * Felix-Playtest). Inline-SVG im Markup, Stil-Muster der Item-Bar-Icons
       * (`.item-slot__icon svg`: currentColor + drop-shadow, KEIN neues Asset/keine Dependency).
       */
      .mobile-move-mode-button svg {
        width: 55%;
        height: 55%;
        display: block;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
      }

      /* =====================================================================
       * Item-Bar (Felix-Auftrag 2026-07-17) — Übernahme der MVP-Aktionsleiste
       * =====================================================================
       * Unten in der rechten Daumenzone, `right`/`bottom` an der Safe-Area verankert (Regel 5),
       * rechtsbündig (`justify-content: flex-end`) — die am häufigsten getippten Slots sitzen
       * rechts in bester Daumenreichweite (Felix-Playtest: untere Mitte am schlechtesten
       * erreichbar). Zwei Gruppen (Dash · Zauber | 3 Items) mit größerem Zwischenabstand
       * (`--item-bar-group-gap`, MVP DASH_GROUP_GAP). Container `pointer-events: none`, nur die
       * `.item-slot`-Kacheln setzen `auto` — die Zwischenräume schlucken keine Joystick-Touches
       * (Regel 1). `max-width` deckelt Überlauf auf sehr schmalen Geräten. */
      #item-bar {
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        max-width: calc(100vw - var(--hud-safe-left) - var(--hud-safe-right) - 2 * var(--hud-gap));
        display: flex;
        justify-content: flex-end;
        align-items: flex-end;
        gap: var(--item-bar-group-gap);
        pointer-events: none;
      }

      .item-bar__group {
        display: flex;
        gap: var(--item-slot-gap);
      }

      /*
       * Eine Slot-Kachel: Steinrahmen (Bild-Asset `ui/slot-item-frame.png`, oberste Ebene, immer
       * scharf, transparente Mitte) über einem dunklen Panel mit farbigem Akzentrand. Schichtung
       * 1:1 aus dem MVP (`hudShared.ts`): Panel < Cooldown-Wipe < Steinrahmen, das Icon im Panel.
       * `pointer-events: auto` — die Kachel IST das Tap-Ziel (Mobile-Tag-1-Regel 1: EIN
       * Pointer-Eingabepfad, kein Joystick-Ursprung, `stopPropagation` zusätzlich im Handler).
       * `--slot-accent`/`--slot-cooldown` sind die pro-Slot-Stellschrauben (Zustandsklassen bzw.
       * `scenes/MatchScene.ts` pro Frame). */
      .item-slot {
        position: relative;
        width: var(--item-slot-size);
        height: var(--item-slot-size);
        min-width: 48px;
        min-height: 48px;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        --slot-accent: var(--item-slot-accent-empty);
        --slot-cooldown: 0;
      }

      /* Panel + Akzentrand, unter den Steinrahmen zurückgesetzt (MVP SLOT_ACCENT_INSET). */
      .item-slot__panel {
        position: absolute;
        inset: var(--item-slot-inner-inset);
        border-radius: calc(var(--item-slot-radius) - var(--item-slot-inner-inset));
        background: var(--item-slot-panel-bg);
        box-shadow: inset 0 0 0 2px var(--slot-accent);
      }

      /* Icon zentriert im Panel, eingefärbt in der Slot-Akzentfarbe (monochrom, gedämpfter Look). */
      .item-slot__icon {
        position: absolute;
        inset: var(--item-slot-inner-inset);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--slot-accent);
        z-index: 1;
      }

      .item-slot__icon svg {
        width: var(--item-slot-icon-size);
        height: var(--item-slot-icon-size);
        display: block;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
      }

      /*
       * Cooldown-Wipe (MVP: dunkler Radial-Sweep von 12 Uhr im Uhrzeigersinn, schrumpft beim
       * Abkühlen). `--slot-cooldown` (0…1, = verbleibende Cooldown-Ratio) setzt
       * `scenes/MatchScene.ts` pro Frame; der conic-gradient deckt genau diesen Anteil des Kreises
       * dunkel ab. Bei 0 hat der Farbstop Breite 0 → nichts verdunkelt. */
      .item-slot__cooldown {
        position: absolute;
        inset: var(--item-slot-inner-inset);
        border-radius: calc(var(--item-slot-radius) - var(--item-slot-inner-inset));
        background: conic-gradient(
          var(--item-slot-cooldown-color) calc(var(--slot-cooldown) * 1turn),
          transparent 0
        );
        z-index: 2;
        pointer-events: none;
      }

      /* Steinrahmen (Bild-Derivat, transparente Mitte) — oberste Ebene, bleibt immer scharf. */
      .item-slot__frame {
        position: absolute;
        inset: 0;
        background-image: url("assets/ui/slot-item-frame.png");
        background-size: 100% 100%;
        background-repeat: no-repeat;
        z-index: 3;
        pointer-events: none;
      }

      /* Zustandsfarben (Akzentrand + Icon). Leer = grau (Default oben), Dash = blau, Zauber = Violett. */
      .item-slot--dash {
        --slot-accent: var(--item-slot-accent-dash);
      }
      .item-slot--spell {
        --slot-accent: var(--item-slot-accent-spell);
      }
      /* Licht-Zauber-Trio (Schritt 17): distinkte Akzentfarbe je Kategorie (kosmetisch). */
      .item-slot--spell-door {
        --slot-accent: var(--item-slot-accent-spell-door);
      }
      .item-slot--spell-light {
        --slot-accent: var(--item-slot-accent-spell-light);
      }
      /* Runen-Falle (Schritt 12): eigene Akzentfarbe für die Kategorie „rune". */
      .item-slot--spell-rune {
        --slot-accent: var(--item-slot-accent-spell-rune);
      }
      /* Zauber-Slot-Icon (Emoji-Platzhalter, Schritt 17) — Größe/Zentrierung analog `.item-slot__icon svg`. */
      .item-slot__icon--emoji {
        font-size: var(--item-slot-icon-size);
        line-height: 1;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
      }

      /* Cooldown aktiv (Dash): Icon dimmt (MVP Icon-Alpha 0.45), Akzentrand wird grau. */
      .item-slot.is-cooldown {
        --slot-accent: var(--item-slot-accent-empty);
      }
      .item-slot.is-cooldown .item-slot__icon {
        opacity: 0.45;
      }

      /* Tap-Feedback nur für tatsächlich bediente Slots (heute: Dash). */
      .item-slot.is-actionable:active {
        transform: translateY(1px) scale(0.96);
      }

      /*
       * Mobile Item-Nutzungs-Button (Auftrag „Besen als erstes Item + minimales Item-Nutzungs-
       * Fundament (Runde 1)"): EIN Tap-Button (kein Halten), Verdrahtung in `scenes/MatchScene.ts`s
       * `setupUseItemControls()`, Zustand in `net/useItemInput.ts`s `MobileUseItemState`. Teilt
       * sich die Basis-Optik mit den Bewegungsmodus-/Interaktions-Buttons
       * (`.mobile-move-mode-button`, Größe/Form/Touch-Verhalten identisch — Touch-Target ≥ 48 px,
       * Mobile-Tag-1-Regel 4), ist aber ANDERS als jene NICHT dauerhaft sichtbar (AK-7: „nur
       * sichtbar, wenn nutzbar" — Item im Slot ODER aktiver Flug): `display: none` als
       * ID-spezifischer Default überschreibt die Klassen-Vorgabe `display: flex`, `.visible`
       * (`updateItemHud()`, `MatchScene.ts`) schaltet ihn frame-genau wieder ein (Muster
       * `#netlog-export-button`).
       */
      #mobile-broom-button {
        display: none;
        /* Wild-Rift-Umbau (Felix-Auftrag 2026-07-17): stapelt in der Ecken-Spalte direkt ÜBER
           dem vergrößerten Haupt-Aktionsbutton (`--interact-button-size`) — dieselben Summanden
           wie dessen `bottom`-Formel PLUS dessen Höhe + Gap (vormals `2 × move-mode-size`,
           das kollidierte mit dem größeren Interact-Button). */
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap) +
            var(--interact-button-size) + var(--hud-gap)
        );
      }

      #mobile-broom-button.visible {
        display: flex;
      }

      /*
       * Sichtbarer floating Joystick (Felix-Playtest 2026-07-13 „Mobile-UI deutlich
       * nutzerfreundlicher" + Touch-UX-Best-Practice „dynamic/floating stick"): rein visuelles
       * DOM-Overlay (`pointer-events: none` — der Whole-Canvas-Joystick UNTER dem Canvas fängt die
       * Eingabe, `scenes/MatchScene.ts`s `setupPointerInput()`). Erscheint am Aufsetzpunkt: Basis-
       * Ring (Durchmesser = 2 × `JOYSTICK_MAX_RADIUS_PX` = 128px), Knauf folgt der Auslenkung
       * (`showJoystickVisual()`). Zentrierung per negativem Margin, damit `left`/`top` den
       * MITTELPUNKT setzen. DOM-früh platziert → die Aktions-Buttons stapeln sichtbar darüber.
       * Graublau/hell, halbtransparent (HUD-Stil, Muster MVP-Joystick).
       */
      #joystick-base,
      #joystick-knob {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        display: none;
      }
      #joystick-base.visible,
      #joystick-knob.visible {
        display: block;
      }
      #joystick-base {
        width: 128px;
        height: 128px;
        margin-left: -64px;
        margin-top: -64px;
        border: 2px solid rgba(138, 147, 166, 0.7);
        background: rgba(17, 20, 28, 0.3);
      }
      #joystick-knob {
        width: 52px;
        height: 52px;
        margin-left: -26px;
        margin-top: -26px;
        background: rgba(232, 238, 247, 0.85);
      }

      /*
       * Versteckt-Hinweis (P3e, Entscheidung m): dauerhafter Hinweis „Du bist versteckt — E zum
       * Verlassen", solange die eigene Figur `isHidden` ist — ANDERS als `#catch-announcement`
       * KEIN Zeit-Ausblenden (Muster `#audio-unlock-hint`), `scenes/MatchScene.ts`s
       * `updateHiddenVisual()`/`initializeHiddenVisual()` schalten ausschließlich die
       * `.visible`-Klasse. Oberhalb der mobilen Buttons verankert (Muster `#audio-unlock-hint`).
       */
      #hidden-hint {
        position: fixed;
        /* über dem kompletten rechten Daumen-Cluster verankert (Item-Bar-Etage + großer
           Interact-Button, Wild-Rift-Umbau 2026-07-17) — exakt dieselben Summanden wie die
           `bottom`-Formel von `#mobile-interact-button` PLUS dessen Höhe + Gap. */
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap) +
            var(--interact-button-size) + var(--hud-gap)
        );
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      /*
       * Hinweis (Merge-Doktrin `vollmerge`, Audio = ours-Implementierung): der `tweak-konsole`-
       * Zweig kannte an dieser Stelle noch einen ÄLTEREN, seither ersetzten Kompass-/Stumm-
       * Hinweis-Stand (`#compass-overlay`/`.compass-indicator--*`/`#mute-hint`, gebunden an die
       * inzwischen verworfene Audio-API `SoundEventQuantized`/`SoundDampingStage`/
       * `SoundDistanceStage`, siehe `hud/compass.ts`) — bewusst NICHT übernommen, ERSETZT durch
       * den bereits vorhandenen, aktuellen Stand oben im Dokument (`#sound-compass`/
       * `.sound-compass-indicator--*`, `#reveal-markers`, `#audio-unlock-hint`), der auf der
       * kanonischen `packages/shared/src/sound.ts`-API (`DAMPENING_STAGE_*`, `DISTANCE_STAGE_*`)
       * aufsetzt. Kein UI-Element geht dadurch verloren — dieselbe Funktion (Kompass-Indikatoren,
       * „Tippen für Ton"-Hinweis) existiert bereits unter dem aktuellen Namen.
       */

      #hidden-hint.visible {
        opacity: 1;
      }

      /*
       * Rumpel-HUD-Balken (Versteck-Rumpeln, Anti-Camper §5, ursprünglich Client-/Sound-Scheibe
       * R1c, Felix-Feel-Vorgabe „1:1 aus dem MVP"). **Mobile-Redesign „der Balken ist selbst das
       * Tap-Ziel" (Übergabe-Auftrag `2026-07-16-rumpel-balken-tap-redesign.md`):** dediziertes
       * Bildschirm-HUD für die EIGENE Balken-Challenge — NICHT über dem Kopf (das wäre ein
       * Welt-/Sprite-Element wie die Channel-Fortschrittsbalken, `CHANNEL_PROGRESS_BAR_*`),
       * sondern ein fixes DOM-HUD (Muster `#debug-overlay`: harter `display`-Toggle statt
       * Opacity-Fade — die Challenge ist ein Reflex-Test, eine Übergangsphase würde die exakte
       * Marker-Position beim Erscheinen verfälscht wirken lassen). Nur sichtbar, solange die
       * eigene Figur `rumbleActive` ist (`scenes/MatchScene.ts`s `updateRumbleHud()`, PRO FRAME,
       * Muster `updateChannelProgressBar()`/`updateMinimapHud()` — SELF-Werte). Über BEIDEN
       * Button-Reihen UND dem `#hidden-hint`-Text verankert (Muster `#hidden-hint`s eigenem
       * Offset über beiden Button-Reihen) — die `bottom`-Formel selbst bleibt unverändert
       * (Redesign-Spezifikation §4: „Position unverändert"); da der Balken jetzt DEUTLICH höher
       * ist (60 px statt vormals 16 px) und nach OBEN wächst, vergrößert sich der Abstand zu
       * `#hidden-hint` dadurch nur zusätzlich (geprüft: keine Überlappung bei irgendeiner
       * Viewport-Breite, kein Offset-Nachzug an `#hidden-hint` nötig).
       *
       * **Zwei-Ebenen-Struktur (E1 — der Balken IST das Tap-Ziel, keine Positionsauswertung):**
       * `#rumble-bar-hit` ist der ÄUSSERE, unsichtbare Wrapper — `position: fixed`, trägt die
       * `bottom`-Formel + Zentrierung, seine Größe (`--rumble-bar-width`/`-height` PLUS je
       * `2 × --rumble-bar-hit-halo`) ist die tatsächliche Pointer-Trefferfläche
       * (`pointer-events: auto` NUR während `.visible`, Pointer-Wiring in
       * `setupRumbleTapControls()`, `MatchScene.ts`). `#rumble-bar` ist der INNERE, SICHTBARE
       * Balken (Hintergrund/Rahmen/Radius) — `position: absolute` innerhalb des Wrappers, um
       * exakt `--rumble-bar-hit-halo` von dessen Rand eingerückt (die unsichtbare Halo liegt
       * dadurch symmetrisch außen herum). Marker/Zone bleiben ausschließlich Kinder von
       * `#rumble-bar` und referenzieren dadurch weiterhin exakt die SICHTBARE Balkenfläche, exakt
       * wie vor dem Redesign — die Halo verändert ihre Prozent-Formel an keiner Stelle. Beide
       * Ebenen werden synchron von `updateRumbleHud()` auf `.visible` geschaltet (dieselbe
       * Bedingung `rumbleActive || Ausgang-Feedback-Blitz aktiv`, siehe unten).
       *
       * **Scale-Pop beim Erscheinen** (`@keyframes rumble-bar-appear-pop`, Dauer
       * `RUMBLE_BAR_APPEAR_POP_DURATION_MS` aus `src/config.ts`, bewusste Duplikation dort
       * dokumentiert): läuft NUR auf `#rumble-bar` (dem sichtbaren Container) — eine reine
       * Skalierung um dessen eigenes Zentrum, verfälscht die relative Marker-/Zonen-Position
       * dadurch an keiner Stelle (beide bleiben Prozentwerte relativ zur unskalierten Layout-Box
       * des Containers, die CSS-`transform: scale()` rein visuell mitskaliert). Läuft
       * automatisch bei jeder false→true-Flanke von `.visible` erneut an (kein JS-Trigger nötig
       * — dieselbe Selektor-Neu-Zuordnung wie beim bestehenden `display: none → block`-Toggle).
       *
       * Marker/Zone werden per Inline-`style` PRO FRAME neu gesetzt (`updateRumbleHud()`):
       * `#rumble-bar-zone`s `width` = `rumbleGreenZoneFraction` (live tunbar), zentriert per
       * `left: 50%` + `transform: translateX(-50%)`; `#rumble-bar-marker`s `left` = Marker-
       * Fraktion `[0,1]` als Prozent, ebenfalls per `translateX(-50%)` auf den Fraktionspunkt
       * zentriert (Muster `.sound-compass-indicator`s `translate(-50%, -50%)`-Zentrierungstrick)
       * — der Marker darf dadurch an den Rändern (Fraktion 0/1) leicht über den Balkenrand
       * hinausragen (halbe Marker-Breite), exakt wie im MVP-Vorbild.
       */
      #rumble-bar-hit {
        display: none;
        position: fixed;
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + 3 * (var(--move-mode-button-size) + var(--hud-gap))
        );
        left: 50%;
        transform: translateX(-50%);
        width: calc(var(--rumble-bar-width) + 2 * var(--rumble-bar-hit-halo));
        height: calc(var(--rumble-bar-height) + 2 * var(--rumble-bar-hit-halo));
        pointer-events: none;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #rumble-bar-hit.visible {
        display: block;
        pointer-events: auto;
      }

      @keyframes rumble-bar-appear-pop {
        0% {
          transform: scale(var(--rumble-bar-appear-pop-scale-start));
        }
        100% {
          transform: scale(1);
        }
      }

      #rumble-bar {
        display: none;
        position: absolute;
        top: var(--rumble-bar-hit-halo);
        left: var(--rumble-bar-hit-halo);
        width: var(--rumble-bar-width);
        height: var(--rumble-bar-height);
        background: rgba(0, 0, 0, 0.7);
        border-radius: var(--rumble-bar-radius);
        border: var(--rumble-bar-border-width) solid var(--rumble-bar-border-color);
        box-sizing: border-box;
        overflow: hidden;
        pointer-events: none;
      }

      #rumble-bar.visible {
        display: block;
        animation: rumble-bar-appear-pop 130ms ease-out;
      }

      #rumble-bar-zone {
        position: absolute;
        top: 0;
        left: 50%;
        height: 100%;
        background: var(--rumble-zone-color);
        transform: translateX(-50%);
      }

      #rumble-bar-marker {
        position: absolute;
        top: 0;
        left: 0%;
        width: var(--rumble-bar-marker-width);
        height: 100%;
        background: var(--rumble-marker-color);
        transform: translateX(-50%);
      }

      #rumble-bar-marker.in-zone {
        background: var(--rumble-marker-color-hit);
      }

      /*
       * Hinweistext „Tipp, wenn der Marker im Grün ist" (Mobile-Redesign, Übergabe-Auftrag
       * `2026-07-16-rumpel-balken-tap-redesign.md`, Felix-Entscheid 3): direkt ÜBER dem Balken
       * verankert (`bottom`-Formel = dieselbe wie `#rumble-bar-hit` PLUS dessen volle Höhe PLUS
       * einen `--hud-gap`-Abstand), Stil-Muster `#hidden-hint` (Opacity-Fade über `.visible`,
       * `pointer-events: none`, Text-Shadow). Sichtbarkeit wird AUSSCHLIESSLICH von
       * `updateRumbleHud()` über die reine `hud/rumbleHintVisibility.ts`s
       * `computeRumbleHintVisibility()` gesteuert (erste `RUMBLE_HINT_MAX_WAVES` Wellen der
       * Session, s. dort) — dieses CSS-Element selbst kennt keine Wellen-Zählung.
       */
      #rumble-hint {
        position: fixed;
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + 3 * (var(--move-mode-button-size) + var(--hud-gap)) +
            var(--rumble-bar-height) + 2 * var(--rumble-bar-hit-halo) + var(--hud-gap)
        );
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #rumble-hint.visible {
        opacity: 1;
      }

      /*
       * Ausgang-Feedback-Blitz (`scenes/MatchScene.ts`s `updateRumbleHud()`/`handleRumbleResult()`):
       * sobald ein `"rumbleResult"`-Ereignis eintrifft, bleibt `#rumble-bar` für
       * `RUMBLE_RESULT_FLASH_DURATION_MS` (`src/config.ts`) SICHTBAR und übermalt sich komplett
       * grün/rot, statt sofort bei `rumbleActive → false` zu verschwinden — Marker/Zone werden für
       * die Blitz-Dauer ausgeblendet (`display: none`), das Balken-`background` selbst trägt die
       * Blitz-Farbe. Erfolg (`.result-hit`) nutzt dieselbe Farbe wie die Trefferzone
       * (`--rumble-zone-color`, EIN Grün, kein zweiter Ton); Fehlschlag (`.result-miss`) nutzt das
       * eigene Warnrot (`--rumble-result-miss-color` oben). Zusätzliches Audio-Feedback (dezenter
       * Erfolgs-Ton / eigener Verrats-Ton bei Fehlschlag) läuft rein clientseitig über
       * `SoundPlayer`, unabhängig von diesem DOM-Blitz hier. Das „!"-Weltsymbol bei Fehlschlag
       * (Feature B, `triggerWorldBetraySighted()`) hängt seit dem Umbau (Aufgabe 0) NICHT MEHR an
       * diesem self-only `"rumbleResult"`-Ereignis, sondern am eigenständigen, server-gegateten
       * `"rumbleBetraySighted"`-Ereignis (siehe `net/connection.ts`).
       *
       * **Deutlicherer Blitz (Feel-Optimierung, Felix-Auftrag 2026-07-16: „250 ms wurde beim
       * Playtest übersehen"):** `RUMBLE_RESULT_FLASH_DURATION_MS` auf `550` ms verlängert (siehe
       * dortige Dokumentation) UND ein kurzer Glow-Puls (`@keyframes rumble-result-pulse`,
       * `box-shadow` in derselben Blitz-Farbe via `currentColor`) ergänzt — dezent (keine
       * Skalierung, kein Layout-Sprung, reine Leuchtkraft-Betonung um den ohnehin fest
       * positionierten Balken). `animation-duration` dupliziert bewusst denselben Millisekunden-
       * Wert wie `RUMBLE_RESULT_FLASH_DURATION_MS` (Muster `--rumble-result-miss-color`/
       * `RUMBLE_RESULT_MISS_COLOR`: kein CSS-Import aus TypeScript möglich, beide Stellen MÜSSEN
       * bei einer künftigen Änderung von Hand synchron gehalten werden). Überschreibt die
       * `animation`-Kurzschrift bewusst den `rumble-bar-appear-pop`-Wert der `.visible`-Regel
       * (höhere Deklarationsreihenfolge/Spezifität) — Konflikt praktisch ausgeschlossen, da der
       * Pop längst (130 ms) abgeschlossen ist, bevor ein Ergebnis-Ereignis eintreffen kann (die
       * kürzeste Welle dauert ein Vielfaches davon).
       */
      @keyframes rumble-result-pulse {
        0% {
          box-shadow: 0 0 0 0 currentColor;
        }
        35% {
          box-shadow: 0 0 12px 3px currentColor;
        }
        100% {
          box-shadow: 0 0 0 0 currentColor;
        }
      }

      #rumble-bar.result-hit,
      #rumble-bar.result-miss {
        animation: rumble-result-pulse 550ms ease-out;
      }

      #rumble-bar.result-hit {
        background: var(--rumble-zone-color);
        color: var(--rumble-zone-color);
      }

      #rumble-bar.result-miss {
        background: var(--rumble-result-miss-color);
        color: var(--rumble-result-miss-color);
      }

      #rumble-bar.result-hit #rumble-bar-zone,
      #rumble-bar.result-hit #rumble-bar-marker,
      #rumble-bar.result-miss #rumble-bar-zone,
      #rumble-bar.result-miss #rumble-bar-marker {
        display: none;
      }

      /*
       * Tweak-Konsole & Parameter-Registry, Bündel 3/Scheibe 5 (Dev-Overlay, `vault/20-
       * Architektur/tweak-konsole-konzept.md` §5): `#tweak-console` ist NUR der statische
       * Container — die gesamte Aufbau-/Interaktionslogik (Gruppen/Suche/Filter/Zeilen/Export)
       * lebt in `src/tweak/tweakConsole.ts` und wird NUR im Dev-Build montiert (`import.meta.env
       * .DEV`-Gate + dynamischer `import()` in `scenes/MatchScene.ts`, siehe dort). Dieser CSS-
       * Block selbst ist KEIN Cheat-Vektor (nur Layout, kein Simulationszugriff) und bleibt
       * deshalb bewusst unbedingt im Markup — analog zu jedem anderen HUD-Container hier.
       *
       * Default `display: none` (nicht nur `pointer-events: none`): ein geschlossenes Panel
       * nimmt dadurch StrukturELL keinen Klickbereich ein, das Spiel bleibt uneingeschränkt
       * bedienbar (Mobile-Tag-1-Regel 1). Erst `.tweak-console--open` schaltet es sichtbar +
       * interaktiv.
       *
       * Layout: relativ zu den Safe-Area-Insets verankert (Regel 3/5), Breite `min(92vw, 26rem)`
       * (kein fester Pixelwert, läuft auf 375px nicht über den Rand), eigener scrollbarer
       * Body (`overflow-y: auto; overflow-x: hidden` — kein horizontaler Überlauf). Alle
       * interaktiven Kindelemente bekommen ihre 48px-Mindestgröße über die jeweiligen
       * `.tweak-*`-Klassen unten (Regel 4).
       */
      #tweak-console {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        width: min(92vw, 26rem);
        max-width: 100vw;
        box-sizing: border-box;
        display: none;
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: rgba(10, 10, 16, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--hud-text-color);
        font: 0.85rem / 1.3 sans-serif;
        z-index: 1000;
        pointer-events: none;
      }

      #tweak-console.tweak-console--open {
        display: flex;
        pointer-events: auto;
      }

      .tweak-console__header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
      }

      .tweak-console__search {
        flex: 1 1 8rem;
        min-width: 0;
        min-height: 48px;
        box-sizing: border-box;
      }

      .tweak-console__only-changed {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        min-height: 48px;
      }

      .tweak-console__export {
        min-height: 48px;
        min-width: 48px;
      }

      .tweak-console__export-feedback {
        font-size: 0.75rem;
        opacity: 0.8;
      }

      .tweak-console__body {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .tweak-group__header {
        width: 100%;
        min-height: 48px;
        text-align: left;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: inherit;
        font: inherit;
        font-weight: 600;
        padding: 0.4rem 0.6rem;
        border-radius: 0.3rem;
      }

      .tweak-group__body {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        padding-left: 0.25rem;
      }

      .tweak-group__body--collapsed,
      .tweak-group[hidden],
      .tweak-row[hidden] {
        display: none;
      }

      .tweak-row {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        padding: 0.4rem 0.5rem;
        border-radius: 0.3rem;
        background: rgba(255, 255, 255, 0.04);
      }

      .tweak-row__labels {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
      }

      .tweak-row__key {
        font-family: monospace;
        font-size: 0.7rem;
        opacity: 0.6;
      }

      .tweak-row__scope-badge {
        font-size: 0.7rem;
        padding: 0.1rem 0.4rem;
        border-radius: 0.6rem;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Scope-Farben (Konzept §4): rein informativ, keine neue Kategoriefarbe (Art-Style bleibt unberührt — dieses Panel ist ein Dev-Werkzeug, kein In-Game-Asset). */
      .tweak-row__scope-badge--server-sim {
        color: #38bdf8;
      }

      .tweak-row__scope-badge--client-render {
        color: #4ade80;
      }

      .tweak-row__scope-badge--gesperrt {
        color: rgba(255, 255, 255, 0.4);
      }

      /* Constraint-Warnindikator (Konzept §6): dieselbe Warnfarbe wie die Low-Time-HUD-Warnung (`--hud-low-time-color`) — konsistente Warn-Sprache statt einer neuen, unbegründeten Farbe. */
      .tweak-row__warning {
        font-size: 0.7rem;
        color: var(--hud-low-time-color);
        border: 1px solid var(--hud-low-time-color);
        border-radius: 0.6rem;
        padding: 0.1rem 0.4rem;
      }

      .tweak-row__controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
      }

      .tweak-row__slider {
        flex: 1 1 8rem;
        min-height: 48px;
      }

      .tweak-row__number {
        width: 5rem;
        min-height: 48px;
        box-sizing: border-box;
      }

      .tweak-row__unit {
        font-size: 0.75rem;
        opacity: 0.7;
        min-width: 2.5rem;
      }

      .tweak-row__default {
        font-size: 0.7rem;
        opacity: 0.6;
      }

      .tweak-row__reset {
        min-height: 48px;
        min-width: 48px;
      }

      /* =====================================================================
       * Mobile-Clean-HUD (Felix-Auftrag 2026-07-17 abends)
       * =====================================================================
       * Auf Touch-Geräten (`html.touch-ui`, gesetzt in `src/index.ts` über dieselbe
       * `isTouchLikely()`-Heuristik wie der Kamera-Zoom, `?forceTouch` = Desktop-Escape)
       * verschwinden die Entwickler-Knöpfe (Debug-Toggle oben rechts, Tweak-Toggle oben
       * Mitte — Konsole bleibt Desktop-per-Tastatur ^/F2 erreichbar), und Timer/Wins rücken
       * in die frei gewordene Ecke ganz nach oben — weniger HUD-Etagen, mehr sichtbares
       * Spielfeld. Der NetLog-Export-Button bleibt bewusst AUCH auf Touch sichtbar (nur mit
       * explizitem `?netlog`-Opt-in überhaupt vorhanden — Felix' Handy-Messwerkzeug).
       * Reine Darstellungs-Weiche per CSS-Klasse, KEIN zweiter Eingabepfad (Regel 1).
       */
      html.touch-ui #debug-toggle-button,
      html.touch-ui #tweak-console-toggle {
        display: none;
      }

      html.touch-ui #match-timer {
        top: calc(var(--hud-safe-top) + var(--hud-gap));
      }

      html.touch-ui #wins-counter {
        top: calc(var(--hud-safe-top) + var(--hud-gap) + 2em);
      }

      /* NetLog-Export rückt in die vom Debug-Toggle geräumte Ecke (Formel = dessen alte Position). */
      html.touch-ui #netlog-export-button {
        right: calc(var(--hud-safe-right) + var(--hud-gap));
      }

      /* Randfall `?netlog` AUF Touch: der Export-Button belegt dann doch die Ecke — Timer/Wins
         weichen für diesen Messmodus auf ihre bisherigen Etagen darunter aus
         (Geschwister-Selektor: `#netlog-export-button` steht im Markup VOR beiden). */
      html.touch-ui #netlog-export-button.visible ~ #match-timer {
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap));
      }

      html.touch-ui #netlog-export-button.visible ~ #wins-counter {
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap) + 2em);
      }

      /* =====================================================================
       * Controller-Steuerung (Felix-Auftrag „Controller-Steuerung für PS5 einbauen und

       * Sobald ein Gamepad aktiv ist (`html.gamepad-active`, gesetzt in `scenes/MatchScene.ts`s

       * nützlich) — dieselbe Darstellungs-Weiche wie `html.touch-ui` oben, KEIN zweiter
       * Eingabepfad (Mobile-Tag-1-Regel 1 unberührt).
       */
      html.gamepad-active .mobile-move-mode-button,
      html.gamepad-active #joystick-base,
      html.gamepad-active #joystick-knob {
        display: none;
      }
    </style>
