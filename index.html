        --hud-safe-bottom: env(safe-area-inset-bottom, 0px);

         *   Slot oben    Гҳ 49 @ 85,4 / 51,3 % вҶ’ right 6,444rem В· bottom 10,705rem
         *   Slot 2       Гҳ 49 @ 79,6 / 59,1 % вҶ’ right 9,612rem В· bottom 8,745rem
         *   Slot 3       Гҳ 49 @ 74,9 / 71,5 % вҶ’ right 12,18rem  В· bottom 5,629rem
         *   Slot unten   Гҳ 49 @ 73,4 / 85,5 % вҶ’ right 12,999rem В· bottom 2,112rem
         *   Dash (Flash) Гҳ 49 @ 66,1 / 88,2 % вҶ’ right 16,987rem В· bottom 1,433rem
         *   Schleichen   Гҳ 49 @ 58,1 / 87,6 % вҶ’ right 21,357rem В· bottom 1,584rem
         * KompakthГ¶hen (Mockup вҖһKompakthГ¶he вүӨ 375" bzw. вҖһExtra-Kompakt вүӨ 335", dieselben
         * Prozent-Zentren, kleinere Durchmesser an der Touch-Untergrenze 48px, s. Media-Queries
         * unten): 344-px-BГјhne (Slot Гҳ48/Interakt Гҳ69) und 320-px-BГјhne (Slot Гҳ48/Interakt Гҳ64,
         * unterster Slot rutscht auf 87% top, damit er Slot 3 nicht berГјhrt).
         *
         * **Felix-Korrektur 2026-07-22 (Live-Foto, echtes GerГӨt):** auf einem echten GerГӨt mit
         * spГјrbarem `env(safe-area-inset-right)` (Querformat-Kamera-/Rand-Aussparung) addierte
         * sich der Inset ZUSГ„TZLICH zu den `right`-Werten oben вҖ” gemessener Rand-Abstand des
         * Interaktionsknopfs ~16 % der Bildschirmbreite statt der beabsichtigten ~9 % (Mockup-
         * Vermessung). Alle sieben `right`-Werte hier daher um pauschal `4rem` (64px) reduziert
         * вҖ” eine STARRE Verschiebung des gesamten Clusters nach rechts (Bogen-Form/AbstГӨnde
         * zueinander bleiben exakt erhalten), das `env(safe-area-inset-right)`-Sicherheitspolster
         * selbst bleibt unangetastet (Mobile-Tag-1-Regel 5, nicht verhandelbar) вҖ” nur der
         * DARГңBER hinausgehende Eigenabstand wird kleiner. `bottom`-Werte unverГӨndert (Felix
         * bemГӨngelte nur den rechten Rand, nicht die HГ¶he).
         */
        --wr-slot-diameter: 3.062rem;
        --wr-slot-icon-size: 1.7rem;
        --wr-interact-diameter: 5.062rem;
        --wr-interact-icon-size: 2.2rem;
        --wr-interact-right: 0.898rem;
        --wr-interact-bottom: 3.072rem;
        /* Oberster Bogen-Platz = Ult-Platz-Konvention (Zauber-Standardplatz, Mockup-Legende). */
        --wr-slot-0-right: 2.444rem;
        --wr-slot-0-bottom: 10.705rem;
        --wr-slot-1-right: 5.612rem;
        --wr-slot-1-bottom: 8.745rem;
        --wr-slot-2-right: 8.18rem;
        --wr-slot-2-bottom: 5.629rem;
        --wr-slot-3-right: 8.999rem;
        --wr-slot-3-bottom: 2.112rem;
        --wr-dash-right: 12.987rem;
        --wr-dash-bottom: 1.433rem;
        --wr-sneak-right: 17.357rem;
        --wr-sneak-bottom: 1.584rem;
        /*
         * Cluster-Farben: `--wr-slot-accent` = neutraler Standardrand (leerer Slot),
         * `--wr-slot-accent-spell`/`--wr-slot-accent-item` folgen der Runde-3-Vorgabe вҖһRahmenfarbe
         * folgt dem INHALT, nicht der Position" вҖ” Violett/Gold sind dieselben TГ¶ne wie die
         * bestehende Item-Bar (`--item-slot-accent-spell`/`--item-slot-accent-item`, keine neue
         * Kategoriefarbe). Interaktionsknopf-TГ¶ne: neutral = gedГӨmpftes Messing (deaktiviert),
         * `--wr-interact-tone-hider` = dasselbe Violett (Verstecken/Verlassen, Verstecker-Aktionen),
         * `--wr-interact-tone-catcher` = eigenes TГјrkis NUR fГјr вҖһDurchsuchen"/вҖһГ–ffnen" (FГӨnger-
         * Truhen-Aktion visuell unterscheidbar) вҖ” einziger neuer Farbwert in diesem Umbau.
         */
        --wr-slot-accent: #555a66;
        --wr-slot-accent-spell: var(--item-slot-accent-spell);
        --wr-slot-accent-item: var(--item-slot-accent-item);
        --wr-panel-bg: rgba(18, 20, 28, 0.72);
        --wr-cooldown-color: rgba(0, 0, 0, 0.55);
        --wr-interact-tone-neutral: #7a7566;
        --wr-interact-tone-hider: var(--hud-endgame-color);
        --wr-interact-tone-catcher: #7fb3c4;
      }

      /* KompakthГ¶hen (Mockup-Schwellen вҖһвүӨ 375" / вҖһвүӨ 335", echte Landschafts-ViewporthГ¶he вҖ” die
         Rand-Verankerung selbst ist breitenunabhГӨngig, nur die HГ¶he entscheidet Гјber die Stufe). */
      @media (max-height: 375px) {
        :root {
          --wr-slot-diameter: 48px;
          --wr-interact-diameter: 69px;
        }
      }

      @media (max-height: 335px) {
        :root {
          --wr-slot-diameter: 48px;
          --wr-interact-diameter: 64px;
          /* Unterster Slot rutscht auf 87% top (Mockup) вҖ” neu berechnet fГјr 48px-Durchmesser/320px-BГјhne. */
          --wr-slot-3-bottom: 1.1rem;
        }
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #game-container {
        position: relative;
        width: 100vw;
        /* dvh: boden-verankerte Buttons liegen nie hinter der ein-/ausklappenden Mobile-
           Browserleiste; 100vh als Fallback fГјr ГӨltere Browser (Felix-Playtest 2026-07-13). */
        height: 100vh;
        height: 100dvh;
      }

      /*
       * Debug-HUD (Playtest-Fix, Felix 2026-07-11: вҖһdas groГҹe Debug-Overlay stГ¶rt sehr im
       * normalen Spiel"): startet AUSGEBLENDET (`display: none` Default), `#debug-toggle-
       * button` schaltet die `.visible`-Klasse um (`scenes/MatchScene.ts`s `setupDebugToggle()`).
       * `top` verschoben (Muster `#wins-counter` unter `#match-timer`), damit die IMMER
       * sichtbare `#players-count`-Zeile darГјber Platz hat, ohne zu Гјberlappen.
       */
      #debug-overlay {
        display: none;
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + 2em);
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        white-space: pre-line;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      #debug-overlay.visible {
        display: block;
      }

      /*
       * Spielerzahl-HUD (Playtest-Fix, Felix 2026-07-11): dauerhaft sichtbar, NICHT Teil des
       * togglebaren Debug-Overlays (вҖһmuss immer existieren"). Oben links verankert (Safe-Area,
       * Regel 3/5) вҖ” derselbe Eckenbereich wie `#debug-overlay`, aber IMMER sichtbar.
       */
      #players-count {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      /*
       * Debug-HUD-Toggle-Button (Playtest-Fix, Felix 2026-07-11): oben rechts verankert, ГңBER
       * `#match-timer`/`#wins-counter` (die beide entsprechend nach unten verschoben sind).
       * Muster `.mobile-move-mode-button` (GrГ¶Гҹe вүҘ 48px, Safe-Area, `pointer-events: auto` вҖ” DAS
       * ist die Eingabe, kein Whole-Canvas-Joystick-Konflikt dank `stopPropagation()` im
       * Handler). Funktioniert identisch per Maus (Desktop) UND Touch (Mobile-Tag-1-Regel 1:
       * EIN Pointer-Eingabepfad).
       */
      #debug-toggle-button {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 0.75rem / 1.2 sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      /* Aktiv-Zustand (Debug-Overlay gerade eingeblendet) вҖ” reine Darstellung, Muster `#mobile-sneak-button.active`. */
      #debug-toggle-button.active {
        background: rgba(255, 255, 255, 0.35);
      }

      /*
       * NetLog-Export-Button (Netcode-Messstand, Auftrag `vault/20-Architektur/auftraege/
       * 2026-07-15-netcode-messstand.md`, Baustein A): startet AUSGEBLENDET (`display: none`
       * Default, Muster `#debug-overlay`) вҖ” `scenes/MatchScene.ts`s `setupNetLog()` schaltet die
       * `.visible`-Klasse NUR bei aktivem `?netlog`-URL-Parameter frei (kein Button, kein
       * `pointer-events`-Ziel im Normalbetrieb). Direkt links neben `#debug-toggle-button`
       * verankert (derselbe GrГ¶Гҹen-/Safe-Area-/Pointer-Only-Rahmen, Mobile-Tag-1-Regeln 1/3/4/5).
       */
      #netlog-export-button {
        display: none;
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap));
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 0.65rem / 1.2 sans-serif;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #netlog-export-button.visible {
        display: flex;
      }

      /*
       * Dev-Reset-Werkzeug (`vault/30-Systeme/dev-reset-werkzeug.md`, Felix-Auftrag вҖһRaum leeren
       * & neu starten"): startet AUSGEBLENDET (`display: none` Default, Muster
       * `#netlog-export-button`) вҖ” `scenes/MatchScene.ts`s `setupDevResetButton()` schaltet die
       * `.visible`-Klasse NUR frei, wenn dasselbe Dev-Gate wie die Tweak-Konsole aktiv ist
       * (`tweak/devGate.ts`s `isDevGateActive()`). Bewusst NICHT in der `html.touch-ui`-Ausblend-
       * Liste weiter unten (anders als `#debug-toggle-button`/`#tweak-console-toggle`) вҖ” dieser
       * Button muss AUCH auf Touch erreichbar bleiben, die Tweak-Konsole ist dort sonst gar nicht
       * mehr auslГ¶sbar. Unten LINKS verankert (Safe-Area, Regel 3/5) вҖ” der komplett freie
       * Gegenpol zum rechten Daumen-Cluster (Item-Leiste/Interact/Move-Mode-Buttons) UND zur
       * oberen Ecken-Belegung (Minimap links, Debug/NetLog rechts), damit ein Fehl-Tap im
       * hitzigen Spielgeschehen unwahrscheinlich bleibt.
       */
      #dev-reset-button {
        display: none;
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 1.3rem / 1.2 sans-serif;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #dev-reset-button.visible {
        display: flex;
      }

      /*
       * Statuszeile (Гңbergabe-Auftrag T4c, Felix-Default E-T4c-4): eigenstГӨndiges,
       * nicht-interaktives Element fГјr den dreiwertigen Verbindungsstatus ("verbunden" /
       * "reconnecteвҖҰ" / "Verbindung verloren") вҖ” bewusst getrennt vom technischen
       * Debug-HUD oben, damit der reine Verbindungszustand auf einen Blick sichtbar bleibt.
       * Unten verankert (safe-area-inset-bottom), damit zusammen mit #debug-overlay oben
       * alle vier Insets tatsГӨchlich genutzt werden.
       *
       * UI-Theme (R3-1): Cinzel-Titelschrift вҖ” die drei mГ¶glichen Texte sind kurze
       * Status-LABELS (keine SГӨtze/Zahlwerte, Leitplanke des Гңbergabe-Auftrags), damit ein
       * legitimer Cinzel-Anwendungsfall (vormals `monospace`).
       */
      #connection-status {
        position: fixed;
        /* Гңber den KOMPLETTEN rechten Daumen-Cluster gehoben (Wild-Rift-Umbau 2026-07-17):
           auf der Button-Etage kollidierte die zentrierte Statuszeile bei 375px mit dem
           dorthin gezogenen Schleichen-Toggle. Formel = `#hidden-hint`-Anker + eine Zeile
           Abstand (1.8em), damit sich beide zentrierten Texte auch gleichzeitig nie
           Гјberlappen (der Versteckt-Hinweis steht direkt darunter). */
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap) +
            var(--interact-button-size) + var(--hud-gap) + 1.8em
        );
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--theme-color-text-title);
        font: var(--hud-font-size) / 1.4 var(--theme-font-title);
        letter-spacing: var(--theme-letter-spacing-title);
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      /*
       * Fang-Moment-Einblendung (Гңbergabe-Auftrag P3c-1, Ziel 5, Critic-Auflage 2): kurze,
       * zentrierte HUD-Meldung ("<Rolle> wurde zum Geist"), unabhГӨngig vom technischen
       * Debug-HUD вҖ” relatives Layout (Regel 3), pointer-events: none (Regel 1). Ein-/
       * Ausblenden per CSS-Transition Гјber die `.visible`-Klasse, die
       * `scenes/MatchScene.ts` zeitgesteuert (`CATCH_ANNOUNCEMENT_DURATION_MS`) setzt/entfernt.
       *
       * UI-Theme (R3-1): Georgia-FlieГҹschrift (die Meldungstexte sind volle SГӨtze, z. B. вҖһEin
       * Verstecker wurde zum Geist" вҖ” Leitplanke des Гңbergabe-Auftrags verbietet Cinzel fГјr
       * FlieГҹtext), aber mit der Titel-Akzentfarbe (Gold) statt neutralem WeiГҹ вҖ” hebt die
       * Ansage als вҖһgroГҹen Moment" hervor, ohne die Lesbarkeit von Cinzels Versalien zu riskieren.
       */
      #catch-announcement {
        position: fixed;
        top: 40%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(90vw, 32rem);
        color: var(--theme-color-text-title);
        font: calc(var(--hud-font-size) * 1.3) / 1.4 var(--theme-font-body);
        text-align: center;
        text-shadow: 0 0 6px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #catch-announcement.visible {
        opacity: 1;
      }

      /*
       * Timer-HUD (Гңbergabe-Auftrag P3c-2 вҖһFormales Matchende + Sieg", Ziel 6): dauerhaft
       * sichtbare MM:SS-Zeile, eigenstГӨndiges DOM-Element (NICHT Teil des `#debug-overlay`-
       * Textblocks, siehe `scenes/MatchScene.ts`s `updateMatchTimerHud()`-Dokumentation) вҖ” oben
       * rechts verankert, damit sie sich nicht mit dem linksbГјndigen `#debug-overlay`-Text
       * Гјberlappt. Relatives Layout (Regel 3), `pointer-events: none` (Regel 1).
       */
      /*
       * Playtest-Fix (Felix, 2026-07-11): `top` um `--debug-toggle-button-size` + Gap nach unten
       * verschoben вҖ” Platz fГјr den neuen `#debug-toggle-button` oben rechts (Muster: derselbe
       * additive Offset wie `#wins-counter` unter `#match-timer`, nur eine Ebene hГ¶her).
       *
       * UI-Theme (R3-1): Georgia-FlieГҹschrift statt Cinzel (Leitplanke des Гңbergabe-Auftrags:
       * Cinzel NIE fГјr Timer/Zahlwerte вҖ” bei 375 px unleserlich), `tabular-nums` hГӨlt die
       * Ziffernbreite beim Sekundenwechsel stabil (kein Zittern der MM:SS-Zeile). Die
       * `.low-time`-/`.endgame`-Zustandsfarben unten bleiben unverГӨndert (eigene, bereits
       * K1-geprГјfte Warnfarben, kein Teil dieses Themes).
       */
      #match-timer {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--theme-color-text-body);
        font: calc(var(--hud-font-size) * 1.4) / 1.4 var(--theme-font-body);
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      /*
       * Low-Time-Warnung (Critic-Auflage 6): Farbwechsel + Puls in den letzten
       * `MATCH_LOW_TIME_WARNING_TICKS` (siehe `hud/matchTimer.ts`s `isMatchLowTime`) вҖ” reine
       * Darstellung, kein Sound.
       */
      #match-timer.low-time {
        color: var(--hud-low-time-color);
        animation: match-timer-pulse 800ms ease-in-out infinite;
      }

      @keyframes match-timer-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /*
       * Endgame-Countdown (Гңbergabe-Auftrag P3c-3, Entscheidung i): schaltet dieselbe
       * Timer-Zeile auf eine eigene Farbe um, sobald `scenes/MatchScene.ts`s
       * `updateMatchTimerHud()` per `isEndgamePhase(...)` in die Endgame-Phase wechselt вҖ” bewusst
       * OHNE Puls (reine Farbunterscheidung genГјgt, kein zweiter Dauer-Puls neben `low-time`).
       * SchlieГҹt sich mit `.low-time` gegenseitig aus (`updateMatchTimerHud()` entfernt jeweils
       * die andere Klasse).
       */
      #match-timer.endgame {
        color: var(--hud-endgame-color);
      }

      /*
       * Wins-HUD (Гңbergabe-Auftrag вҖһMatchflow: Rollen-Rotation + Rematch", Entwurfs-Entscheidung
       * d/AK-10, Kanon В§7: Spieltexte Englisch): dauerhafte EIGENANZEIGE вҖһWins: n" вҖ” direkt UNTER
       * `#match-timer` verankert (safe-area + Gap + eine ZeilenhГ¶he, relatives Layout, Regel 3),
       * reine Text-Ausgabe, kein neues Touch-Target (Regel 4 nicht einschlГӨgig).
       */
      #wins-counter {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap) + 2em);
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        transition:
          transform 200ms ease,
          color 200ms ease;
      }

      /* Blitz-Nit (Game-Design-Critic-Review): kurzer Aufblitz-Zustand bei Sieg-Inkrement вҖ” reine CSS-Transition, `scenes/MatchScene.ts`s `updateWinsHud()` schaltet die Klasse zeitgesteuert. */
      #wins-counter.pulse {
        color: var(--hud-endgame-color);
        transform: scale(1.3);
      }

      /*
       * Item-Ladungs-Pips (Auftrag вҖһBesen als erstes Item + minimales Item-Nutzungs-Fundament
       * (Runde 1)"): eigene, self-only Zeile UNTER `#wins-counter` (Muster dortiger Positionierung,
       * `2em` weiterer Zeilenabstand) вҖ” `в—Ҹ`/`в—Ӣ`-Zeichen als einfache, lesbare Pips (AK-7), gefГјllt
       * durch `scenes/MatchScene.ts`s `updateItemHud()`. `display: none` Default (nur sichtbar,
       * solange ein Item im Slot liegt), `.visible` schaltet frame-genau um (Muster
       * `#netlog-export-button`).
       */
      #item-charges-hud {
        display: none;
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap) + 4em);
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 monospace;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
      }

      #item-charges-hud.visible {
        display: block;
      }

      /*
       * Ergebnis-Overlay (Гңbergabe-Auftrag P3c-2, Entwurfs-Entscheidung g): eigenstГӨndiges
       * DOM-Element вҖ” NICHT `#catch-announcement` wiederverwendet (das blendet nach
       * `CATCH_ANNOUNCEMENT_DURATION_MS` aus; das Ergebnis muss die vollen
       * `MATCH_END_DELAY_TICKS` sichtbar stehen). Mehrzeiliger Text (`white-space: pre-line`,
       * siehe `scenes/MatchScene.ts`s `renderMatchResultText()`), zentriert, relatives Layout
       * (Regel 3), `pointer-events: none` (Regel 1).
       *
       * UI-Theme (R3-1): Georgia-FlieГҹschrift (der Text enthГӨlt Zahlwerte вҖ” вҖһ3/5" etc.,
       * Leitplanke des Гңbergabe-Auftrags verbietet Cinzel dafГјr), Titel-Akzentfarbe (Gold,

       */
      #match-result {

        text-align: center;

      }

      /*
       * Minimap вҖһMarauder's Map" (Гңbernahme-Manifest В§4, Posten R3-2, Felix-Freigabe
       * 2026-07-12, K2-Referenz `realMiniMap.ts` im read-only MVP-Ordner): Pergament-Panel mit
       * statischer Wand-/Raum-Geometrie + eigenem FuГҹspuren-Trail (`hud/minimap.ts`,
       * `scenes/MatchScene.ts`s `setupMinimapDom()`/`updateMinimapHud()`). Reines DOM-
       * `<canvas>`-Overlay (Muster `#sound-compass`/`#reveal-markers`), Safe-Area-bereinigt
       * (Mobile-Regel 5). `pointer-events: none` (Regel 1) вҖ” reine Anzeige, stГ¶rt den
       * Whole-Canvas-Joystick nie. **Bewusst als ERSTES Kind von `#game-container` platziert**
       * (siehe Markup unten): alle anderen `position: fixed`-HUD-Elemente (Timer, Wins-ZГӨhler,
       * Debug-Toggle-Button вҖҰ) stapeln sich per Default-DOM-Reihenfolge sichtbar DARГңBER вҖ”
       * вҖһeigene Ebene Гјber der Welt, unter dem DOM-HUD" ist damit strukturell erfГјllt, kein
       * `z-index` nГ¶tig. ZeichenflГӨche in FESTER PixelgrГ¶Гҹe (kein Zoom-Bezug, anders als die
       * Phaser-Kamera вҖ” DOM-Layout ist zoom-unabhГӨngig), berechnet Гјber `hud/minimap.ts`s
       * `computeMinimapLayout()` (siehe `setupMinimapDom()`).
       *
       * **ESP-Leitplanke (Kanon В§7/Interest-Management, load-bearing):** zeigt AUSSCHLIESSLICH
       * die EIGENE Position (Trail) + statische Geometrie вҖ” NIEMALS fremde Spieler, NIEMALS den
       * Live-TГјrzustand (siehe `updateMinimapHud()`-Dokumentation in `MatchScene.ts`).
       *
       * **Position oben LINKS (R3-Nachzug, Felix-Freigabe 2026-07-12, vormals oben rechts):**
       * `left` statt `right` verankert (Safe-Area-Inset links, Mobile-Regel 5). `top` um `2em`
       * zusГӨtzlich verschoben вҖ” GENAU dasselbe Muster wie `#debug-overlay`s Offset weiter unten
       * (Kommentar dort: вҖһdamit die IMMER sichtbare `#players-count`-Zeile darГјber Platz hat,
       * ohne zu Гјberlappen") вҖ”, denn `#players-count` sitzt in DERSELBEN oben-links-Ecke und
       * bleibt IMMER sichtbar (siehe dort). Ohne diesen Offset wГјrde das ~150Г—150px-Panel
       * (`MINIMAP_PANEL_MAX_WIDTH_PX`/`_HEIGHT_PX`, `config.ts`) die вҖһPlayers: N"-Zeile
       * Гјberdecken.
       */
      #minimap-panel {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap) + 2em);
        left: calc(var(--hud-safe-left) + var(--hud-gap));
        /*
         * Tap-Toggle (Felix-Auftrag 2026-07-17, Mobile-Layout-Umbau): das Panel ist seither
         * SELBST ein Tap-/Klick-Ziel (ein Tap klappt die Karte auf den kleinen Karten-Knopf
         * `#minimap-restore-button` zusammen, ein weiterer klappt sie wieder auf) вҖ” deshalb
         * `pointer-events: auto` statt des frГјheren `none`. Dasselbe Pointer-only-Muster wie
         * `.mobile-move-mode-button` (EIN Eingabepfad fГјr Maus UND Touch, `touch-action: none`
         * gegen Doppel-Tap-Zoom, `stopPropagation()` im Handler in `scenes/MatchScene.ts`s
         * `setupMinimapDom()` вҖ” strukturell erreicht ein Panel-Tap den Whole-Canvas-Joystick
         * ohnehin nie, das Panel ist DOM-Geschwister des Phaser-Canvas). Das aufgeklappte Panel
         * (~150Г—110px, `MINIMAP_PANEL_MAX_*_PX`) und der zusammengeklappte Knopf (вүҘ48px, s. u.)
         * liegen beide Гјber der Mobile-Tag-1-MindestgrГ¶Гҹe (Regel 4).
         */
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        cursor: pointer;
      }

      #minimap-canvas {
        display: block;
        border-radius: 2px;
      }

      /*
       * Zusammengeklappter Minimap-Zustand (`.minimap-panel--minimized`, geschaltet in
       * `scenes/MatchScene.ts`s `setupMinimapDom()`-Tap-Handler): Canvas weg, stattdessen ein
       * kleiner runder Karten-Knopf an derselben Stelle (Optik-Muster `#debug-toggle-button`,
       * GrГ¶Гҹe вүҘ48px, Regel 4) вҖ” die Karte verschwindet nie вҖһspurlos", der Weg zurГјck bleibt
       * sichtbar an Ort und Stelle.
       */
      #minimap-restore-button {
        display: none;
        width: var(--debug-toggle-button-size);
        height: var(--debug-toggle-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);

        align-items: center;

      }

      #minimap-restore-button svg {

      #minimap-panel.minimap-panel--minimized #minimap-canvas {

      }

      #minimap-panel.minimap-panel--minimized #minimap-restore-button {

      /*
       * Kompass-Pfeil-Vereinheitlichung (Felix-Auftrag 2026-07-17, `vault/20-Architektur/
       * kompass-pfeil-vereinheitlichung-konzept.md`): EINE gemeinsame Pfeil-GEOMETRIE fГјr den
       * Sound-Kompass UND die Reveal-Marker (weiter unten) вҖ” Q3/Architektur-Auflage: nur die
       * OPTIK ist gemeinsam, Zustands-Logik/DOM-Pool bleiben vollstГӨndig getrennt (zwei eigene
       * `#sound-compass`/`#reveal-markers`-Container, zwei eigene Element-Pools). Spitze zeigt
       * in der CSS-Neutralstellung nach OBEN (Norden) вҖ” ein echter Pfeil mit Schaft-Andeutung
       * (Kopf + schmaler Steg), nicht bloГҹ ein Dreieck. Rotation kommt IMMER als Inline-
       * `transform: rotate(angleRad + PI/2)` von `scenes/MatchScene.ts` (`updateSoundCompassHud`/
       * `updateRevealMarkersHud`), deshalb bewusst KEIN `transform` in dieser Klasse selbst.
       * Form kommt aus dem von Felix abgenommenen Pfeil-Asset (Variante C вҖһRunen-Chevron",
       * Abnahme 2026-07-18; Master `assets-src/ui/kompass-pfeil/kompass-pfeil-c.png`,
       * Derivat 64Г—56 px) als Alpha-MASKE: EIN Asset, FГӨrbung bleibt wie bisher pro Element
       * Гјber `background-color`. Relativer Pfad, damit Dev (`/`) UND GitHub-Pages-Deploy
       * (`--base=./`) funktionieren (Mobile-Regel 9: lokal bГјndelbar, kein CDN).
       */
      .kompass-pfeil {
        -webkit-mask: url("assets/ui/kompass-pfeil.png") center / contain no-repeat;
        mask: url("assets/ui/kompass-pfeil.png") center / contain no-repeat;
      }

      /*
       * Sound-Kompass (Гңbergabe-Auftrag вҖһSpatial Audio Stufe 1", Scheibe B, E10; вҖһPfeile an der
       * Spielfigur", Felix-Auftrag 2026-07-22): Container fГјllt die FlГӨche INNERHALB der
       * Safe-Area-Insets (Mobile-Regel 5) und dient seit dem Figur-Ring-Umbau NUR noch als
       * Koordinatensystem вҖ” `scenes/MatchScene.ts`s `updateSoundCompassHud()` verankert die
       * Pfeile in PIXELN auf einem Ring um die Bildschirmposition der eigenen Figur
       * (Container-Offset wird dort Гјber `getBoundingClientRect()` herausgerechnet), nicht mehr
       * in Rand-Prozenten. `pointer-events: none` (Regel 1): der Kompass darf den
       * Whole-Canvas-Joystick nie stГ¶ren. Fester Element-Pool (`KOMPASS_MAX_INDIKATOREN` StГјck,
       * in `setupSoundCompassDom()` einmalig angelegt) вҖ” `.visible` schaltet Sichtbarkeit,
       * Position/Farbe/Rotation kommen als Inline-Styles pro Frame (`updateSoundCompassHud()`);
       * die Form kommt von `.kompass-pfeil` (immer Pfeil, keine Formunterscheidung mehr nach
       * Rolle вҖ” Kompass-Pfeil-Vereinheitlichung).
       */
      #sound-compass {
        position: fixed;
        top: var(--hud-safe-top);
        right: var(--hud-safe-right);
        bottom: var(--hud-safe-bottom);
        left: var(--hud-safe-left);
        pointer-events: none;
      }

      /*
       * `.sound-compass-indicator` trГӨgt selbst KEIN `transform` mehr (Kompass-Pfeil-
       * Vereinheitlichung, Felix-Auftrag 2026-07-17): `scenes/MatchScene.ts`s
       * `updateSoundCompassHud()` setzt Translate+Rotate pro Frame als EINEN kombinierten
       * Inline-`transform` (Muster `.reveal-marker`, s. u.), sonst wГјrden sich eine statische
       * CSS-Regel und der Inline-Rotate gegenseitig Гјberschreiben.
       */
      .sound-compass-indicator {
        position: absolute;
        display: none;
      }

      .sound-compass-indicator.visible {
        display: block;
      }

      /*
       * FГӨnger-Randmarker (Гңbergabe-Auftrag P3g вҖһShrink-Endgame", Entwurfs-Entscheidung i;
       * Farbe/Form aktualisiert Kompass-Pfeil-Vereinheitlichung, Felix-Auftrag 2026-07-17;
       * **Ring statt Rand, Felix-Bugfix 2026-07-22**: вҖһder lila Pfeil wird noch auГҹen angezeigt"
       * вҖ” dieser Container dient seit dem Ring-Umzug NUR noch als Koordinatensystem, genau wie
       * `#sound-compass`, der vormalige Rand-Einzug ist ersatzlos entfallen): fester Element-Pool
       * (`REVEAL_MARKER_MAX_COUNT`, in `setupRevealMarkerDom()` einmalig angelegt).
       * `pointer-events: none` (Regel 1): darf den Whole-Canvas-Joystick nie stГ¶ren.
       * `scenes/MatchScene.ts`s `updateRevealMarkersHud()` verankert die Pfeile in PIXELN auf
       * einem Ring um die Bildschirmposition der eigenen Figur (Container-Offset wird dort Гјber
       * `getBoundingClientRect()` herausgerechnet, Muster `updateSoundCompassHud()`) und setzt
       * Position/Drehung PRO FRAME als EINEN kombinierten Inline-`transform` (Translate +
       * Rotate) вҖ” deshalb bewusst KEIN `transform` in dieser Regel selbst (wГјrde sonst
       * Гјberschrieben/kollidieren). Die Pfeil-Form kommt von der gemeinsamen
       * `.kompass-pfeil`-Klasse (s. o.) вҖ” nur die Farbe (`--reveal-marker-color`, Violett,
       * Konzept Q3: PrГӨzisions-Ehrlichkeit gegenГјber dem groben Sound-Kompass) bleibt
       * eigenstГӨndig.
       */
      #reveal-markers {
        position: fixed;
        top: var(--hud-safe-top);
        right: var(--hud-safe-right);
        bottom: var(--hud-safe-bottom);
        left: var(--hud-safe-left);
        pointer-events: none;
      }

      .reveal-marker {
        position: absolute;
        width: var(--reveal-marker-size);
        height: var(--reveal-marker-size);
        background: var(--reveal-marker-color);
        display: none;
      }

      .reveal-marker.visible {
        display: block;
      }

      /*
       * Audio-Unlock-Hinweis (E9, Mobile-Tag-1-Regel 8): dezent, verschwindet nach der ersten
       * Pointer-Geste (Phasers eingebautes Unlock, siehe `scenes/MatchScene.ts`s
       * `setupAudioUnlock()`). Unten zentriert, oberhalb der mobilen Bewegungsmodus-Buttons.
       */
      #audio-unlock-hint {
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap) + var(--move-mode-button-size) + var(--hud-gap));
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #audio-unlock-hint.visible {
        opacity: 1;
      }

      /*
       * Mobile Bewegungsmodus-Buttons (P3d, Гңbergabe-Auftrag вҖһBewegungsmodi (Schleichen/Gehen/
       * Dash)"): zwei runde DOM-Buttons вҖ” Schleichen-TOGGLE (bleibt aktiv bis zum nГӨchsten Tap)
       * + Dash-TAP (einmaliger Wunsch pro Tap, Verdrahtung in `scenes/MatchScene.ts`s
       * `setupMoveModeControls()`, Zustand in `net/moveModeInput.ts`s `MobileMoveModeState`).
       *
       * ANDERS als die reinen HUD-Anzeige-Elemente oben (`pointer-events: none`) sind diese
       * beiden Elemente bewusst `pointer-events: auto` вҖ” sie SIND die Eingabe (Mobile-Tag-1-
       * Regel 1: Pointer-only, kein separater Touch-Sonderpfad). `touch-action: none` +
       * `-webkit-tap-highlight-color: transparent` unterdrГјcken Browser-Standardgesten
       * (Doppel-Tap-Zoom, Tipp-Hervorhebung), die sonst mit dem Whole-Canvas-Joystick
       * kollidieren kГ¶nnten.
       *
       * GrГ¶Гҹe вүҘ 48 px (Regel 4, `--move-mode-button-size` oben, `min-width`/`min-height` als
       * harte Untergrenze zusГӨtzlich zur BasisgrГ¶Гҹe). Position relativ zu den Safe-Area-Insets
       * + `--hud-gap` verankert (Regel 3/5), NICHT auf einen festen Bildschirm-Pixelwert.
       *
       * Eigene DOM-Geschwister auГҹerhalb des Phaser-Canvas (nicht dessen Kind): ein Tap auf
       * einen dieser Buttons erreicht Phasers Whole-Canvas-Joystick-`pointerdown`-Listener
       * (`net/pointerJoystick.ts`) dadurch STRUKTURELL nie вҖ” kein Joystick-Ursprung wird
       * gesetzt. `stopPropagation()`/`preventDefault()` im jeweiligen Handler
       * (`scenes/MatchScene.ts`) sind zusГӨtzliche, defensive Absicherung, kein Ersatz fГјr diese
       * strukturelle Trennung.
       */
      .mobile-move-mode-button {
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        width: var(--move-mode-button-size);
        height: var(--move-mode-button-size);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        border: 2px solid var(--hud-text-color);
        background: rgba(0, 0, 0, 0.35);
        color: var(--hud-text-color);
        font: 0.9rem / 1.2 sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      /*
       * Schleichen-Toggle: seit dem Mobile-Layout-Umbau (Felix-Auftrag 2026-07-17,
       * Wild-Rift-Muster) RECHTS im Daumen-Cluster, direkt links neben dem groГҹen
       * `#mobile-interact-button` вҖ” vormals links unten, wo er mitten in der Zone des
       * floating Joysticks stand (Felix-Playtest-Befund: вҖһsteht voll im Weg"). Die linke
       * BildschirmhГӨlfte gehГ¶rt jetzt wieder KOMPLETT dem Joystick (exakt das MVP-Vorbild:
       * Sneak-Button вҖһLEISE" saГҹ dort bei X=728 rechts neben dem Aktions-Button, die
       * Joystick-Zone war die linke BildhГӨlfte). Gleiche Etage wie Interagieren (Гјber der
       * Item-Bar), `right`-Verankerung = Safe-Area + Interact-Breite + Gap (Regel 3/5).
       * `bottom` zusГӨtzlich um die halbe GrГ¶Гҹendifferenz zum groГҹen Interact-Button angehoben,
       * damit beide Kreise auf einer MITTELLINIE liegen (Wild-Rift-Cluster-Optik).
       */
      #mobile-sneak-button {
        right: calc(var(--hud-safe-right) + var(--hud-gap) + var(--interact-button-size) + var(--hud-gap));
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap) +
            (var(--interact-button-size) - var(--move-mode-button-size)) / 2
        );
      }

      /* Aktiv-Zustand des Schleichen-Toggles (`scenes/MatchScene.ts`) вҖ” reine Darstellung. */
      #mobile-sneak-button.active {
        background: rgba(255, 255, 255, 0.35);
      }

      /*
       * Der frГјhere `#mobile-dash-button` (Dash-Tap unten rechts) ist mit EinfГјhrung der
       * Item-Bar ENTFALLEN вҖ” der Dash lebt jetzt als erster Slot der Item-Bar
       * (`#item-slot-dash`, Verdrahtung `setupItemBar()`), kein separater Eck-Button mehr.
       */

      /*
       * Mobile Interaktions-Button (P3e, Гңbergabe-Auftrag вҖһVerstecken in Objekten (В§5), Stufe
       * 1", Entscheidung a): EIN Tap-Button (kein Halten), Verdrahtung in `scenes/MatchScene.ts`s
       * `setupInteractControls()`, Zustand in `net/interactInput.ts`s `MobileInteractState`.
       * Teilt sich die Basis-Optik mit den Bewegungsmodus-Buttons (`.mobile-move-mode-button`,
       * GrГ¶Гҹe/Form/Touch-Verhalten identisch, Mobile-Tag-1-Regel 4) вҖ” bekommt hier NUR eine
       * eigene Position (s. u.).
       */
      #mobile-interact-button {
        /* Haupt-Aktion (TГјr/Verstecken) in die gut erreichbare rechte Daumenzone, gestapelt
           ГңBER der Item-Bar (vormals Гјber dem Dash-Button вҖ” der Dash ist jetzt ein Bar-Slot).
           HГ¶he an `--item-bar-height` gekoppelt. Seit dem Wild-Rift-Umbau (Felix-Auftrag
           2026-07-17) der GRГ–SSTE Button des Clusters (`--interact-button-size`, s. Kommentar
           an der Variable) вҖ” der Schleichen-Toggle sitzt kleiner links daneben. */
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap));
        width: var(--interact-button-size);
        height: var(--interact-button-size);
      }

      /*
       * Button-Icons (Wild-Rift-Umbau, Felix-Auftrag 2026-07-17): Piktogramme statt der
       * vormaligen Wort-Labels вҖһSchleichen"/вҖһInteragieren" (10+ Zeichen FlieГҹtext in einem
       * 56px-Kreis вҖ” bei 375px praktisch unlesbar, Mobile-Unfreundlichkeit aus dem
       * Felix-Playtest). Inline-SVG im Markup, Stil-Muster der Item-Bar-Icons
       * (`.item-slot__icon svg`: currentColor + drop-shadow, KEIN neues Asset/keine Dependency).
       */
      .mobile-move-mode-button svg {
        width: 55%;
        height: 55%;
        display: block;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
      }

      /* =====================================================================
       * Item-Bar (Felix-Auftrag 2026-07-17) вҖ” Гңbernahme der MVP-Aktionsleiste
       * =====================================================================
       * Unten in der rechten Daumenzone, `right`/`bottom` an der Safe-Area verankert (Regel 5),
       * rechtsbГјndig (`justify-content: flex-end`) вҖ” die am hГӨufigsten getippten Slots sitzen
       * rechts in bester Daumenreichweite (Felix-Playtest: untere Mitte am schlechtesten
       * erreichbar). Zwei Gruppen (Dash В· Zauber | 3 Items) mit grГ¶Гҹerem Zwischenabstand
       * (`--item-bar-group-gap`, MVP DASH_GROUP_GAP). Container `pointer-events: none`, nur die
       * `.item-slot`-Kacheln setzen `auto` вҖ” die ZwischenrГӨume schlucken keine Joystick-Touches
       * (Regel 1). `max-width` deckelt Гңberlauf auf sehr schmalen GerГӨten. */
      #item-bar {
        position: fixed;
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        max-width: calc(100vw - var(--hud-safe-left) - var(--hud-safe-right) - 2 * var(--hud-gap));
        display: flex;
        justify-content: flex-end;
        align-items: flex-end;
        gap: var(--item-bar-group-gap);
        pointer-events: none;
      }

      .item-bar__group {
        display: flex;
        gap: var(--item-slot-gap);
      }

      /*
       * Eine Slot-Kachel: Steinrahmen (Bild-Asset `ui/slot-item-frame.png`, oberste Ebene, immer
       * scharf, transparente Mitte) Гјber einem dunklen Panel mit farbigem Akzentrand. Schichtung
       * 1:1 aus dem MVP (`hudShared.ts`): Panel < Cooldown-Wipe < Steinrahmen, das Icon im Panel.
       * `pointer-events: auto` вҖ” die Kachel IST das Tap-Ziel (Mobile-Tag-1-Regel 1: EIN
       * Pointer-Eingabepfad, kein Joystick-Ursprung, `stopPropagation` zusГӨtzlich im Handler).
       * `--slot-accent`/`--slot-cooldown` sind die pro-Slot-Stellschrauben (Zustandsklassen bzw.
       * `scenes/MatchScene.ts` pro Frame). */
      .item-slot {
        position: relative;
        width: var(--item-slot-size);
        height: var(--item-slot-size);
        min-width: 48px;
        min-height: 48px;
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        --slot-accent: var(--item-slot-accent-empty);
        --slot-cooldown: 0;
      }

      /* Panel + Akzentrand, unter den Steinrahmen zurГјckgesetzt (MVP SLOT_ACCENT_INSET). */
      .item-slot__panel {
        position: absolute;
        inset: var(--item-slot-inner-inset);
        border-radius: calc(var(--item-slot-radius) - var(--item-slot-inner-inset));
        background: var(--item-slot-panel-bg);
        box-shadow: inset 0 0 0 2px var(--slot-accent);
      }

      /* Icon zentriert im Panel, eingefГӨrbt in der Slot-Akzentfarbe (monochrom, gedГӨmpfter Look). */
      .item-slot__icon {
        position: absolute;
        inset: var(--item-slot-inner-inset);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--slot-accent);
        z-index: 1;
      }

      .item-slot__icon svg {

      /*
       * Cooldown-Wipe (MVP: dunkler Radial-Sweep von 12 Uhr im Uhrzeigersinn, schrumpft beim
       * AbkГјhlen). `--slot-cooldown` (0вҖҰ1, = verbleibende Cooldown-Ratio) setzt
       * `scenes/MatchScene.ts` pro Frame; der conic-gradient deckt genau diesen Anteil des Kreises
       * dunkel ab. Bei 0 hat der Farbstop Breite 0 вҶ’ nichts verdunkelt. */
      .item-slot__cooldown {
        position: absolute;

         * Mobile-Slot-Budget (Verlangsamungsspur, LOAD-BEARING): JEDER Zauber-Slot (unabhГӨngig
         * von der Kategorie) bekommt die kleinere `--item-slot-size-spell` (50 px statt 54 px) вҖ”
         * der Dash-Slot bleibt unverГӨndert bei `--item-slot-size` (nur `.item-slot--dash`, kein
         * gemeinsamer Selektor). Gleiche SpezifitГӨt wie die Basisregel `.item-slot` oben, spГӨtere
         * Quellreihenfolge gewinnt (kein `!important` nГ¶tig).
         */
        width: var(--item-slot-size-spell);
        height: var(--item-slot-size-spell);
      }
      /* Licht-Zauber-Trio (Schritt 17): distinkte Akzentfarbe je Kategorie (kosmetisch). */
      .item-slot--spell-door {

      }
      .item-slot--spell-light {

      }
      /* Runen-Falle (Schritt 12): eigene Akzentfarbe fГјr die Kategorie вҖһrune". */
      .item-slot--spell-rune {
        --slot-accent: var(--item-slot-accent-spell-rune);
      }
      /* Verlangsamungsspur (Schritt 16): eigene Akzentfarbe fГјr die Kategorie вҖһslowfield". */
      .item-slot--spell-slowfield {
        --slot-accent: var(--item-slot-accent-spell-slowfield);
      }
      /* Spurenleser: eigene Akzentfarbe fГјr die Kategorie вҖһtrailreveal". */
      .item-slot--spell-trailreveal {
        --slot-accent: var(--item-slot-accent-spell-trailreveal);
      }
      /* Katzen-Verwandlung: eigene Akzentfarbe fГјr die Kategorie вҖһcatform". */
      .item-slot--spell-catform {
        --slot-accent: var(--item-slot-accent-spell-catform);
      }
      .item-slot--item {
        width: var(--item-slot-size-spell);
        height: var(--item-slot-size-spell);
      }
      .item-slot--item-filled {

      }
      .item-slot--item-empty {

      }
      .item-slot__item-pips {

        left: 0;
        right: 0;
        bottom: 3px;
        text-align: center;

        text-shadow: 0 0 3px #000;
        z-index: 1;
        pointer-events: none;
      }
      /*
       * Abgenommenes Pixel-Icon (Licht-Trio, Felix-Abnahme 2026-07-18 вҖһ3x Variante A"):
       * <img> mit dem 128-px-Derivat aus assets/icons/, contain-skaliert in derselben
       * Inner-Inset-FlГӨche wie Emoji/SVG; Padding hГӨlt Luft zum Steinrahmen.
       * width/height MГңSSEN explizit gesetzt sein: ein <img> ist ein Replaced Element вҖ”
       * `inset` allein streckt es (anders als die Emoji-/SVG-Wrapper-<div>s) NICHT, es
       * rendert sonst in nativer 128-px-GrГ¶Гҹe Гјber den ~50-px-Slot hinaus.

      .item-slot__icon--image {

      .item-slot__icon--emoji {

      .item-slot.is-cooldown {

      /* Tap-Feedback nur fГјr tatsГӨchlich bediente Slots (heute: Dash). */
      .item-slot.is-actionable:active {

      }

      /*
       * Mobile Item-Nutzungs-Button (Auftrag вҖһBesen als erstes Item + minimales Item-Nutzungs-
       * Fundament (Runde 1)"): EIN Tap-Button (kein Halten), Verdrahtung in `scenes/MatchScene.ts`s
       * `setupUseItemControls()`, Zustand in `net/useItemInput.ts`s `MobileUseItemState`. Teilt
       * sich die Basis-Optik mit den Bewegungsmodus-/Interaktions-Buttons
       * (`.mobile-move-mode-button`, GrГ¶Гҹe/Form/Touch-Verhalten identisch вҖ” Touch-Target вүҘ 48 px,
       * Mobile-Tag-1-Regel 4), ist aber ANDERS als jene NICHT dauerhaft sichtbar (AK-7: вҖһnur
       * sichtbar, wenn nutzbar" вҖ” Item im Slot ODER aktiver Flug): `display: none` als
       * ID-spezifischer Default Гјberschreibt die Klassen-Vorgabe `display: flex`, `.visible`
       * (`updateItemHud()`, `MatchScene.ts`) schaltet ihn frame-genau wieder ein (Muster
       * `#netlog-export-button`).
       */
      #mobile-broom-button {
        display: none;
        /* Wild-Rift-Umbau (Felix-Auftrag 2026-07-17): stapelt in der Ecken-Spalte direkt ГңBER
           dem vergrГ¶Гҹerten Haupt-Aktionsbutton (`--interact-button-size`) вҖ” dieselben Summanden
           wie dessen `bottom`-Formel PLUS dessen HГ¶he + Gap (vormals `2 Г— move-mode-size`,
           das kollidierte mit dem grГ¶Гҹeren Interact-Button). */
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap) +
            var(--interact-button-size) + var(--hud-gap)

      #mobile-broom-button.visible {

      }

      /*
       * Fang-Sog-Tap-Button (Felix-Entscheid 2026-07-18, вҖһTapp-Sog"): die STГ„NDIGE Haupt-Aktion
       * des FГӨngers вҖ” deshalb in Interact-GrГ¶Гҹe (`--interact-button-size`, Touch-Target вүҘ 48 px)
       * und dauerhaft sichtbar, solange man FГӨnger ist (`.visible` via
       * `updateCatchTapButtonVisibility()`, Rollen-Gate statt Item-Gate вҖ” Muster
       * `#mobile-broom-button`). Position: SNEAK-Spalte (dieselbe `right`-Formel wie
       * `#mobile-sneak-button`), eine Etage ГңBER dem Interact-Boden (dieselben `bottom`-Summanden
       * wie `#mobile-broom-button`) вҖ” kollidiert dadurch strukturell mit KEINEM der beiden
       * (Besen-Spalte rechts, Sneak-Etage darunter), auch wenn ein FГӨnger Besen + Sog gleichzeitig
       * trГӨgt.
       */
      #mobile-catch-tap-button {
        display: none;
        right: calc(var(--hud-safe-right) + var(--hud-gap) + var(--interact-button-size) + var(--hud-gap));
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap) +

      /* Tap-Feedback (der Sog lebt vom schnellen Wiederholungs-Tap вҖ” ohne sichtbare Quittung
         fГјhlt sich HГӨmmern taub an; reine Darstellung, Muster `#mobile-sneak-button.active`). */
      #mobile-catch-tap-button:active {

      /*
       * Sichtbarer floating Joystick (Felix-Playtest 2026-07-13 вҖһMobile-UI deutlich
       * nutzerfreundlicher" + Touch-UX-Best-Practice вҖһdynamic/floating stick"): rein visuelles
       * DOM-Overlay (`pointer-events: none` вҖ” der Whole-Canvas-Joystick UNTER dem Canvas fГӨngt die
       * Eingabe, `scenes/MatchScene.ts`s `setupPointerInput()`). Erscheint am Aufsetzpunkt: Basis-
       * Ring (Durchmesser = 2 Г— `JOYSTICK_MAX_RADIUS_PX` = 128px), Knauf folgt der Auslenkung
       * (`showJoystickVisual()`). Zentrierung per negativem Margin, damit `left`/`top` den
       * MITTELPUNKT setzen. DOM-frГјh platziert вҶ’ die Aktions-Buttons stapeln sichtbar darГјber.
       * Graublau/hell, halbtransparent (HUD-Stil, Muster MVP-Joystick).
       */
      #joystick-base,
      #joystick-knob {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        display: none;
      }
      #joystick-base.visible,
      #joystick-knob.visible {
        display: block;
      }
      #joystick-base {
        width: 128px;
        height: 128px;
        margin-left: -64px;
        margin-top: -64px;

      }
      #joystick-knob {

        height: 52px;

      }

      /*
       * Versteckt-Hinweis (P3e, Entscheidung m): dauerhafter Hinweis вҖһDu bist versteckt вҖ” E zum
       * Verlassen", solange die eigene Figur `isHidden` ist вҖ” ANDERS als `#catch-announcement`
       * KEIN Zeit-Ausblenden (Muster `#audio-unlock-hint`), `scenes/MatchScene.ts`s
       * `updateHiddenVisual()`/`initializeHiddenVisual()` schalten ausschlieГҹlich die
       * `.visible`-Klasse. Oberhalb der mobilen Buttons verankert (Muster `#audio-unlock-hint`).
       */
      #hidden-hint {
        position: fixed;
        /* Гјber dem kompletten rechten Daumen-Cluster verankert (Item-Bar-Etage + groГҹer
           Interact-Button, Wild-Rift-Umbau 2026-07-17) вҖ” exakt dieselben Summanden wie die
           `bottom`-Formel von `#mobile-interact-button` PLUS dessen HГ¶he + Gap. */
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + var(--item-bar-height) + var(--hud-gap) +
            var(--interact-button-size) + var(--hud-gap)
        );
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      /*
       * Hinweis (Merge-Doktrin `vollmerge`, Audio = ours-Implementierung): der `tweak-konsole`-
       * Zweig kannte an dieser Stelle noch einen Г„LTEREN, seither ersetzten Kompass-/Stumm-
       * Hinweis-Stand (`#compass-overlay`/`.compass-indicator--*`/`#mute-hint`, gebunden an die
       * inzwischen verworfene Audio-API `SoundEventQuantized`/`SoundDampingStage`/
       * `SoundDistanceStage`, siehe `hud/compass.ts`) вҖ” bewusst NICHT Гјbernommen, ERSETZT durch
       * den bereits vorhandenen, aktuellen Stand oben im Dokument (`#sound-compass`/
       * `.sound-compass-indicator--*`, `#reveal-markers`, `#audio-unlock-hint`), der auf der
       * kanonischen `packages/shared/src/sound.ts`-API (`DAMPENING_STAGE_*`, `DISTANCE_STAGE_*`)
       * aufsetzt. Kein UI-Element geht dadurch verloren вҖ” dieselbe Funktion (Kompass-Indikatoren,
       * вҖһTippen fГјr Ton"-Hinweis) existiert bereits unter dem aktuellen Namen.
       */

      #hidden-hint.visible {
        opacity: 1;
      }

      /*
       * Rumpel-HUD-Balken (Versteck-Rumpeln, Anti-Camper В§5, ursprГјnglich Client-/Sound-Scheibe
       * R1c, Felix-Feel-Vorgabe вҖһ1:1 aus dem MVP"). **Mobile-Redesign вҖһder Balken ist selbst das
       * Tap-Ziel" (Гңbergabe-Auftrag `2026-07-16-rumpel-balken-tap-redesign.md`):** dediziertes
       * Bildschirm-HUD fГјr die EIGENE Balken-Challenge вҖ” NICHT Гјber dem Kopf (das wГӨre ein
       * Welt-/Sprite-Element wie die Channel-Fortschrittsbalken, `CHANNEL_PROGRESS_BAR_*`),
       * sondern ein fixes DOM-HUD (Muster `#debug-overlay`: harter `display`-Toggle statt
       * Opacity-Fade вҖ” die Challenge ist ein Reflex-Test, eine Гңbergangsphase wГјrde die exakte
       * Marker-Position beim Erscheinen verfГӨlscht wirken lassen). Nur sichtbar, solange die
       * eigene Figur `rumbleActive` ist (`scenes/MatchScene.ts`s `updateRumbleHud()`, PRO FRAME,
       * Muster `updateChannelProgressBar()`/`updateMinimapHud()` вҖ” SELF-Werte). Гңber BEIDEN
       * Button-Reihen UND dem `#hidden-hint`-Text verankert (Muster `#hidden-hint`s eigenem
       * Offset Гјber beiden Button-Reihen) вҖ” die `bottom`-Formel selbst bleibt unverГӨndert
       * (Redesign-Spezifikation В§4: вҖһPosition unverГӨndert"); da der Balken jetzt DEUTLICH hГ¶her
       * ist (60 px statt vormals 16 px) und nach OBEN wГӨchst, vergrГ¶Гҹert sich der Abstand zu
       * `#hidden-hint` dadurch nur zusГӨtzlich (geprГјft: keine Гңberlappung bei irgendeiner
       * Viewport-Breite, kein Offset-Nachzug an `#hidden-hint` nГ¶tig).
       *
       * **Zwei-Ebenen-Struktur (E1 вҖ” der Balken IST das Tap-Ziel, keine Positionsauswertung):**
       * `#rumble-bar-hit` ist der Г„USSERE, unsichtbare Wrapper вҖ” `position: fixed`, trГӨgt die
       * `bottom`-Formel + Zentrierung, seine GrГ¶Гҹe (`--rumble-bar-width`/`-height` PLUS je
       * `2 Г— --rumble-bar-hit-halo`) ist die tatsГӨchliche Pointer-TrefferflГӨche
       * (`pointer-events: auto` NUR wГӨhrend `.visible`, Pointer-Wiring in
       * `setupRumbleTapControls()`, `MatchScene.ts`). `#rumble-bar` ist der INNERE, SICHTBARE
       * Balken (Hintergrund/Rahmen/Radius) вҖ” `position: absolute` innerhalb des Wrappers, um
       * exakt `--rumble-bar-hit-halo` von dessen Rand eingerГјckt (die unsichtbare Halo liegt
       * dadurch symmetrisch auГҹen herum). Marker/Zone bleiben ausschlieГҹlich Kinder von
       * `#rumble-bar` und referenzieren dadurch weiterhin exakt die SICHTBARE BalkenflГӨche, exakt
       * wie vor dem Redesign вҖ” die Halo verГӨndert ihre Prozent-Formel an keiner Stelle. Beide
       * Ebenen werden synchron von `updateRumbleHud()` auf `.visible` geschaltet (dieselbe
       * Bedingung `rumbleActive || Ausgang-Feedback-Blitz aktiv`, siehe unten).
       *
       * **Scale-Pop beim Erscheinen** (`@keyframes rumble-bar-appear-pop`, Dauer
       * `RUMBLE_BAR_APPEAR_POP_DURATION_MS` aus `src/config.ts`, bewusste Duplikation dort
       * dokumentiert): lГӨuft NUR auf `#rumble-bar` (dem sichtbaren Container) вҖ” eine reine
       * Skalierung um dessen eigenes Zentrum, verfГӨlscht die relative Marker-/Zonen-Position
       * dadurch an keiner Stelle (beide bleiben Prozentwerte relativ zur unskalierten Layout-Box
       * des Containers, die CSS-`transform: scale()` rein visuell mitskaliert). LГӨuft
       * automatisch bei jeder falseвҶ’true-Flanke von `.visible` erneut an (kein JS-Trigger nГ¶tig
       * вҖ” dieselbe Selektor-Neu-Zuordnung wie beim bestehenden `display: none вҶ’ block`-Toggle).
       *
       * Marker/Zone werden per Inline-`style` PRO FRAME neu gesetzt (`updateRumbleHud()`):
       * `#rumble-bar-zone`s `width` = `rumbleGreenZoneFraction` (live tunbar), zentriert per
       * `left: 50%` + `transform: translateX(-50%)`; `#rumble-bar-marker`s `left` = Marker-
       * Fraktion `[0,1]` als Prozent, ebenfalls per `translateX(-50%)` auf den Fraktionspunkt
       * zentriert (Muster `.sound-compass-indicator`s `translate(-50%, -50%)`-Zentrierungstrick)
       * вҖ” der Marker darf dadurch an den RГӨndern (Fraktion 0/1) leicht Гјber den Balkenrand
       * hinausragen (halbe Marker-Breite), exakt wie im MVP-Vorbild.
       */
      #rumble-bar-hit {
        display: none;
        position: fixed;
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + 3 * (var(--move-mode-button-size) + var(--hud-gap))
        );
        left: 50%;
        transform: translateX(-50%);
        width: calc(var(--rumble-bar-width) + 2 * var(--rumble-bar-hit-halo));
        height: calc(var(--rumble-bar-height) + 2 * var(--rumble-bar-hit-halo));

      @keyframes rumble-bar-appear-pop {

          transform: scale(1);
        }
      }

      #rumble-bar {
        display: none;
        position: absolute;
        top: var(--rumble-bar-hit-halo);
        left: var(--rumble-bar-hit-halo);
        width: var(--rumble-bar-width);
        height: var(--rumble-bar-height);
        background: rgba(0, 0, 0, 0.7);
        border-radius: var(--rumble-bar-radius);
        border: var(--rumble-bar-border-width) solid var(--rumble-bar-border-color);
        box-sizing: border-box;
        overflow: hidden;
        pointer-events: none;
      }

      #rumble-bar.visible {
        display: block;
        animation: rumble-bar-appear-pop 130ms ease-out;
      }

      #rumble-bar-zone {
        position: absolute;
        top: 0;
        left: 50%;
        height: 100%;
        background: var(--rumble-zone-color);
        transform: translateX(-50%);
      }

      #rumble-bar-marker {
        position: absolute;
        top: 0;
        left: 0%;
        width: var(--rumble-bar-marker-width);
        height: 100%;
        background: var(--rumble-marker-color);
        transform: translateX(-50%);
      }

      #rumble-bar-marker.in-zone {
        background: var(--rumble-marker-color-hit);
      }

      /*
       * Hinweistext вҖһTipp, wenn der Marker im GrГјn ist" (Mobile-Redesign, Гңbergabe-Auftrag
       * `2026-07-16-rumpel-balken-tap-redesign.md`, Felix-Entscheid 3): direkt ГңBER dem Balken
       * verankert (`bottom`-Formel = dieselbe wie `#rumble-bar-hit` PLUS dessen volle HГ¶he PLUS
       * einen `--hud-gap`-Abstand), Stil-Muster `#hidden-hint` (Opacity-Fade Гјber `.visible`,
       * `pointer-events: none`, Text-Shadow). Sichtbarkeit wird AUSSCHLIESSLICH von
       * `updateRumbleHud()` Гјber die reine `hud/rumbleHintVisibility.ts`s
       * `computeRumbleHintVisibility()` gesteuert (erste `RUMBLE_HINT_MAX_WAVES` Wellen der
       * Session, s. dort) вҖ” dieses CSS-Element selbst kennt keine Wellen-ZГӨhlung.
       */
      #rumble-hint {
        position: fixed;
        bottom: calc(
          var(--hud-safe-bottom) + var(--hud-gap) + 3 * (var(--move-mode-button-size) + var(--hud-gap)) +
            var(--rumble-bar-height) + 2 * var(--rumble-bar-hit-halo) + var(--hud-gap)
        );
        left: 50%;
        transform: translateX(-50%);
        color: var(--hud-text-color);
        font: var(--hud-font-size) / 1.4 sans-serif;
        text-align: center;
        text-shadow: 0 0 4px #000;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }

      #rumble-hint.visible {
        opacity: 1;
      }

      /*
       * Ausgang-Feedback-Blitz (`scenes/MatchScene.ts`s `updateRumbleHud()`/`handleRumbleResult()`):
       * sobald ein `"rumbleResult"`-Ereignis eintrifft, bleibt `#rumble-bar` fГјr
       * `RUMBLE_RESULT_FLASH_DURATION_MS` (`src/config.ts`) SICHTBAR und Гјbermalt sich komplett
       * grГјn/rot, statt sofort bei `rumbleActive вҶ’ false` zu verschwinden вҖ” Marker/Zone werden fГјr
       * die Blitz-Dauer ausgeblendet (`display: none`), das Balken-`background` selbst trГӨgt die
       * Blitz-Farbe. Erfolg (`.result-hit`) nutzt dieselbe Farbe wie die Trefferzone
       * (`--rumble-zone-color`, EIN GrГјn, kein zweiter Ton); Fehlschlag (`.result-miss`) nutzt das
       * eigene Warnrot (`--rumble-result-miss-color` oben). ZusГӨtzliches Audio-Feedback (dezenter
       * Erfolgs-Ton / eigener Verrats-Ton bei Fehlschlag) lГӨuft rein clientseitig Гјber
       * `SoundPlayer`, unabhГӨngig von diesem DOM-Blitz hier. Das вҖһ!"-Weltsymbol bei Fehlschlag
       * (Feature B, `triggerWorldBetraySighted()`) hГӨngt seit dem Umbau (Aufgabe 0) NICHT MEHR an
       * diesem self-only `"rumbleResult"`-Ereignis, sondern am eigenstГӨndigen, server-gegateten
       * `"rumbleBetraySighted"`-Ereignis (siehe `net/connection.ts`).
       *
       * **Deutlicherer Blitz (Feel-Optimierung, Felix-Auftrag 2026-07-16: вҖһ250 ms wurde beim
       * Playtest Гјbersehen"):** `RUMBLE_RESULT_FLASH_DURATION_MS` auf `550` ms verlГӨngert (siehe
       * dortige Dokumentation) UND ein kurzer Glow-Puls (`@keyframes rumble-result-pulse`,
       * `box-shadow` in derselben Blitz-Farbe via `currentColor`) ergГӨnzt вҖ” dezent (keine
       * Skalierung, kein Layout-Sprung, reine Leuchtkraft-Betonung um den ohnehin fest
       * positionierten Balken). `animation-duration` dupliziert bewusst denselben Millisekunden-
       * Wert wie `RUMBLE_RESULT_FLASH_DURATION_MS` (Muster `--rumble-result-miss-color`/
       * `RUMBLE_RESULT_MISS_COLOR`: kein CSS-Import aus TypeScript mГ¶glich, beide Stellen MГңSSEN
       * bei einer kГјnftigen Г„nderung von Hand synchron gehalten werden). Гңberschreibt die
       * `animation`-Kurzschrift bewusst den `rumble-bar-appear-pop`-Wert der `.visible`-Regel
       * (hГ¶here Deklarationsreihenfolge/SpezifitГӨt) вҖ” Konflikt praktisch ausgeschlossen, da der
       * Pop lГӨngst (130 ms) abgeschlossen ist, bevor ein Ergebnis-Ereignis eintreffen kann (die
       * kГјrzeste Welle dauert ein Vielfaches davon).
       */
      @keyframes rumble-result-pulse {
        0% {
          box-shadow: 0 0 0 0 currentColor;
        }
        35% {
          box-shadow: 0 0 12px 3px currentColor;
        }
        100% {
          box-shadow: 0 0 0 0 currentColor;
        }
      }

      #rumble-bar.result-hit,
      #rumble-bar.result-miss {
        animation: rumble-result-pulse 550ms ease-out;
      }

      #rumble-bar.result-hit {
        background: var(--rumble-zone-color);
        color: var(--rumble-zone-color);
      }

      #rumble-bar.result-miss {
        background: var(--rumble-result-miss-color);
        color: var(--rumble-result-miss-color);
      }

      #rumble-bar.result-hit #rumble-bar-zone,
      #rumble-bar.result-hit #rumble-bar-marker,
      #rumble-bar.result-miss #rumble-bar-zone,
      #rumble-bar.result-miss #rumble-bar-marker {
        display: none;
      }

      /*
       * Tweak-Konsole & Parameter-Registry, BГјndel 3/Scheibe 5 (Dev-Overlay, `vault/20-
       * Architektur/tweak-konsole-konzept.md` В§5): `#tweak-console` ist NUR der statische
       * Container вҖ” die gesamte Aufbau-/Interaktionslogik (Gruppen/Suche/Filter/Zeilen/Export)
       * lebt in `src/tweak/tweakConsole.ts` und wird NUR im Dev-Build montiert (`import.meta.env
       * .DEV`-Gate + dynamischer `import()` in `scenes/MatchScene.ts`, siehe dort). Dieser CSS-
       * Block selbst ist KEIN Cheat-Vektor (nur Layout, kein Simulationszugriff) und bleibt
       * deshalb bewusst unbedingt im Markup вҖ” analog zu jedem anderen HUD-Container hier.
       *
       * Default `display: none` (nicht nur `pointer-events: none`): ein geschlossenes Panel
       * nimmt dadurch StrukturELL keinen Klickbereich ein, das Spiel bleibt uneingeschrГӨnkt
       * bedienbar (Mobile-Tag-1-Regel 1). Erst `.tweak-console--open` schaltet es sichtbar +
       * interaktiv.
       *
       * Layout: relativ zu den Safe-Area-Insets verankert (Regel 3/5), Breite `min(92vw, 26rem)`
       * (kein fester Pixelwert, lГӨuft auf 375px nicht Гјber den Rand), eigener scrollbarer
       * Body (`overflow-y: auto; overflow-x: hidden` вҖ” kein horizontaler Гңberlauf). Alle
       * interaktiven Kindelemente bekommen ihre 48px-MindestgrГ¶Гҹe Гјber die jeweiligen
       * `.tweak-*`-Klassen unten (Regel 4).
       */
      #tweak-console {
        position: fixed;
        top: calc(var(--hud-safe-top) + var(--hud-gap));
        right: calc(var(--hud-safe-right) + var(--hud-gap));
        bottom: calc(var(--hud-safe-bottom) + var(--hud-gap));
        width: min(92vw, 26rem);
        max-width: 100vw;
        box-sizing: border-box;
        display: none;
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.75rem;
        border-radius: 0.5rem;
        background: rgba(10, 10, 16, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: var(--hud-text-color);
        font: 0.85rem / 1.3 sans-serif;
        z-index: 1000;
        pointer-events: none;
      }

      #tweak-console.tweak-console--open {
        display: flex;
        pointer-events: auto;
      }

      .tweak-console__header {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
      }

      .tweak-console__search {
        flex: 1 1 8rem;
        min-width: 0;
        min-height: 48px;
        box-sizing: border-box;
      }

      .tweak-console__only-changed {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        min-height: 48px;
      }

      .tweak-console__export {
        min-height: 48px;
        min-width: 48px;
      }

      .tweak-console__export-feedback {
        font-size: 0.75rem;
        opacity: 0.8;
      }

      .tweak-console__body {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .tweak-group__header {
        width: 100%;
        min-height: 48px;
        text-align: left;
        background: rgba(255, 255, 255, 0.08);
        border: none;
        color: inherit;
        font: inherit;
        font-weight: 600;
        padding: 0.4rem 0.6rem;
        border-radius: 0.3rem;
      }

      .tweak-group__body {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        padding-left: 0.25rem;
      }

      .tweak-group__body--collapsed,
      .tweak-group[hidden],
      .tweak-row[hidden] {
        display: none;
      }

      .tweak-row {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        padding: 0.4rem 0.5rem;
        border-radius: 0.3rem;
        background: rgba(255, 255, 255, 0.04);
      }

      .tweak-row__labels {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
      }

      .tweak-row__key {
        font-family: monospace;
        font-size: 0.7rem;
        opacity: 0.6;
      }

      .tweak-row__scope-badge {
        font-size: 0.7rem;
        padding: 0.1rem 0.4rem;
        border-radius: 0.6rem;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }

      /* Scope-Farben (Konzept В§4): rein informativ, keine neue Kategoriefarbe (Art-Style bleibt unberГјhrt вҖ” dieses Panel ist ein Dev-Werkzeug, kein In-Game-Asset). */
      .tweak-row__scope-badge--server-sim {
        color: #38bdf8;
      }

      .tweak-row__scope-badge--client-render {
        color: #4ade80;
      }

      .tweak-row__scope-badge--gesperrt {
        color: rgba(255, 255, 255, 0.4);
      }

      /* Constraint-Warnindikator (Konzept В§6): dieselbe Warnfarbe wie die Low-Time-HUD-Warnung (`--hud-low-time-color`) вҖ” konsistente Warn-Sprache statt einer neuen, unbegrГјndeten Farbe. */
      .tweak-row__warning {
        font-size: 0.7rem;
        color: var(--hud-low-time-color);
        border: 1px solid var(--hud-low-time-color);
        border-radius: 0.6rem;
        padding: 0.1rem 0.4rem;
      }

      .tweak-row__controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
      }

      .tweak-row__slider {
        flex: 1 1 8rem;
        min-height: 48px;
      }

      .tweak-row__number {
        width: 5rem;
        min-height: 48px;
        box-sizing: border-box;
      }

      .tweak-row__unit {
        font-size: 0.75rem;
        opacity: 0.7;
        min-width: 2.5rem;
      }

      .tweak-row__default {
        font-size: 0.7rem;
        opacity: 0.6;
      }

      .tweak-row__reset {
        min-height: 48px;
        min-width: 48px;
      }

      /* =====================================================================
       * Mobile-Clean-HUD (Felix-Auftrag 2026-07-17 abends)
       * =====================================================================
       * Auf Touch-GerГӨten (`html.touch-ui`, gesetzt in `src/index.ts` Гјber dieselbe
       * `isTouchLikely()`-Heuristik wie der Kamera-Zoom, `?forceTouch` = Desktop-Escape)
       * verschwinden die Entwickler-KnГ¶pfe (Debug-Toggle oben rechts, Tweak-Toggle oben
       * Mitte вҖ” Konsole bleibt Desktop-per-Tastatur ^/F2 erreichbar), und Timer/Wins rГјcken
       * in die frei gewordene Ecke ganz nach oben вҖ” weniger HUD-Etagen, mehr sichtbares
       * Spielfeld. Der NetLog-Export-Button bleibt bewusst AUCH auf Touch sichtbar (nur mit
       * explizitem `?netlog`-Opt-in Гјberhaupt vorhanden вҖ” Felix' Handy-Messwerkzeug).
       * Reine Darstellungs-Weiche per CSS-Klasse, KEIN zweiter Eingabepfad (Regel 1).
       */
      html.touch-ui #debug-toggle-button,
      html.touch-ui #tweak-console-toggle {
        display: none;
      }

      html.touch-ui #match-timer {
        top: calc(var(--hud-safe-top) + var(--hud-gap));
      }

      html.touch-ui #wins-counter {
        top: calc(var(--hud-safe-top) + var(--hud-gap) + 2em);
      }

      /* NetLog-Export rГјckt in die vom Debug-Toggle gerГӨumte Ecke (Formel = dessen alte Position). */
      html.touch-ui #netlog-export-button {
        right: calc(var(--hud-safe-right) + var(--hud-gap));
      }

      /* Randfall `?netlog` AUF Touch: der Export-Button belegt dann doch die Ecke вҖ” Timer/Wins
         weichen fГјr diesen Messmodus auf ihre bisherigen Etagen darunter aus
         (Geschwister-Selektor: `#netlog-export-button` steht im Markup VOR beiden). */
      html.touch-ui #netlog-export-button.visible ~ #match-timer {
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap));
      }

      html.touch-ui #netlog-export-button.visible ~ #wins-counter {
        top: calc(var(--hud-safe-top) + var(--hud-gap) + var(--debug-toggle-button-size) + var(--hud-gap) + 2em);
      }

      /* =====================================================================
       * Controller-Steuerung (Felix-Auftrag вҖһController-Steuerung fГјr PS5 einbauen und
       * deployen")
       * =====================================================================
       * Sobald ein Gamepad aktiv ist (`html.gamepad-active`, gesetzt in `scenes/MatchScene.ts`s
       * `updateGamepadActiveClass()` Гјber `input/gamepadInput.ts`s `hasActiveGamepad()`-Polling)
       * blenden die REINEN Touch-Affordanzen aus: die drei `.mobile-move-mode-button`
       * (Schleichen/Interagieren/Besen) UND der floating Joystick-Visual
       * (`#joystick-base`/`#joystick-knob`) вҖ” der Controller bedient dieselben Aktionen Гјber
       * Buttons/Stick, die Touch-KnГ¶pfe wГӨren nur noch visuelles Rauschen. Item-Bar (Cooldown-/
       * Zauber-Info), Minimap und Timer bleiben SICHTBAR (Info-Displays, mit Controller weiter
       * nГјtzlich) вҖ” dieselbe Darstellungs-Weiche wie `html.touch-ui` oben, KEIN zweiter
       * Eingabepfad (Mobile-Tag-1-Regel 1 unberГјhrt).
       */
      html.gamepad-active .mobile-move-mode-button,
      html.gamepad-active #joystick-base,
      html.gamepad-active #joystick-knob {
        display: none;
      }

      /* =====================================================================
       * Wild-Rift-Aktionscluster (Felix-Auftrag `2026-07-22-mobile-hud-wildrift-umsetzung.md`)
       * =====================================================================
       * LГ¶st auf TOUCH-GerГӨten die Item-Bar UND die runden Schleichen-/Interaktions-Buttons
       * VOLLSTГ„NDIG ab (Desktop bleibt bei jenen Elementen unverГӨndert вҖ” reine Anzeige-Weiche,
       * KEIN zweiter Eingabepfad, Mobile-Tag-1-Regel 1). `#wr-cluster` ist ein reiner
       * Struktur-Wrapper (`position: static`) вҖ” `display: none` auf ihm blendet trotz
       * `position: fixed` auf den Kindern strukturell ALLE Kinder mit aus (Standard-CSS-
       * Verhalten), ein einziges Gate reicht damit fГјr den kompletten Cluster.
       */
      #wr-cluster {
        display: none;
      }

      html.touch-ui #wr-cluster {
        display: block;
      }

      html.touch-ui #item-bar,
      html.touch-ui #mobile-sneak-button,
      html.touch-ui #mobile-interact-button,
      html.touch-ui #mobile-broom-button {
        display: none;
      }

      /*
       * Alle kleinen Cluster-Buttons (Slots В· Dash В· Schleichen) EXAKT gleich groГҹ und
       * kreisrund (Felix-Direktive вҖһkeiner unterschiedlich groГҹ") вҖ” nur der Interaktionsknopf
       * ist grГ¶Гҹer (Wild-Rift-Angriffsknopf-Proportion, eigene Regel unten). Bewusst
       * `pointer-events: auto` (sie SIND die Eingabe, Mobile-Tag-1-Regel 1) + `touch-action: none`
       * + `-webkit-tap-highlight-color: transparent` (unterdrГјckt Browser-Standardgesten, Muster
       * `.action-slot-button` andernorts) вҖ” eigene DOM-Geschwister auГҹerhalb des Phaser-Canvas,
       * ein Tap erreicht Phasers Whole-Canvas-Joystick-Listener dadurch strukturell nie.
       */
      .wr-button {
        position: fixed;
        width: var(--wr-slot-diameter);
        height: var(--wr-slot-diameter);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--wr-panel-bg);
        box-shadow: inset 0 0 0 2px var(--wr-slot-accent);
        color: var(--wr-slot-accent);
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      .wr-button__icon {
        width: var(--wr-slot-icon-size);
        height: var(--wr-slot-icon-size);
        display: block;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
        pointer-events: none;
      }

      /*
       * Emoji-Icon EINES belegten Slots (Zauber/Item, Muster `.item-slot__icon--emoji`) вҖ”
       * standardmГӨГҹig leer/unsichtbar (kein Textinhalt), `renderWrActionSlots()`
       * (`scenes/MatchScene.ts`) setzt `textContent` NUR fГјr `data-kind="spell"`/`"item"`.
       * `data-kind="empty"` zeigt stattdessen den gestrichelten SVG-Platzhalter
       * (`.wr-slot__icon-empty`) вҖ” beide Icon-TrГӨger sind IMMER im DOM (Muster fester
       * Element-Pool, kein Neuaufbau pro Frame), nur `display` wechselt.
       */
      .wr-slot__icon-emoji {
        display: none;
        font-size: var(--wr-slot-icon-size);
        line-height: 1;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.6));
      }

      .wr-slot[data-kind="spell"] .wr-slot__icon-emoji,
      .wr-slot[data-kind="item"] .wr-slot__icon-emoji {
        display: block;
      }

      .wr-slot[data-kind="spell"] .wr-slot__icon-empty,
      .wr-slot[data-kind="item"] .wr-slot__icon-empty {
        display: none;
      }

      /* Ladungs-Pips EINES Item-Slots (Muster `.item-slot__item-pips`, z. B. Besen "в—Ҹв—Ҹв—Ӣ") вҖ” leer fГјr Zauber/leere Slots. */
      .wr-slot__pips {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 2px;
        text-align: center;
        font: 0.6rem/1 monospace;
        color: inherit;
        text-shadow: 0 0 3px #000;
        pointer-events: none;
      }

      #wr-sneak-button {
        right: calc(var(--hud-safe-right) + var(--wr-sneak-right));
        bottom: calc(var(--hud-safe-bottom) + var(--wr-sneak-bottom));
      }

      /* Aktiv-Zustand des Schleichen-Toggles (Muster `#mobile-sneak-button.active`) вҖ” reine Darstellung. */
      #wr-sneak-button.active {
        box-shadow: inset 0 0 0 2px var(--hud-text-color);
        background: rgba(255, 255, 255, 0.16);
        color: var(--hud-text-color);
      }

      #wr-dash-button {
        right: calc(var(--hud-safe-right) + var(--wr-dash-right));
        bottom: calc(var(--hud-safe-bottom) + var(--wr-dash-bottom));
        --wr-slot-cooldown: 0;
      }

      /* Cooldown-Wipe (Muster `.item-slot__cooldown`: dunkler Radial-Sweep, schrumpft beim AbkГјhlen). */
      .wr-button__cooldown {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: conic-gradient(var(--wr-cooldown-color) calc(var(--wr-slot-cooldown, 0) * 1turn), transparent 0);
        pointer-events: none;
      }

      #wr-dash-button.is-cooldown {
        box-shadow: inset 0 0 0 2px var(--wr-slot-accent);
        color: var(--wr-slot-accent);
      }
      #wr-dash-button:not(.is-cooldown) {
        box-shadow: inset 0 0 0 2px var(--item-slot-accent-dash);
        color: var(--item-slot-accent-dash);
      }

      /*
       * Dynamischer Interaktionsknopf: EIN Tap-Button, Icon/Ton wechseln pro Frame je nach der
       * server-autoritativ vorhergesagten Aktion (`hud/interactionButtonState.ts`,
       * `scenes/MatchScene.ts`s `updateWrInteractButton()`). Verdrahtung des Taps selbst
       * unverГӨndert (`setupInteractControls()` вҶ’ `net/interactInput.ts`s `MobileInteractState` вҶ’
       * payload-lose `"interact"`-Nachricht) вҖ” nur zusГӨtzlich AK2-gegated (kein Tap-Versand im
       * `"none"`-Zustand, siehe `interactionButtonState.ts`-Dokumentation).
       */
      #wr-interact-button {
        position: fixed;
        right: calc(var(--hud-safe-right) + var(--wr-interact-right));
        bottom: calc(var(--hud-safe-bottom) + var(--wr-interact-bottom));
        width: var(--wr-interact-diameter);
        height: var(--wr-interact-diameter);
        min-width: 48px;
        min-height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 38% 30%, rgba(60, 66, 82, 0.55), rgba(18, 20, 28, 0.72) 70%);
        box-shadow: inset 0 0 0 2.5px var(--wr-interact-tone-neutral);
        color: var(--wr-interact-tone-neutral);
        pointer-events: auto;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }

      #wr-interact-button.is-disabled {
        opacity: 0.55;
      }

      #wr-interact-button.tone-hider {
        box-shadow: inset 0 0 0 2.5px var(--wr-interact-tone-hider);
        color: var(--wr-interact-tone-hider);
      }

      #wr-interact-button.tone-catcher {
        box-shadow: inset 0 0 0 2.5px var(--wr-interact-tone-catcher);
        color: var(--wr-interact-tone-catcher);
      }

      #wr-interact-button__icon {
        width: var(--wr-interact-icon-size);
        height: var(--wr-interact-icon-size);
        display: block;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.7));
        pointer-events: none;
      }

      /*
       * Kanal-Fortschrittsring: lГӨuft NUR wГӨhrend ein Kanal lГӨuft sichtbar mit
       * (`.is-channeling`), `stroke-dashoffset` setzt `updateWrInteractButton()` pro Frame aus
       * `channelTicksRemaining`/derselben Gesamtdauer-Quelle wie der bestehende Kopf-Balken
       * (`resolveChannelTotalTicks()`, `scenes/MatchScene.ts`) вҖ” nur eine zweite Darstellung
       * derselben server-autoritativen Zahl, kein zweiter Netzpfad.
       */
      #wr-interact-button__ring {
        position: absolute;
        inset: -4px;
        pointer-events: none;
        opacity: 0;
      }

      #wr-interact-button__ring.is-channeling {
        opacity: 1;
      }

      #wr-interact-button__ring circle {
        fill: none;
        stroke: var(--hud-text-color);
        stroke-width: 4;
        stroke-linecap: round;
        transform: rotate(-90deg);
        transform-origin: center;
      }

      /*
       * Die 4 generischen Zauber-/Item-Slots (harte Kappe `MAX_ACTION_SLOTS`, `hud/
       * actionSlots.ts`): Bogen-Positionen 1:1 aus dem Mockup vermessen, oberster Platz =
       * Ult-Konvention (Zauber-Standardplatz). `data-kind` (von `scenes/MatchScene.ts`s
       * `renderWrActionSlots()` pro Slot gesetzt) steuert die Rahmenfarbe NACH INHALT (Runde 3:
       * вҖһRahmenfarbe folgt dem Inhalt, nicht der Position") вҖ” `spell` = Violett, `item` = Gold,
       * `empty` = gedГӨmpftes Grau + gestrichelter Rand (kein echter Inhalt, kein Tap-Ziel).
       */
      .wr-slot[data-kind="empty"] {
        box-shadow: inset 0 0 0 2px rgba(85, 90, 102, 0.5);
        background: rgba(18, 20, 28, 0.4);
        border-style: dashed;
      }

      .wr-slot[data-kind="spell"] {
        box-shadow: inset 0 0 0 2px var(--wr-slot-accent-spell);
        color: var(--wr-slot-accent-spell);
      }

      .wr-slot[data-kind="item"] {
        box-shadow: inset 0 0 0 2px var(--wr-slot-accent-item);
        color: var(--wr-slot-accent-item);
      }

      #wr-slot-0 {
        right: calc(var(--hud-safe-right) + var(--wr-slot-0-right));
        bottom: calc(var(--hud-safe-bottom) + var(--wr-slot-0-bottom));
      }
